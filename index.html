<body>
    <div id="root"></div>

    <script type="text/plain" id="app-source">
        const { useState, useEffect } = React;

        // ═══════════════════════════════════════════════════════════════════
        //  LISTAS EDITABLES
        // ═══════════════════════════════════════════════════════════════════
        const RELATORES = [
            { n: 'Edward Miño',        cargo: 'Supervisor',                grupo: 'Supervisores' },
            { n: 'Sergio Rojas',       cargo: 'Supervisor',                grupo: 'Supervisores' },
            { n: 'Manuel Fuentes',     cargo: 'Supervisor',                grupo: 'Supervisores' },
            { n: 'Guillermo Oneto',    cargo: 'Supervisor',                grupo: 'Supervisores' },
            { n: 'Braulio Sielpe',     cargo: 'APR',                       grupo: 'APR' },
            { n: 'Víctor Donoso',      cargo: 'APR',                       grupo: 'APR' },
            { n: 'Héctor Arce Matta',  cargo: 'Administrador de Contrato', grupo: 'Administración' },
        ];
        const GRUPOS_REL = ['Supervisores', 'APR', 'Administración'];
        const SUPERVISORES = RELATORES.filter(r => r.grupo === 'Supervisores').map(r => r.n);

        const CUADRILLAS = ['Cuadrilla A', 'Cuadrilla B', 'Cuadrilla C', 'Cuadrilla D'];

        const TURNOS = ['Día', 'Noche'];

        const META_MENSUAL = 4; // charlas esperadas por supervisor al mes
        const TOTAL_FILAS_ASISTENCIA = 20;

        // ── CATÁLOGO DE 20 CHARLAS (el orden = la secuencia) ──
        const TEMAS = [
            { n: 1, titulo: 'Diferencias entre empresa mandante y contratista',
              desarrollo: 'En la planta conviven la empresa mandante (dueña de la faena) y Río Loa como empresa contratista que presta servicios para ella. La Ley 20.123 de subcontratación establece que ambas empresas coordinan la seguridad de quienes trabajan en el recinto, y como trabajador de Río Loa tu responsabilidad es clara: respetar el reglamento especial de la planta, cumplir las instrucciones de tu supervisor y las reglas de la mandante, y utilizar siempre las vías, los accesos y los procedimientos autorizados. Saber quién es quién te permite identificar a quién dirigirte, qué reglas aplican en cada área y cómo cumplir correctamente sin exponerte. Aunque trabajes para Río Loa, dentro de la planta también debes acatar las indicaciones del personal de la mandante en materia de seguridad. Ante cualquier duda, instrucción que no entiendas o condición que te genere inquietud, repórtala de inmediato a tu supervisor de Río Loa antes de continuar.',
              puntos: ['Mandante = dueña de la faena; Río Loa = contratista', 'Ley 20.123 de subcontratación', 'Respetar el reglamento especial de la planta', 'Reportar a tu supervisor de Río Loa'] },
            { n: 2, titulo: 'EPP correcto según la zona',
              desarrollo: 'El uso del EPP es obligatorio y personal: la empresa te entrega los elementos necesarios para cada área y tu deber es usarlos correctamente durante toda la jornada, no solo cuando crees que hay riesgo. En Batch House y Molienda corresponde respirador y antiparras por la presencia de polvo; en Galpón Soda, protección química; y protección auditiva donde hay ruido. Antes de iniciar tu turno, revisa que tu EPP esté completo, limpio y en buen estado, y ajústalo correctamente para que cumpla su función. Si un elemento está dañado, vencido o no te queda bien, solicita su reposición a tu supervisor antes de exponerte. Nunca improvises ni reemplaces el EPP por elementos no autorizados. Recuerda que el EPP solo te protege si lo usas bien, completo y en todo momento.',
              puntos: ['El EPP cambia según la zona', 'Respirador y antiparras donde hay polvo', 'Protección química en soda', 'Revisar el EPP antes de iniciar'] },
            { n: 3, titulo: 'Polvo y sílice — protección respiratoria',
              desarrollo: 'El polvo con sílice presente en las materias primas puede afectar tus pulmones si se inhala de forma repetida a lo largo del tiempo, y sus efectos no se notan de inmediato. Por eso es obligatorio usar el respirador entregado, bien ajustado al rostro y con los filtros vigentes, durante toda la tarea en las zonas de exposición. Maneja los materiales según el procedimiento para evitar generar polvo innecesario y no te retires el respirador mientras estés expuesto, aunque sea por un momento. Verifica que el sello sea hermético y que no haya barba u objetos que impidan el ajuste. Si tu respirador no sella bien, está sucio o el filtro está saturado, solicita el recambio a tu supervisor antes de continuar. Cuidar tu protección respiratoria hoy es lo que protege tu salud a futuro.',
              puntos: ['La sílice causa silicosis (irreversible)', 'Respirador bien ajustado', 'Cambiar los filtros a tiempo', 'No levantar polvo innecesario'] },
            { n: 4, titulo: 'No comer ni beber en zonas de trabajo',
              desarrollo: 'Comer, beber o fumar en las zonas de trabajo puede hacer que ingieras polvo, soda u otras materias primas sin darte cuenta, ya que quedan en las manos, la ropa y las superficies. Por eso debes alimentarte únicamente en las áreas habilitadas para ello, lavándote bien las manos y el rostro antes de hacerlo. No dejes alimentos, bebidas ni utensilios en zonas de proceso, ni guardes comida en los puestos de trabajo o en los bolsillos. Tampoco uses envases de producto para guardar bebidas ni a la inversa. Mantener esta separación entre el trabajo y la alimentación es una regla básica de higiene industrial. Cumplirla es una responsabilidad personal que protege directamente tu salud y la de tus compañeros.',
              puntos: ['No ingerir polvo ni químicos', 'Comer solo en áreas habilitadas', 'Lavarse las manos antes', 'No dejar alimentos en proceso'] },
            { n: 5, titulo: 'Manejo manual de carga y maxisacos',
              desarrollo: 'El manejo manual de cargas mal realizado es una de las principales causas de lesiones a la espalda, y muchas de ellas se vuelven crónicas. Para evitarlas, levanta doblando las rodillas y manteniendo la espalda recta, con la carga pegada al cuerpo y los pies firmes, sin girar el tronco mientras sostienes el peso. Respeta los límites de peso establecidos y, para maxisacos o cargas pesadas, utiliza siempre los medios mecánicos disponibles y pide ayuda a un compañero. Antes de levantar, evalúa el peso, planifica el movimiento y despeja el recorrido para no tropezar ni maniobrar de forma forzada. Si la carga es inestable o no la puedes controlar, detente y busca apoyo. Tu técnica al levantar depende de ti y es clave para no lesionarte hoy ni a largo plazo.',
              puntos: ['Doblar rodillas, espalda recta', 'Carga pegada al cuerpo', 'Ayuda mecánica con maxisacos', 'No girar el tronco con carga'] },
            { n: 6, titulo: 'Izaje seguro de cargas',
              desarrollo: 'Toda maniobra de izaje requiere atención plena y cumplimiento estricto del procedimiento, porque una carga suspendida es un peligro permanente. Antes de izar, inspecciona las eslingas, ganchos, grilletes y accesorios; si detectas alguno dañado, gastado o sin certificación, no lo uses e infórmalo a tu supervisor. Verifica que la carga esté bien estrobada, equilibrada y dentro de la capacidad del equipo antes de levantarla. Durante la maniobra nunca te ubiques ni transites bajo una carga suspendida ni en su radio de giro, mantén la distancia y comunícate con el operador solo mediante señales claras y acordadas. No intentes guiar la carga con las manos si no corresponde. Cumplir cada uno de estos pasos es lo que evita que una carga te golpee o te atrape.',
              puntos: ['Inspeccionar eslingas y ganchos', 'No pararse bajo la carga suspendida', 'Comunicación con el operador', 'Descartar elementos dañados'] },
            { n: 7, titulo: 'Orden, aseo y derrames (5S)',
              desarrollo: 'Mantener el orden y el aseo en tu puesto es parte de tu trabajo diario y previene caídas, golpes, incendios y otros incidentes. Limpia de inmediato cualquier derrame de material o líquido, mantén despejadas las vías de tránsito, escaleras y accesos, y deja cada herramienta y equipo en su lugar al terminar la tarea. No acumules materiales en pasillos ni obstruyas accesos, tableros eléctricos, extintores o salidas de emergencia. Recoge cables, mangueras y restos que puedan hacer tropezar, y segrega los residuos donde corresponde. Un puesto desordenado esconde riesgos que después provocan accidentes. Mantener el orden durante toda la jornada, y no solo al final, es responsabilidad de cada uno y refleja un trabajo bien hecho.',
              puntos: ['Los derrames provocan resbalones', 'Limpiar de inmediato', 'Mantener las vías despejadas', 'Cada cosa en su lugar'] },
            { n: 8, titulo: 'Descarga segura de camiones y materiales',
              desarrollo: 'La descarga de camiones y materiales debe hacerse de forma coordinada, sin apuro y siguiendo el procedimiento, porque intervienen vehículos, cargas y personas en un mismo espacio. Antes de iniciar, coordina con el conductor y asegúrate de que el vehículo esté detenido, con el motor apagado, frenado y calzado. Mantente fuera de los puntos ciegos del camión y nunca te ubiques entre el vehículo y una estructura, muro o pila de material. Usa chaleco reflectante, verifica que la carga esté estable antes de soltar las amarras y manipula los elementos con las herramientas y equipos adecuados. No subas a la carga ni te pares en zonas donde puedas caer o ser golpeado. Tu posición, tu comunicación y tu atención durante toda la maniobra son tu mejor protección.',
              puntos: ['Coordinar con el conductor', 'Cuidado con los puntos ciegos', 'No ubicarse en puntos de aplastamiento', 'Usar chaleco reflectante'] },
            { n: 9, titulo: 'Atrapamiento en correas y molienda',
              desarrollo: 'Las correas transportadoras y los equipos de molienda tienen partes en movimiento que pueden atrapar una mano, la ropa o el pelo en un instante, sin dar tiempo a reaccionar. Por eso nunca debes intervenir, limpiar, lubricar ni destrabar un equipo mientras esté en funcionamiento. Respeta los resguardos y protecciones, no los retires ni operes equipos con ellos abiertos o removidos, y mantén manos, ropa holgada, cordones y herramientas lejos de las partes móviles. Usa la ropa de trabajo ajustada y no uses elementos que puedan engancharse. Si un equipo se atasca o requiere intervención, detenlo por completo y aplica el bloqueo correspondiente antes de actuar, según el procedimiento. Cumplir esta regla sin excepciones es lo que evita atrapamientos que pueden ser graves o mortales.',
              puntos: ['No intervenir equipos en movimiento', 'Respetar los resguardos', 'No retirar protecciones', 'Detener y bloquear antes de destrabar'] },
            { n: 10, titulo: 'Bloqueo y etiquetado (LOTO)',
              desarrollo: 'Antes de intervenir cualquier equipo para mantención, limpieza o destrabe, debes desenergizarlo, bloquearlo y etiquetarlo siguiendo el procedimiento de bloqueo y etiquetado. Esto aplica a toda fuente de energía: eléctrica, mecánica, neumática, hidráulica o de gravedad. Cada trabajador instala su propio candado o dispositivo de bloqueo, y solo quien lo puso puede retirarlo al terminar. Antes de empezar, verifica la energía cero comprobando que el equipo realmente no pueda arrancar ni liberar energía acumulada. Nunca retires, anules ni prestes el bloqueo de otro compañero, ni operes un equipo que esté bloqueado por alguien más. Aplicar correctamente el bloqueo es lo único que garantiza que el equipo no se active mientras tienes las manos en él.',
              puntos: ['Desenergizar, bloquear y etiquetar', 'Solo quien bloquea, desbloquea', 'Verificar energía cero', 'Antes de toda mantención'] },
            { n: 11, titulo: 'Ruido en molienda y protección auditiva',
              desarrollo: 'La exposición a ruido alto y sostenido puede dañar tu audición de manera progresiva e irreversible, y cuando lo notas, el daño ya está hecho. En las zonas señalizadas como de uso obligatorio, debes usar el protector auditivo entregado durante todo el tiempo de exposición, no solo por momentos ni cuando el ruido te molesta. Colócalo correctamente —tapones bien insertados o fonos bien sellados— para que cumpla su función, y combínalo según lo indicado cuando el nivel lo requiere. Solicita su reposición cuando esté deteriorado, sucio o no selle bien. Recuerda que el daño auditivo no duele ni se nota de inmediato, pero se acumula con los años y no tiene vuelta atrás. Proteger tu audición depende del uso constante y correcto del protector en cada turno.',
              puntos: ['El ruido daña la audición de forma permanente', 'Protector durante toda la exposición', 'El daño es acumulativo', 'Uso permanente, no a ratos'] },
            { n: 12, titulo: 'Manejo de vidrio y cortes (Despacho/Bodega)',
              desarrollo: 'La manipulación de vidrio y cristal exige cuidado permanente, ya que los bordes y las trizaduras cortan con facilidad incluso con poco contacto. Usa siempre los guantes anticorte entregados y la técnica adecuada para tomar, levantar y trasladar las piezas, sujetándolas de forma firme y controlada. Nunca recojas vidrios rotos con las manos: utiliza los implementos dispuestos para ello, como escobillas, palas o pinzas, y desecha los restos en los contenedores correspondientes. Mantén despejada el área de trabajo, avisa a tus compañeros al trasladar piezas y no cargues más de lo que puedas controlar. Presta especial atención a las piezas con fisuras, que pueden quebrarse al manipularlas. Tu atención constante y el uso de los guantes son los que evitan los cortes.',
              puntos: ['Usar guantes anticorte', 'Cuidado con el vidrio roto', 'No recoger trizaduras con la mano', 'Desechar los restos correctamente'] },
            { n: 13, titulo: 'Espacios confinados: silos, tolvas y escotillas',
              desarrollo: 'Silos, tolvas y escotillas son espacios confinados y representan un riesgo serio, porque pueden tener atmósferas peligrosas, falta de oxígeno o riesgo de sepultamiento por material. Nunca ingreses a uno sin la autorización y el permiso de trabajo correspondiente, sin la medición previa de la atmósfera y sin un vigía permanente en el exterior. Respeta todas las condiciones que establece el permiso y no improvises ingresos rápidos, aunque la tarea parezca breve o sencilla. Asegúrate de contar con los medios de comunicación y rescate definidos antes de entrar. Si te asignan como vigía, permanece atento todo el tiempo, mantén el conteo de quienes ingresan y nunca abandones tu posición ni ingreses tú mismo. Cumplir el procedimiento de espacios confinados es lo que permite entrar y salir con seguridad.',
              puntos: ['Permiso de trabajo obligatorio', 'Monitoreo de la atmósfera', 'Vigía en el exterior', 'No ingresar sin autorización'] },
            { n: 14, titulo: 'Trabajo en altura: plataformas y silos',
              desarrollo: 'Todo trabajo realizado sobre 1,8 metros requiere protección contra caídas, ya que una caída desde esa altura puede causar lesiones graves o la muerte. Debes usar el arnés entregado, enganchado a un punto de anclaje seguro y certificado, y verificar su estado y el de la línea de vida antes de cada uso. Utiliza escalas, andamios y plataformas solo si están en condiciones y armados correctamente, y muévete por ellos manteniendo siempre tres puntos de apoyo al subir o bajar. No trabajes en altura sin protección, no te sobrecargues de herramientas y no te confíes en tareas cortas o de rutina. Asegura las herramientas para que no caigan sobre quienes están abajo. El uso correcto del arnés, los anclajes y los accesos es tu responsabilidad en cada trabajo en altura.',
              puntos: ['Arnés sobre 1,8 m', 'Punto de anclaje certificado', 'Revisar barandas y plataformas', 'Sin protección, no se sube'] },
            { n: 15, titulo: 'Soda cáustica y sustancias peligrosas',
              desarrollo: 'La soda cáustica y otras sustancias químicas de la planta son corrosivas y pueden causar quemaduras graves en la piel y los ojos con solo un contacto. Antes de manipularlas, conoce la información de su hoja de datos de seguridad y usa el EPP químico indicado: guantes resistentes, antiparras o careta facial y ropa adecuada. Manipula los productos con cuidado, evita salpicaduras, no los trasvasijes ni mezcles fuera del procedimiento y mantén los envases bien identificados y cerrados. No comas, bebas ni te toques el rostro mientras los manejas. Ante cualquier contacto con piel u ojos, lava de inmediato con abundante agua durante varios minutos y avisa a tu supervisor para recibir atención. Conocer y respetar el manejo seguro de los químicos es lo que te protege de lesiones permanentes.',
              puntos: ['La soda es corrosiva', 'EPP químico obligatorio', 'Conocer la hoja de datos de seguridad', 'Ante contacto: agua abundante y avisar'] },
            { n: 16, titulo: 'Estrés térmico cerca de hornos',
              desarrollo: 'El trabajo cerca de hornos implica exposición a altas temperaturas que pueden provocar deshidratación, agotamiento o golpe de calor, un cuadro que puede ser grave. Hidrátate de forma frecuente con agua, antes de tener sed, aprovecha las pausas en zonas frescas y no fuerces tu cuerpo más allá de lo indicado por tu supervisor. Usa la ropa adecuada y evita la exposición prolongada e innecesaria a las fuentes de calor. Aprende a reconocer las señales de alerta —mareo, náuseas, dolor de cabeza, calambres, confusión, piel caliente y seca— tanto en ti como en tus compañeros. Si las presentas o las ves en alguien, detén la tarea, avisa de inmediato y busca un lugar fresco. Cuidar tu hidratación y reconocer los síntomas a tiempo es lo que previene una emergencia.',
              puntos: ['Hidratación frecuente', 'Pausas en zona fresca', 'Reconocer el golpe de calor', 'Avisar ante síntomas'] },
            { n: 17, titulo: 'Grúa horquilla vs. tránsito peatonal',
              desarrollo: 'En las áreas donde circulan grúas horquilla debes extremar el cuidado, ya que el operador no siempre puede verte, sobre todo cuando lleva carga. Mantén siempre distancia con el equipo, no camines ni te detengas detrás ni en sus puntos ciegos, y haz contacto visual con el operador antes de cruzar para asegurarte de que te vio. Respeta las vías peatonales demarcadas, no pases por debajo de cargas elevadas ni te subas al equipo si no estás autorizado. Si eres peatón, cede el paso al equipo aunque tengas la prioridad de la tarea. Nunca te acerques a una horquilla en movimiento ni la uses como medio de transporte. La separación segura entre personas y equipos móviles depende de que cada uno respete su zona y sus reglas.',
              puntos: ['Separación peatón / equipo', 'Contacto visual con el operador', 'No cruzar por los puntos ciegos', 'Usar las vías peatonales'] },
            { n: 18, titulo: 'Tránsito solo por zonas delimitadas y señalizadas',
              desarrollo: 'Dentro de la planta debes desplazarte únicamente por las vías peatonales y zonas demarcadas para el tránsito de personas, que están definidas para mantenerte alejado de los peligros. No tomes atajos por áreas de equipos, sectores de proceso ni zonas de tránsito de camiones, aunque parezca más rápido o más cómodo. Respeta las señalizaciones, barreras, líneas pintadas y pasos peatonales, y cruza solo donde está autorizado y con atención. No te detengas en zonas de circulación de vehículos ni bloquees los accesos. Mantén la atención en el entorno y no te distraigas mientras te desplazas. Circular por donde corresponde es una decisión que tomas en cada trayecto y que evita atropellos y golpes.',
              puntos: ['Circular por vías señalizadas', 'No tomar atajos', 'Respetar las demarcaciones', 'Lejos de equipos y camiones'] },
            { n: 19, titulo: 'No usar el teléfono mientras se camina',
              desarrollo: 'Caminar mientras usas el teléfono te distrae y te expone a caídas, golpes y atropellos, porque dejas de prestar atención al entorno, al piso y a los equipos que se mueven a tu alrededor. Mientras transitas por la planta, mantén el teléfono guardado y la vista en el camino, atento a las señalizaciones y a los vehículos. Si necesitas usarlo, leer un mensaje o atender una llamada, detente primero en un lugar seguro y fuera de las vías de tránsito de personas y equipos. Lo mismo aplica para usar audífonos que te impidan oír alarmas o bocinas. La atención plena al desplazarte es parte del autocuidado y de cuidar a quienes te rodean. Tu seguridad al caminar depende de mantenerte concentrado en el entorno y no en la pantalla.',
              puntos: ['La distracción causa caídas y atropellos', 'Teléfono guardado al caminar', 'Detenerse en lugar seguro para usarlo', 'Atención al entorno'] },
            { n: 20, titulo: 'Reporte de casi-accidentes y condiciones subestándar',
              desarrollo: 'Un casi-accidente es un hecho que pudo terminar en lesión o daño pero que, por suerte o por reacción, no ocurrió: es una oportunidad valiosa para corregir antes de que pase algo grave. Tu rol es reportar a tu supervisor cualquier casi-accidente, condición insegura o acción riesgosa que observes, aunque no haya tenido consecuencias y aunque no te involucre directamente. Reportar no es acusar ni buscar culpables, es prevenir: permite tomar medidas a tiempo, corregir y cuidar a todos. No normalices los riesgos ni los dejes pasar por costumbre o por evitar complicarte. Mientras antes se conozca una condición, antes se puede controlar. Cada reporte que haces aporta información que ayuda a evitar un accidente futuro y mejora la seguridad de todo el equipo.',
              puntos: ['Un casi-accidente es un aviso gratis', 'Reportar aunque no haya lesión', 'Corregir antes del accidente', 'No normalizar el riesgo'] },
        ];
        const TOTAL_TEMAS = TEMAS.length;
        const temaPorN = (n) => TEMAS.find(t => t.n === n) || TEMAS[0];

        // ───────────────────────── CONSTANTES ─────────────────────────
        const STORAGE_KEY = 'rioloa_charlas_v1';
        const ESCALA_KEY = 'rioloa_charlas_escala';
        const EJECUTORA = 'Maquinarias y Construcciones Río Loa S.A.';
        const ESCALAS = [
            { id: 'Normal', px: 16 },
            { id: 'Grande', px: 18.5 },
            { id: 'Extra',  px: 21 },
        ];

        const hoyISO = () => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
        const fechaTxt = (iso) => iso ? iso.split('-').reverse().join('-') : '';
        const mesDe = (iso) => (iso || '').slice(0, 7);
        const imgFormat = (dataUrl) => { const m = /^data:image\/(\w+);/.exec(dataUrl || ''); const f = m ? m[1].toUpperCase() : 'PNG'; return f === 'JPG' ? 'JPEG' : f; };
        const fileToDataURL = (file, cb) => { const r = new FileReader(); r.onloadend = () => cb(r.result); r.readAsDataURL(file); };
        const descargar = (blob, filename) => { const a = document.createElement('a'); a.href = URL.createObjectURL(a._b = blob); a.download = filename; document.body.appendChild(a); a.click(); a.remove(); setTimeout(() => URL.revokeObjectURL(a.href), 1500); };

        // Estado persistente por defecto
        const defaultStore = () => ({
            progreso: {},      // { [relator]: últimoTemaN dictado }
            historial: [],     // [{ folio, fecha, relator, cargo, turno, cuadrilla, temaN, temaTitulo }]
            folioSeq: 1,
            ultimoRelator: '',
            codigo: 'REG-PRM',
            version: '01',
            fechaDoc: new Date().toLocaleDateString('es-CL'),
            logo: null,
        });

        // ───────────────────────── ICONOS ─────────────────────────
        const I = ({ children, size = 20, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );
        const Printer = (p) => <I {...p}><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></I>;
        const Eye = (p) => <I {...p}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></I>;
        const Download = (p) => <I {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></I>;
        const Upload = (p) => <I {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></I>;
        const Undo = (p) => <I {...p}><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></I>;
        const Check = (p) => <I {...p}><polyline points="20 6 9 17 4 12"/></I>;
        const Loader = (p) => <I {...p}><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></I>;
        const Settings = (p) => <I {...p}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></I>;
        const Save = (p) => <I {...p}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></I>;
        const Database = (p) => <I {...p}><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></I>;

        const TEAL = '#2A5C6E';
        const BLUE = '#4A90B8';
        const LogoRioLoa = ({ height = 30 }) => (
            <svg height={height} viewBox="0 0 230 60" xmlns="http://www.w3.org/2000/svg" style={{display:'block'}}>
                <text x="0" y="47" fontFamily="Arial, Helvetica, sans-serif" fontWeight="900" fontSize="54" letterSpacing="-3">
                    <tspan fill={TEAL}>RIO</tspan><tspan fill={BLUE}>LOA</tspan>
                </text>
            </svg>
        );

        const Section = ({ n, title, right, children }) => (
            <section className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                <div className="flex items-center justify-between px-5 py-3 border-b border-slate-100">
                    <h2 className="flex items-center gap-2 font-black uppercase tracking-tight text-slate-700">
                        <span className="flex items-center justify-center w-6 h-6 rounded-md text-white text-xs" style={{ background: TEAL }}>{n}</span>
                        {title}
                    </h2>
                    {right}
                </div>
                <div className="p-5">{children}</div>
            </section>
        );

        // ───────────────────────── APP ─────────────────────────
        const App = () => {
            const [store, setStore] = useState(() => {
                const base = defaultStore();
                try { const raw = localStorage.getItem(STORAGE_KEY); if (raw) return { ...base, ...JSON.parse(raw) }; } catch (e) {}
                return base;
            });
            const [escalaIdx, setEscalaIdx] = useState(() => { try { return Math.min(2, Math.max(0, parseInt(localStorage.getItem(ESCALA_KEY) || '0', 10) || 0)); } catch (e) { return 0; } });
            const [isGenerating, setIsGenerating] = useState(false);
            const [ajustesOpen, setAjustesOpen] = useState(false);
            const [saveNote, setSaveNote] = useState('Guardado');

            // Formulario de la charla actual
            const proximoTema = (relator, st) => ((st.progreso[relator] || 0) % TOTAL_TEMAS) + 1;
            const [form, setForm] = useState(() => {
                const rel = store.ultimoRelator || '';
                const relInfo = RELATORES.find(r => r.n === rel);
                const nTema = rel ? proximoTema(rel, store) : 1;
                return {
                    relator: rel,
                    cargo: relInfo ? relInfo.cargo : '',
                    turno: TURNOS[0],
                    cuadrilla: '',
                    fecha: hoyISO(),
                    temaN: nTema,
                    desarrollo: temaPorN(nTema).desarrollo,
                };
            });

            useEffect(() => { document.documentElement.style.fontSize = ESCALAS[escalaIdx].px + 'px'; try { localStorage.setItem(ESCALA_KEY, String(escalaIdx)); } catch (e) {} }, [escalaIdx]);

            useEffect(() => {
                try { localStorage.setItem(STORAGE_KEY, JSON.stringify(store)); setSaveNote('Guardado'); }
                catch (e) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ ...store, logo: null })); setSaveNote('Guardado (sin logo por tamaño)'); } catch (e2) { setSaveNote('No se pudo guardar'); } }
            }, [store]);

            const setF = (campo, valor) => setForm(prev => ({ ...prev, [campo]: valor }));

            const seleccionarRelator = (n) => {
                const r = RELATORES.find(x => x.n === n);
                const nTema = n ? proximoTema(n, store) : form.temaN;
                setForm(prev => ({ ...prev, relator: n, cargo: r ? r.cargo : '', temaN: nTema, desarrollo: temaPorN(nTema).desarrollo }));
            };
            const cambiarTema = (n) => setForm(prev => ({ ...prev, temaN: n, desarrollo: temaPorN(n).desarrollo }));

            // ─────────── Resumen de cumplimiento (mes en curso) ───────────
            const mesHoy = mesDe(hoyISO());
            const conteoMes = (relator) => store.historial.filter(h => h.relator === relator && mesDe(h.fecha) === mesHoy).length;
            const dictadasRelatorMes = form.relator
                ? store.historial.filter(h => h.relator === form.relator && mesDe(h.fecha) === mesHoy).slice().reverse()
                : [];

            // ─────────── Registrar una charla emitida ───────────
            const registrar = (folio) => {
                const tema = temaPorN(form.temaN);
                setStore(prev => ({
                    ...prev,
                    historial: [...prev.historial, { folio, fecha: form.fecha, relator: form.relator, cargo: form.cargo, turno: form.turno, cuadrilla: form.cuadrilla, temaN: form.temaN, temaTitulo: tema.titulo }],
                    progreso: { ...prev.progreso, [form.relator]: form.temaN },
                    folioSeq: prev.folioSeq + 1,
                    ultimoRelator: form.relator,
                }));
                const nextN = (form.temaN % TOTAL_TEMAS) + 1;
                setForm(prev => ({ ...prev, temaN: nextN, desarrollo: temaPorN(nextN).desarrollo }));
            };

            const deshacerUltima = () => {
                const idx = (() => { for (let k = store.historial.length - 1; k >= 0; k--) if (store.historial[k].relator === form.relator) return k; return -1; })();
                if (idx < 0) { alert('No hay charlas registradas de este relator para retroceder.'); return; }
                const removida = store.historial[idx];
                if (!confirm(`¿Deshacer la última charla de ${form.relator}?\n\n${removida.folio} · Tema ${removida.temaN}: ${removida.temaTitulo}`)) return;
                setStore(prev => {
                    const hist = prev.historial.slice(); hist.splice(idx, 1);
                    let prevN = 0; for (let k = hist.length - 1; k >= 0; k--) if (hist[k].relator === form.relator) { prevN = hist[k].temaN; break; }
                    return { ...prev, historial: hist, progreso: { ...prev.progreso, [form.relator]: prevN } };
                });
                cambiarTema(removida.temaN);
            };

            // ─────────── PDF ───────────
            const validar = () => {
                if (!form.relator) { alert('Selecciona el relator.'); return false; }
                if (!form.turno) { alert('Selecciona el turno.'); return false; }
                if (!form.cuadrilla) { alert('Selecciona la cuadrilla.'); return false; }
                return true;
            };

            const buildPDF = () => {
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'mm', 'a4');
                const PW = 210, PH = 297, ML = 14, MR = 14, MB = 14;
                const CW = PW - ML - MR;
                let curY = 0;
                const folio = `CH-${(form.fecha || hoyISO()).slice(0, 4)}-${String(store.folioSeq).padStart(3, '0')}`;
                const tema = temaPorN(form.temaN);

                const drawLogoText = () => {
                    pdf.setFont('helvetica', 'bold'); pdf.setFontSize(20);
                    pdf.setTextColor(42, 92, 110); pdf.text('RIO', ML, 15);
                    const w = pdf.getTextWidth('RIO');
                    pdf.setTextColor(74, 144, 184); pdf.text('LOA', ML + w, 15);
                };
                const drawHeader = () => {
                    if (store.logo) { try { const pr = pdf.getImageProperties(store.logo); const lh = 12, lw = Math.min(lh * (pr.width / pr.height), 55); pdf.addImage(store.logo, imgFormat(store.logo), ML, 6, lw, lh); } catch (e) { drawLogoText(); } }
                    else { drawLogoText(); }
                    pdf.setFont('helvetica', 'bold'); pdf.setFontSize(13); pdf.setTextColor(40, 40, 40);
                    pdf.text('REGISTRO DE CHARLA DE 5 MINUTOS', PW / 2, 12, { align: 'center' });
                    pdf.setFont('helvetica', 'normal'); pdf.setFontSize(8); pdf.setTextColor(110, 110, 110);
                    pdf.text('Charla diaria de seguridad', PW / 2, 17, { align: 'center' });
                    pdf.setFontSize(7); pdf.setTextColor(90, 90, 90);
                    pdf.text(`Folio: ${folio}`, PW - MR, 9, { align: 'right' });
                    pdf.text(`Código: ${store.codigo || '—'} · v${store.version || '—'}`, PW - MR, 13, { align: 'right' });
                    pdf.text(`Fecha: ${fechaTxt(form.fecha)}`, PW - MR, 17, { align: 'right' });
                    pdf.setDrawColor(42, 92, 110); pdf.setLineWidth(0.6); pdf.line(ML, 22, PW - MR, 22);
                    curY = 29;
                };
                const newPage = () => { pdf.addPage(); drawHeader(); };
                const ensureSpace = (nn) => { if (curY + nn > PH - MB) newPage(); };
                const sectionTitle = (txt) => {
                    ensureSpace(12);
                    pdf.setFillColor(42, 92, 110); pdf.rect(ML, curY, CW, 7, 'F');
                    pdf.setTextColor(255, 255, 255); pdf.setFont('helvetica', 'bold'); pdf.setFontSize(9);
                    pdf.text(txt.toUpperCase(), ML + 3, curY + 4.9);
                    pdf.setTextColor(0, 0, 0); curY += 10;
                };
                const fieldRow = (label, value) => {
                    ensureSpace(7);
                    pdf.setFont('helvetica', 'bold'); pdf.setFontSize(7.5); pdf.setTextColor(100, 100, 100);
                    pdf.text(label.toUpperCase(), ML, curY + 3.5);
                    pdf.setFont('helvetica', 'normal'); pdf.setFontSize(9); pdf.setTextColor(20, 20, 20);
                    const lines = pdf.splitTextToSize(value || '—', CW - 50);
                    pdf.text(lines, ML + 48, curY + 3.5);
                    pdf.setDrawColor(225, 225, 225); pdf.line(ML, curY + 6, ML + CW, curY + 6);
                    curY += Math.max(7, lines.length * 4.5 + 2);
                };
                const blockText = (label, value) => {
                    if (label) { ensureSpace(7); pdf.setFont('helvetica', 'bold'); pdf.setFontSize(7.5); pdf.setTextColor(100, 100, 100); pdf.text(label.toUpperCase(), ML, curY + 3); curY += 5; }
                    pdf.setFont('helvetica', 'normal'); pdf.setFontSize(9); pdf.setTextColor(30, 30, 30);
                    const lines = pdf.splitTextToSize(value || '—', CW);
                    lines.forEach(line => { ensureSpace(5); pdf.text(line, ML, curY + 3); curY += 4.6; });
                    curY += 2;
                };

                // ── HEADER ──
                drawHeader();

                // ── DATOS DE LA CHARLA ──
                sectionTitle('Datos de la charla');
                fieldRow('Relator', form.relator);
                fieldRow('Cargo', form.cargo);
                fieldRow('Turno', form.turno);
                fieldRow('Cuadrilla', form.cuadrilla);
                fieldRow('Tema', `N° ${tema.n} — ${tema.titulo}`);
                curY += 3;

                // ── DESARROLLO ──
                sectionTitle('Desarrollo de la charla');
                blockText('', form.desarrollo);
                if (tema.puntos && tema.puntos.length) {
                    ensureSpace(7); pdf.setFont('helvetica', 'bold'); pdf.setFontSize(7.5); pdf.setTextColor(100, 100, 100); pdf.text('PUNTOS CLAVE', ML, curY + 3); curY += 5;
                    pdf.setFont('helvetica', 'normal'); pdf.setFontSize(9); pdf.setTextColor(30, 30, 30);
                    tema.puntos.forEach(p => { const ls = pdf.splitTextToSize('•  ' + p, CW - 4); ls.forEach((l, j) => { ensureSpace(5); pdf.text(l, ML + (j ? 4 : 0), curY + 3); curY += 4.6; }); });
                }
                curY += 4;

                // ── ASISTENCIA ──
                const headH = 7, rowH = 7;
                const cols = [{ t: 'N°', w: 12 }, { t: 'Nombre completo', w: CW - 12 - 38 - 48 }, { t: 'RUT', w: 38 }, { t: 'Firma', w: 48 }];
                const drawTblHead = () => {
                    pdf.setFillColor(42, 92, 110); pdf.rect(ML, curY, CW, headH, 'F');
                    pdf.setTextColor(255, 255, 255); pdf.setFont('helvetica', 'bold'); pdf.setFontSize(8);
                    let x = ML; cols.forEach(c => { pdf.text(c.t, x + 2, curY + 4.8); x += c.w; });
                    curY += headH;
                };
                ensureSpace(14);
                pdf.setFont('helvetica', 'bold'); pdf.setFontSize(8.5); pdf.setTextColor(40, 40, 40);
                pdf.text('ASISTENTES', ML, curY + 3);
                pdf.setFont('helvetica', 'italic'); pdf.setFontSize(7.5); pdf.setTextColor(200, 60, 60);
                pdf.text('Cada asistente firma con lápiz azul', ML + 24, curY + 3);
                pdf.setFont('helvetica', 'normal'); curY += 6;
                drawTblHead();
                for (let i = 1; i <= TOTAL_FILAS_ASISTENCIA; i++) {
                    if (curY + rowH > PH - MB) { newPage(); drawTblHead(); }
                    pdf.setDrawColor(200, 200, 200); pdf.setLineWidth(0.2);
                    pdf.rect(ML, curY, CW, rowH);
                    let x = ML; cols.forEach((c, ci) => { if (ci < cols.length - 1) { x += c.w; pdf.line(x, curY, x, curY + rowH); } });
                    pdf.setTextColor(60, 60, 60); pdf.setFont('helvetica', 'normal'); pdf.setFontSize(8.5);
                    pdf.text(String(i), ML + 3, curY + 4.8);
                    curY += rowH;
                }
                curY += 6;

                // ── FIRMA DEL RELATOR ──
                ensureSpace(34);
                pdf.setFont('helvetica', 'bold'); pdf.setFontSize(8); pdf.setTextColor(40, 40, 40);
                pdf.text('RELATOR RESPONSABLE DE LA CHARLA', ML, curY + 3); curY += 9;
                pdf.setFont('helvetica', 'normal'); pdf.setFontSize(9); pdf.setTextColor(25, 25, 25);
                pdf.text(`Nombre: ${form.relator || '—'}`, ML, curY);
                pdf.text(`Cargo: ${form.cargo || '—'}`, ML + 95, curY);
                curY += 6;
                pdf.text(`Fecha: ${fechaTxt(form.fecha)}`, ML, curY);
                curY += 14;
                pdf.setDrawColor(42, 92, 110); pdf.setLineWidth(0.5); pdf.line(ML, curY, ML + 80, curY);
                pdf.setFont('helvetica', 'italic'); pdf.setFontSize(7); pdf.setTextColor(200, 60, 60);
                pdf.text('Firma del relator — lápiz azul', ML, curY + 4);

                // ── PIE ──
                const total = pdf.internal.getNumberOfPages();
                for (let p = 1; p <= total; p++) {
                    pdf.setPage(p);
                    pdf.setDrawColor(225, 225, 225); pdf.setLineWidth(0.2); pdf.line(ML, PH - 10, PW - MR, PH - 10);
                    pdf.setFont('helvetica', 'normal'); pdf.setFontSize(6.5); pdf.setTextColor(130, 130, 130);
                    pdf.text(`${folio} · ${store.codigo || ''} v${store.version || ''} · ${EJECUTORA}`, ML, PH - 5);
                    pdf.text(`Página ${p} de ${total}`, PW - MR, PH - 5, { align: 'right' });
                }

                const tag = `${form.relator || 'relator'}_T${tema.n}`.replace(/[^\w]+/g, '_').slice(0, 40);
                return { pdf, folio, filename: `Charla_${folio}_${tag}.pdf` };
            };

            const conPDF = (accion, requiereValidar = true) => {
                if (typeof window.jspdf === 'undefined') { alert('Las herramientas aún se están cargando, intenta de nuevo en unos segundos.'); return; }
                if (requiereValidar && !validar()) return;
                setIsGenerating(true);
                try { return accion(buildPDF()); }
                catch (e) { console.error(e); alert('Error con el PDF: ' + (e && e.message)); }
                finally { setIsGenerating(false); }
            };
            const imprimir = () => conPDF(({ pdf, folio }) => { pdf.autoPrint(); window.open(pdf.output('bloburl'), '_blank'); registrar(folio); });
            const descargarPDF = () => conPDF(({ pdf, filename, folio }) => { pdf.save(filename); registrar(folio); });
            const vistaPrevia = () => conPDF(({ pdf }) => { window.open(pdf.output('bloburl'), '_blank'); });

            // ─────────── Exportar ───────────
            const exportarCSV = () => {
                const head = ['folio', 'fecha', 'relator', 'cargo', 'turno', 'cuadrilla', 'tema_n', 'tema_titulo'];
                const rows = [head].concat(store.historial.map(h => [h.folio, h.fecha, h.relator, h.cargo, h.turno, h.cuadrilla, h.temaN, h.temaTitulo]));
                const csv = rows.map(r => r.map(c => `"${String(c == null ? '' : c).replace(/"/g, '""')}"`).join(',')).join('\r\n');
                descargar(new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' }), `historial_charlas_${mesHoy.slice(0, 4)}.csv`);
            };
            const exportarRespaldo = () => descargar(new Blob([JSON.stringify(store, null, 2)], { type: 'application/json' }), `respaldo_charlas_${hoyISO()}.json`);
            const importarRespaldo = (e) => {
                const f = e.target.files[0]; e.target.value = '';
                if (!f) return;
                const r = new FileReader();
                r.onload = () => { try { const obj = JSON.parse(r.result); if (!obj || !Array.isArray(obj.historial)) throw new Error('Archivo no válido'); if (confirm('¿Reemplazar los datos actuales con el respaldo?')) setStore({ ...defaultStore(), ...obj }); } catch (err) { alert('No se pudo leer el respaldo: ' + err.message); } };
                r.readAsText(f);
            };

            const limpiarTodo = () => { if (confirm('¿Borrar TODO: avance de supervisores e historial? Esta acción no se puede deshacer.')) { setStore(defaultStore()); } };

            const inputCls = "w-full p-3 border border-slate-300 rounded-lg bg-slate-50 focus:bg-white focus:ring-2 focus:ring-sky-200 focus:border-sky-400 outline-none text-base transition";
            const Label = ({ children }) => <label className="block text-xs font-bold text-slate-600 uppercase tracking-wide mb-1">{children}</label>;

            const temaActual = temaPorN(form.temaN);

            return (
                <div className="min-h-screen text-slate-800">
                    {/* BARRA SUPERIOR */}
                    <header className="sticky top-0 z-40 bg-white border-b border-slate-200 shadow-sm no-print">
                        <div className="max-w-3xl mx-auto px-4 py-3 flex items-center gap-3 flex-wrap">
                            <LogoRioLoa height={30} />
                            <div className="hidden sm:block border-l border-slate-200 pl-3">
                                <div className="text-sm font-black uppercase tracking-tight text-slate-700 leading-none">Charlas de 5 minutos</div>
                                <div className="text-[11px] text-slate-400 uppercase tracking-wide">Charla diaria de seguridad</div>
                            </div>
                            <div className="ml-auto flex items-center gap-2">
                                <button onClick={vistaPrevia} disabled={isGenerating} className="flex items-center gap-1.5 px-3 py-2 rounded-lg text-xs font-bold bg-white text-slate-600 border border-slate-300 hover:bg-slate-100 transition"><Eye size={15} /> <span className="hidden sm:inline">Vista previa</span></button>
                                <button onClick={imprimir} disabled={isGenerating} className="flex items-center gap-1.5 px-5 py-2 rounded-lg text-sm font-black uppercase tracking-wide text-white shadow transition" style={{ background: isGenerating ? '#94a3b8' : TEAL }}>{isGenerating ? <Loader size={18} className="animate-spin" /> : <Printer size={18} />} Imprimir</button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-3xl mx-auto p-4 md:p-6 space-y-5 pb-28">

                        {/* Tamaño de letra */}
                        <div className="flex items-center justify-center gap-2 no-print">
                            <span className="text-xs font-bold text-slate-500 uppercase tracking-wide">Tamaño de letra</span>
                            <div className="flex items-center gap-1 bg-white border border-slate-200 rounded-lg p-1 shadow-sm">
                                {ESCALAS.map((e, i) => (
                                    <button key={e.id} onClick={() => setEscalaIdx(i)} title={e.id} className="rounded-md font-black leading-none transition" style={{ fontSize: (14 + i * 5) + 'px', padding: '4px 12px', background: escalaIdx === i ? TEAL : 'transparent', color: escalaIdx === i ? '#fff' : '#475569' }}>A</button>
                                ))}
                            </div>
                        </div>

                        {/* Resumen de cumplimiento */}
                        <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-4">
                            <div className="flex items-center gap-2 mb-3">
                                <Check size={16} className="text-emerald-600" />
                                <span className="text-xs font-black uppercase tracking-tight text-slate-600">Cumplimiento del mes — {fechaTxt(hoyISO()).slice(3)}</span>
                                <span className="text-[11px] text-slate-400">(meta {META_MENSUAL}/mes)</span>
                            </div>
                            <div className="flex flex-wrap gap-2">
                                {SUPERVISORES.map(s => {
                                    const c = conteoMes(s);
                                    const ok = c >= META_MENSUAL, cero = c === 0;
                                    return (
                                        <div key={s} className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm border" style={{ background: ok ? '#f0fdf4' : cero ? '#fef2f2' : '#f8fafc', borderColor: ok ? '#bbf7d0' : cero ? '#fecaca' : '#e2e8f0' }}>
                                            <span className="font-semibold text-slate-700">{s.split(' ')[0]}</span>
                                            <span className="font-black" style={{ color: ok ? '#16a34a' : cero ? '#dc2626' : '#475569' }}>{c}</span>
                                            {ok && <Check size={14} className="text-emerald-600" />}
                                            {cero && <span className="text-red-500 font-bold">⚠</span>}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>

                        {/* 1. Relator */}
                        <Section n="1" title="Relator">
                            <Label>¿Quién dicta la charla?</Label>
                            <select className={inputCls} value={form.relator} onChange={e => seleccionarRelator(e.target.value)}>
                                <option value="">Seleccione…</option>
                                {GRUPOS_REL.map(g => (
                                    <optgroup key={g} label={g}>
                                        {RELATORES.filter(r => r.grupo === g).map(r => <option key={r.n} value={r.n}>{r.n} — {r.cargo}</option>)}
                                    </optgroup>
                                ))}
                            </select>
                            {form.relator && (
                                <div className="mt-4 rounded-xl border-2 p-4" style={{ borderColor: '#bfe3ef', background: '#f5fbfd' }}>
                                    <div className="flex items-center justify-between flex-wrap gap-2">
                                        <div>
                                            <div className="text-[11px] uppercase font-bold tracking-wide text-slate-400">Le toca ahora</div>
                                            <div className="font-black text-lg leading-tight" style={{ color: TEAL }}>N° {temaActual.n} — {temaActual.titulo}</div>
                                        </div>
                                        <div className="text-right">
                                            <div className="text-[11px] uppercase font-bold tracking-wide text-slate-400">Este mes</div>
                                            <div className="font-black text-2xl" style={{ color: conteoMes(form.relator) >= META_MENSUAL ? '#16a34a' : TEAL }}>{conteoMes(form.relator)}<span className="text-sm text-slate-400 font-bold">/{META_MENSUAL}</span></div>
                                        </div>
                                    </div>
                                    {dictadasRelatorMes.length > 0 && (
                                        <div className="mt-3 pt-3 border-t border-slate-200">
                                            <div className="text-[11px] uppercase font-bold tracking-wide text-slate-400 mb-1.5">Charlas dictadas este mes</div>
                                            <ul className="space-y-1">
                                                {dictadasRelatorMes.map((h, k) => (
                                                    <li key={k} className="flex items-center gap-2 text-sm text-slate-600">
                                                        <Check size={14} className="text-emerald-500 shrink-0" />
                                                        <span className="text-slate-400 tabular-nums">{fechaTxt(h.fecha)}</span>
                                                        <span className="font-semibold">N°{h.temaN}</span>
                                                        <span className="truncate">{h.temaTitulo}</span>
                                                    </li>
                                                ))}
                                            </ul>
                                        </div>
                                    )}
                                </div>
                            )}
                        </Section>

                        {/* 2. Datos de la charla */}
                        <Section n="2" title="Datos de la charla">
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div>
                                    <Label>Turno</Label>
                                    <select className={inputCls} value={form.turno} onChange={e => setF('turno', e.target.value)}>
                                        {TURNOS.map(t => <option key={t} value={t}>{t}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <Label>Cuadrilla</Label>
                                    <select className={inputCls} value={form.cuadrilla} onChange={e => setF('cuadrilla', e.target.value)}>
                                        <option value="">Seleccione cuadrilla…</option>
                                        {CUADRILLAS.map(c => <option key={c} value={c}>{c}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <Label>Fecha</Label>
                                    <input type="date" className={inputCls} value={form.fecha} onChange={e => setF('fecha', e.target.value)} />
                                </div>
                            </div>
                        </Section>

                        {/* 3. Tema */}
                        <Section n="3" title="Tema de la charla">
                            <Label>Tema (se autoselecciona; cámbialo si hoy tocó otro)</Label>
                            <select className={inputCls} value={form.temaN} onChange={e => cambiarTema(parseInt(e.target.value, 10))}>
                                {TEMAS.map(t => <option key={t.n} value={t.n}>N° {t.n} — {t.titulo}</option>)}
                            </select>
                            <div className="mt-4">
                                <Label>Desarrollo (precargado, editable)</Label>
                                <textarea lang="es" spellCheck={true} className={`${inputCls} h-32`} value={form.desarrollo} onChange={e => setF('desarrollo', e.target.value)} />
                                <button onClick={() => cambiarTema(form.temaN)} className="mt-1 text-[11px] text-slate-400 hover:text-sky-600 underline">↺ Restaurar texto original del tema</button>
                            </div>
                            {temaActual.puntos && (
                                <div className="mt-3 bg-slate-50 rounded-lg border border-slate-200 p-3">
                                    <div className="text-[11px] uppercase font-bold tracking-wide text-slate-400 mb-1">Puntos clave (van en el PDF)</div>
                                    <ul className="text-sm text-slate-600 space-y-0.5">{temaActual.puntos.map((p, k) => <li key={k}>• {p}</li>)}</ul>
                                </div>
                            )}
                        </Section>

                        {/* Botón grande IMPRIMIR */}
                        <button onClick={imprimir} disabled={isGenerating} className="w-full flex items-center justify-center gap-2 py-4 rounded-xl text-base font-black uppercase tracking-wide text-white shadow-lg transition" style={{ background: isGenerating ? '#94a3b8' : TEAL }}>
                            {isGenerating ? <Loader size={20} className="animate-spin" /> : <Printer size={20} />} Imprimir charla
                        </button>
                        <p className="text-center text-[11px] text-slate-400 -mt-3">Al imprimir o descargar se registra la charla y avanza al siguiente tema.</p>

                        {/* Acciones secundarias */}
                        <div className="flex items-center justify-center flex-wrap gap-x-5 gap-y-2 pt-1 text-xs">
                            <span className="flex items-center gap-1 text-emerald-600 font-semibold"><Save size={13} /> {saveNote}</span>
                            <button onClick={descargarPDF} className="flex items-center gap-1 text-slate-500 font-semibold hover:underline"><Download size={14} /> Descargar PDF</button>
                            <button onClick={deshacerUltima} className="flex items-center gap-1 text-amber-700 font-semibold hover:underline"><Undo size={14} /> Retroceder un tema</button>
                            <button onClick={exportarCSV} className="flex items-center gap-1 text-slate-500 font-semibold hover:underline"><Download size={14} /> Historial (CSV)</button>
                        </div>

                        {/* Ajustes */}
                        <div className="pt-2">
                            <button onClick={() => setAjustesOpen(o => !o)} className="flex items-center gap-1.5 text-xs text-slate-400 hover:text-slate-700 font-semibold mx-auto"><Settings size={13} /> Ajustes y respaldo {ajustesOpen ? '▲' : '▼'}</button>
                            {ajustesOpen && (
                                <div className="mt-3 bg-white rounded-xl border border-slate-200 shadow-sm p-5 space-y-4">
                                    <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
                                        <div><Label>Código</Label><input className={inputCls} value={store.codigo} onChange={e => setStore(p => ({ ...p, codigo: e.target.value }))} /></div>
                                        <div><Label>Versión</Label><input className={inputCls} value={store.version} onChange={e => setStore(p => ({ ...p, version: e.target.value }))} /></div>
                                        <div><Label>Próximo folio</Label><input type="number" className={inputCls} value={store.folioSeq} onChange={e => setStore(p => ({ ...p, folioSeq: Math.max(1, parseInt(e.target.value, 10) || 1) }))} /></div>
                                    </div>
                                    <div>
                                        <Label>Logo</Label>
                                        {store.logo
                                            ? <div className="flex items-center gap-2"><img src={store.logo} className="h-8 object-contain" /><button onClick={() => setStore(p => ({ ...p, logo: null }))} className="text-[11px] text-slate-400 hover:text-red-500 underline">quitar (usar logo por defecto)</button></div>
                                            : <div className="flex items-center gap-2"><LogoRioLoa height={24} /><label className="text-[11px] text-sky-600 hover:underline cursor-pointer flex items-center gap-1"><Upload size={12} /> reemplazar<input type="file" accept="image/*" className="hidden" onChange={e => { const f = e.target.files[0]; if (f) fileToDataURL(f, v => setStore(p => ({ ...p, logo: v }))); }} /></label></div>}
                                    </div>
                                    <div className="flex flex-wrap items-center gap-3 pt-2 border-t border-slate-100">
                                        <button onClick={exportarRespaldo} className="flex items-center gap-1.5 text-xs text-slate-600 font-semibold hover:text-sky-600"><Database size={14} /> Exportar respaldo (JSON)</button>
                                        <label className="flex items-center gap-1.5 text-xs text-slate-600 font-semibold hover:text-sky-600 cursor-pointer"><Upload size={14} /> Importar respaldo<input type="file" accept="application/json,.json" className="hidden" onChange={importarRespaldo} /></label>
                                        <button onClick={limpiarTodo} className="flex items-center gap-1.5 text-xs text-red-400 hover:text-red-600 font-semibold ml-auto"><Undo size={13} /> Borrar todo</button>
                                    </div>
                                    <p className="text-[11px] text-slate-400">La memoria (avance de cada supervisor e historial) vive en este equipo/navegador. Usa "Exportar respaldo" para no perderla si se limpia la caché o cambias de PC.</p>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>

    <!-- Bootstrap: compila el JSX con runtime clásico (evita los import del runtime automático) -->
    <script>
        (function () {
            try {
                var src = document.getElementById('app-source').textContent;
                var out = Babel.transform(src, { presets: [['react', { runtime: 'classic' }]] }).code;
                (0, eval)(out);
            } catch (e) {
                console.error(e);
                document.getElementById('root').innerHTML = '<div style="padding:24px;font-family:sans-serif;color:#b91c1c">Error al iniciar la app: ' + (e && e.message) + '</div>';
            }
        })();
    </script>
</body>
</html>
