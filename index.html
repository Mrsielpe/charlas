                y += 5.5;
                for (let i = 0; i < 5; i++) {
                    const p = (charla.puntos || [])[i];
                    if (p) { pdf.splitTextToSize('-   ' + p, CW - 12).forEach((l, k) => { pdf.text(l, ML + 8 + (k ? 3.5 : 0), y); y += 4.6; }); }
                    else { pdf.text('-', ML + 8, y); y += 4.6; }
                }
                y += 4;

                const FILAS = 22;
                const cols = [
                    { t: 'N°', w: 10 },
                    { t: 'Nombre Participantes', w: CW - 10 - 34 - 38 },
                    { t: 'Rut', w: 34 },
                    { t: 'Firma', w: 38 },
                ];
                const headH = 6.2;
                const espacioRestante = (PH - 40) - y;
                const rowH = Math.max(4.3, Math.min(6.4, (espacioRestante - headH) / FILAS));
                pdf.setDrawColor(GRIS_TABLA[0], GRIS_TABLA[1], GRIS_TABLA[2]); pdf.setLineWidth(0.25);
                pdf.rect(ML, y, CW, headH);
                pdf.setFont('helvetica', 'bold'); pdf.setFontSize(9);
                let cx = ML;
                cols.forEach(c => {
                    pdf.text(c.t, cx + c.w / 2, y + headH / 2 + 1.4, { align: 'center' });
                    cx += c.w;
                    if (cx < ML + CW - 0.1) pdf.line(cx, y, cx, y + headH + FILAS * rowH);
                });
                y += headH;
                pdf.setFont('helvetica', 'normal'); pdf.setFontSize(8.5);
                for (let i = 1; i <= FILAS; i++) {
                    pdf.rect(ML, y, CW, rowH);
                    pdf.text(String(i).padStart(2, '0'), ML + cols[0].w / 2, y + rowH / 2 + 1.3, { align: 'center' });
                    y += rowH;
                }
                y += 7;

                campo('Nombre Relator:', supervisor.nombre, ML, PW - MR, y);
                y += 9;
                campo('Firma Relator:', '', ML, PW - MR, y);
                y += 10;

                pdf.setFontSize(10); pdf.setFont('helvetica', 'normal');
                let bx = ML;
                pdf.text('Integrante del Comité PHS ', bx, y); bx += pdf.getTextWidth('Integrante del Comité PHS ');
                pdf.setFont('helvetica', 'bold'); pdf.text('SI', bx, y); bx += pdf.getTextWidth('SI') + 2;
                casilla(bx, y, false, 8, 4.8); bx += 12;
                pdf.setFont('helvetica', 'bold'); pdf.setFontSize(10); pdf.text('NO', bx, y); bx += pdf.getTextWidth('NO') + 2;
                casilla(bx, y, false, 8, 4.8); bx += 16;
                pdf.setFont('helvetica', 'normal'); pdf.setFontSize(10); pdf.text('Repr. Empresa', bx, y); bx += pdf.getTextWidth('Repr. Empresa') + 2;
                casilla(bx, y, false, 8, 4.8); bx += 14;
                pdf.text('Repr. Trabajadores', bx, y); bx += pdf.getTextWidth('Repr. Trabajadores') + 2;
                casilla(bx, y, false, 8, 4.8);
            };

            // ── PÁGINA DE APOYO (desarrollo del relator) ──
            const dibujarApoyo = (item) => {
                const supervisor = item.supervisor, charla = item.charla;
                drawEncabezado(item);
                let y2 = 33;
                pdf.setFont('helvetica', 'bold'); pdf.setFontSize(12); pdf.setTextColor(42, 92, 110);
                const tit2 = pdf.splitTextToSize(`Charla N°${charla.numero || '—'} — ${charla.titulo}`, CW);
                pdf.text(tit2, ML, y2); y2 += tit2.length * 5.5 + 2;
                pdf.setFont('helvetica', 'normal'); pdf.setFontSize(9); pdf.setTextColor(90, 90, 90);
                pdf.text(`Relator: ${supervisor.nombre} · Duración: ${charla.duracion || '5 minutos'} · Semana ${item.semana} · ${item.anio}`, ML, y2); y2 += 8;

                pdf.setFont('helvetica', 'bold'); pdf.setFontSize(8); pdf.setTextColor(100, 100, 100);
                pdf.text('DESARROLLO DE LA CHARLA (leer a la cuadrilla)', ML, y2); y2 += 5.5;
                pdf.setFont('helvetica', 'normal'); pdf.setFontSize(10); pdf.setTextColor(30, 30, 30);
                pdf.splitTextToSize(charla.desarrollo || '—', CW).forEach(l => { pdf.text(l, ML, y2); y2 += 5.1; });
                y2 += 5;

                if ((charla.puntos || []).length) {
                    pdf.setFont('helvetica', 'bold'); pdf.setFontSize(8); pdf.setTextColor(100, 100, 100);
                    pdf.text('PUNTOS CLAVE', ML, y2); y2 += 5.5;
                    pdf.setFont('helvetica', 'normal'); pdf.setFontSize(10); pdf.setTextColor(30, 30, 30);
                    charla.puntos.forEach(p => {
                        pdf.splitTextToSize('•  ' + p, CW - 4).forEach((l, k) => { pdf.text(l, ML + (k ? 4 : 0), y2); y2 += 5.1; });
                    });
                }
                y2 += 5;

                // Pauta de evaluación para el relator (pregunta + respuesta correcta) — apoya y agiliza la corrección
                const ensureApoyo = (n) => { if (y2 + n > PH - 14) { pdf.addPage(); drawEncabezado(item); pageFolio[pdf.internal.getNumberOfPages()] = item.folio; y2 = 30; } };
                if ((charla.preguntas || []).length) {
                    ensureApoyo(12);
                    pdf.setFont('helvetica', 'bold'); pdf.setFontSize(8); pdf.setTextColor(100, 100, 100);
                    pdf.text('PAUTA DE EVALUACIÓN — respuesta correcta marcada (para el relator)', ML, y2); y2 += 6;
                    charla.preguntas.forEach((p, i) => {
                        ensureApoyo(11);
                        pdf.setFont('helvetica', 'bold'); pdf.setFontSize(9); pdf.setTextColor(42, 92, 110);
                        pdf.splitTextToSize(`${i + 1}. ${p.q}`, CW).forEach(l => { ensureApoyo(4.6); pdf.text(l, ML, y2); y2 += 4.6; });
                        pdf.setFont('helvetica', 'normal'); pdf.setFontSize(9); pdf.setTextColor(22, 163, 74);
                        const letra = String.fromCharCode(65 + (p.correcta || 0));
                        pdf.splitTextToSize(`Respuesta correcta: ${letra}) ${p.alt[p.correcta || 0]}`, CW - 5).forEach(l => { ensureApoyo(4.6); pdf.text(l, ML + 4, y2); y2 += 4.6; });
                        y2 += 2;
                    });
                    y2 += 3;
                }

                ensureApoyo(6);
                pdf.setFont('helvetica', 'italic'); pdf.setFontSize(8); pdf.setTextColor(130, 130, 130);
                pdf.text(`Hoja de apoyo para el relator. El registro firmado es la página anterior (${config.codigo || 'REG-RRHH-002'}).`, ML, y2);
            };

            // Armar el documento (una o varias charlas)
            items.forEach((item, idx) => {
                if (idx > 0) pdf.addPage();
                dibujarRegistro(item);
                pageFolio[pdf.internal.getNumberOfPages()] = item.folio;
                pdf.addPage();
                dibujarApoyo(item);
                pageFolio[pdf.internal.getNumberOfPages()] = item.folio;
            });

            const total = pdf.internal.getNumberOfPages();
            for (let p = 1; p <= total; p++) {
                pdf.setPage(p);
                pdf.setFont('helvetica', 'normal'); pdf.setFontSize(6.5); pdf.setTextColor(150, 150, 150);
                pdf.text(`${pageFolio[p] || ''} · ${config.codigo || ''} v${config.version || ''} · ${EJECUTORA}`, ML, PH - 6);
                pdf.text(`Página ${p} de ${total}`, PW - MR, PH - 6, { align: 'right' });
            }
            return pdf;
        };
        const buildPDF = (item) => buildDoc([item], item.config);
        const buildPDFMes = (items, config) => buildDoc(items, config);
        // ───────────────────────── PDF — EVALUACIÓN (formato Río Loa, réplica del modelo) ─────────────────────────
        // conClave=true incluye la pauta de respuestas (para el evaluador); false = versión para el trabajador.
        const buildEvaluacion = (charla, config, opts) => {
            opts = opts || {};
            const conClave = opts.conClave !== false;
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            const PW = 210, PH = 297, ML = 16, MR = 16, CW = PW - ML - MR;
            const TEAL = [42, 92, 110], BLUE = [74, 144, 184], GRIS = [191, 191, 191], TXT = [51, 65, 85];
            let y = 0;

            const logoText = () => {
                pdf.setFont('helvetica', 'bold'); pdf.setFontSize(15); pdf.setTextColor(TEAL[0], TEAL[1], TEAL[2]);
                pdf.text('RIO', ML, 15);
                pdf.setTextColor(BLUE[0], BLUE[1], BLUE[2]); pdf.text('LOA', ML + pdf.getTextWidth('RIO') + 1, 15);
                pdf.setFont('helvetica', 'normal'); pdf.setFontSize(5); pdf.setTextColor(90, 90, 90);
                pdf.text('Maquinaria y Construcción', ML, 18.5);
            };
            const header = () => {
                if (config.logo) {
                    try { const pr = pdf.getImageProperties(config.logo); const lh = 12, lw = Math.min(lh * (pr.width / pr.height), 46); pdf.addImage(config.logo, imgFormat(config.logo), ML, 7, lw, lh); }
                    catch (e) { logoText(); }
                } else logoText();
                const bw = 66, bx = PW - MR - bw, by = 7, bh = 13;
                pdf.setFillColor(TEAL[0], TEAL[1], TEAL[2]); pdf.rect(bx, by, bw, bh, 'F');
                pdf.setFont('helvetica', 'bold'); pdf.setFontSize(9); pdf.setTextColor(150, 200, 222);
                pdf.text('EVALUACIÓN DE CHARLA', bx + bw / 2, by + 5.5, { align: 'center' });
                pdf.setFont('helvetica', 'normal'); pdf.setFontSize(7); pdf.setTextColor(255, 255, 255);
                pdf.text('CT Padre Hurtado · Río Loa', bx + bw / 2, by + 10, { align: 'center' });
                y = 28;
            };
            const ensure = (n) => { if (y + n > PH - 16) { pdf.addPage(); y = 18; } };
            const band = (txt) => {
                ensure(11);
                pdf.setFillColor(TEAL[0], TEAL[1], TEAL[2]); pdf.rect(ML, y, CW, 7, 'F');
                pdf.setFont('helvetica', 'bold'); pdf.setFontSize(9.5); pdf.setTextColor(255, 255, 255);
                pdf.text(txt, ML + 3, y + 4.8); y += 10;
            };

            header();
            pdf.setFont('helvetica', 'bold'); pdf.setFontSize(15); pdf.setTextColor(TEAL[0], TEAL[1], TEAL[2]);
            pdf.text('EVALUACIÓN DE CAPACITACIÓN', PW / 2, y, { align: 'center' }); y += 6;
            pdf.setFont('helvetica', 'italic'); pdf.setFontSize(10); pdf.setTextColor(90, 90, 90);
            const sub = pdf.splitTextToSize('Charla N°' + (charla.numero || '—') + ' — ' + charla.titulo, CW - 10);
            pdf.text(sub, PW / 2, y, { align: 'center' }); y += sub.length * 5 + 4;

            // 1. Identificación
            band('1.  IDENTIFICACIÓN DEL TRABAJADOR');
            const idRows = [['Nombre completo:', 'RUT:'], ['Cargo / GES:', 'Área / Sección:'], ['Fecha evaluación:', 'Relator / Evaluador:']];
            const labW = 34, valW = (CW - 2 * labW) / 2, rowH = 8;
            idRows.forEach(([l1, l2]) => {
                ensure(rowH);
                const xs = [ML, ML + labW, ML + labW + valW, ML + labW + valW + labW], ws = [labW, valW, labW, valW];
                pdf.setDrawColor(GRIS[0], GRIS[1], GRIS[2]); pdf.setLineWidth(0.25);
                [l1, '', l2, ''].forEach((t, ci) => {
                    pdf.rect(xs[ci], y, ws[ci], rowH);
                    if (t) { pdf.setFont('helvetica', 'bold'); pdf.setFontSize(8); pdf.setTextColor(TXT[0], TXT[1], TXT[2]); pdf.text(t, xs[ci] + 2, y + rowH / 2 + 1.3); }
                });
                y += rowH;
            });
            y += 4;

            // Instrucciones
            const insText = 'Lea cada pregunta y marque con una X la alternativa que considere correcta. Solo existe una respuesta correcta por pregunta. Esta evaluación es individual.';
            const ins = pdf.splitTextToSize(insText, CW - 6);
            const insH = 7 + ins.length * 4;
            ensure(insH + 2);
            pdf.setDrawColor(GRIS[0], GRIS[1], GRIS[2]); pdf.setLineWidth(0.25); pdf.setFillColor(248, 250, 252); pdf.rect(ML, y, CW, insH, 'FD');
            pdf.setFont('helvetica', 'bold'); pdf.setFontSize(8.5); pdf.setTextColor(TEAL[0], TEAL[1], TEAL[2]); pdf.text('Instrucciones:', ML + 3, y + 5);
            pdf.setFont('helvetica', 'normal'); pdf.setFontSize(8); pdf.setTextColor(TXT[0], TXT[1], TXT[2]);
            ins.forEach((l, i) => pdf.text(l, ML + 3, y + 9.5 + i * 4));
            y += insH + 5;

            // 2. Preguntas
            band('2.  PREGUNTAS DE EVALUACIÓN');
            (charla.preguntas || []).forEach((p, i) => {
                const qLines = pdf.splitTextToSize('Pregunta ' + (i + 1) + ':   ' + p.q, CW - 6);
                const qh = qLines.length * 4.6 + 3;
                ensure(qh + 20);
                pdf.setFillColor(TEAL[0], TEAL[1], TEAL[2]); pdf.rect(ML, y, CW, qh, 'F');
                pdf.setFont('helvetica', 'bold'); pdf.setFontSize(8.5); pdf.setTextColor(255, 255, 255);
                qLines.forEach((l, k) => pdf.text(l, ML + 3, y + 4.6 + k * 4.6));
                y += qh;
                p.alt.forEach((a, ai) => {
                    const aLines = pdf.splitTextToSize(a, CW - 14);
                    const ah = Math.max(7, aLines.length * 4.4 + 2.6);
                    ensure(ah);
                    pdf.setDrawColor(GRIS[0], GRIS[1], GRIS[2]); pdf.setLineWidth(0.25);
                    pdf.setFillColor(TEAL[0], TEAL[1], TEAL[2]); pdf.rect(ML, y, 8, ah, 'F');
                    pdf.setFont('helvetica', 'bold'); pdf.setFontSize(9); pdf.setTextColor(255, 255, 255);
                    pdf.text(String.fromCharCode(65 + ai), ML + 4, y + ah / 2 + 1.3, { align: 'center' });
                    pdf.rect(ML + 8, y, CW - 8, ah);
                    pdf.setFont('helvetica', 'normal'); pdf.setFontSize(8.5); pdf.setTextColor(TXT[0], TXT[1], TXT[2]);
                    const startY = y + (ah - aLines.length * 4.4) / 2 + 3.2;
                    aLines.forEach((l, k) => pdf.text(l, ML + 11, startY + k * 4.4));
                    y += ah;
                });
                y += 3;
            });

            // Pauta de respuestas (solo versión evaluador)
            if (conClave) {
                const clave = (charla.preguntas || []).map((p, i) => 'P' + (i + 1) + ': ' + String.fromCharCode(65 + p.correcta)).join('     |     ');
                ensure(14);
                pdf.setDrawColor(GRIS[0], GRIS[1], GRIS[2]); pdf.setFillColor(240, 249, 244); pdf.rect(ML, y, CW, 12, 'FD');
                pdf.setFont('helvetica', 'bold'); pdf.setFontSize(8.5); pdf.setTextColor(TEAL[0], TEAL[1], TEAL[2]); pdf.text('RESPUESTAS CORRECTAS', ML + 3, y + 5);
                pdf.setFont('helvetica', 'normal'); pdf.setFontSize(8); pdf.setTextColor(TXT[0], TXT[1], TXT[2]); pdf.text(clave, ML + 3, y + 9.5);
                y += 16;
            }

            // 3. Resultado
            band('3.  RESULTADO DE LA EVALUACIÓN');
            const rc = ['N° de respuestas correctas', 'Puntaje obtenido', 'Puntaje mínimo de aprobación', 'Resultado'];
            const rw = CW / 4, rH = 9;
            ensure(rH + 13);
            pdf.setFillColor(TEAL[0], TEAL[1], TEAL[2]); pdf.rect(ML, y, CW, rH, 'F');
            pdf.setFont('helvetica', 'bold'); pdf.setFontSize(7); pdf.setTextColor(255, 255, 255);
            rc.forEach((t, ci) => { const lines = pdf.splitTextToSize(t, rw - 4); lines.forEach((l, k) => pdf.text(l, ML + ci * rw + rw / 2, y + rH / 2 + 0.5 - (lines.length - 1) * 1.7 + k * 3.4, { align: 'center' })); });
            y += rH;
            const vH = 11;
            pdf.setDrawColor(GRIS[0], GRIS[1], GRIS[2]); for (let ci = 0; ci < 4; ci++) pdf.rect(ML + ci * rw, y, rw, vH);
            pdf.setFont('helvetica', 'bold'); pdf.setFontSize(10); pdf.setTextColor(TEAL[0], TEAL[1], TEAL[2]);
            pdf.text('____  / 7', ML + rw / 2, y + 7, { align: 'center' });
            pdf.text('____  pts', ML + rw + rw / 2, y + 7, { align: 'center' });
            pdf.setFontSize(8.5); pdf.setTextColor(TXT[0], TXT[1], TXT[2]); pdf.text('5 / 7  (71%)', ML + 2 * rw + rw / 2, y + 7, { align: 'center' });
            pdf.setFont('helvetica', 'bold'); pdf.setFontSize(8); pdf.setTextColor(22, 163, 74); pdf.text('APROBADO  [   ]', ML + 3 * rw + rw / 2, y + 5, { align: 'center' });
            pdf.setTextColor(220, 38, 38); pdf.text('REPROBADO  [   ]', ML + 3 * rw + rw / 2, y + 9, { align: 'center' });
            y += vH + 5;

            // 4. Compromiso
            band('4.  COMPROMISO DE CUMPLIMIENTO');
            ensure(6); pdf.setFont('helvetica', 'bold'); pdf.setFontSize(8.5); pdf.setTextColor(TEAL[0], TEAL[1], TEAL[2]); pdf.text('Declaración de Compromiso', ML, y + 3); y += 6;
            pdf.setFont('helvetica', 'normal'); pdf.setFontSize(8); pdf.setTextColor(TXT[0], TXT[1], TXT[2]);
            const dec = pdf.splitTextToSize('Yo, el trabajador identificado en este documento, declaro haber recibido y comprendido la charla sobre ' + (charla.titulo || '').toLowerCase() + ', y me comprometo a:', CW);
            dec.forEach(l => { ensure(4.4); pdf.text(l, ML, y + 3); y += 4.4; }); y += 1;
            (charla.compromiso || []).forEach((c, i) => { const ls = pdf.splitTextToSize((i + 1) + '.   ' + c, CW - 4); ls.forEach((l, k) => { ensure(4.4); pdf.text(l, ML + (k ? 5 : 0), y + 3); y += 4.4; }); });
            y += 2;
            pdf.setFont('helvetica', 'italic'); pdf.setFontSize(7.5); pdf.setTextColor(110, 110, 110);
            pdf.splitTextToSize('Entiendo que el incumplimiento de estas medidas puede exponer mi seguridad y la de mis compañeros, y derivar en las sanciones que establece el Reglamento Interno de Higiene y Seguridad de la empresa.', CW).forEach(l => { ensure(4); pdf.text(l, ML, y + 3); y += 4; });
            y += 8;

            // Firmas
            const halfW = (CW - 12) / 2;
            const firmaLine = (x, w, label) => {
                pdf.setDrawColor(120, 120, 120); pdf.setLineWidth(0.3); pdf.line(x, y + 9, x + w, y + 9);
                pdf.setFont('helvetica', 'normal'); pdf.setFontSize(7.5); pdf.setTextColor(90, 90, 90); pdf.text(label, x + w / 2, y + 13, { align: 'center' });
            };
            ensure(20);
            firmaLine(ML, halfW, 'Firma del Trabajador'); firmaLine(ML + halfW + 12, halfW, 'Fecha');
            y += 22; ensure(18);
            firmaLine(ML, halfW, 'Firma Encargado de Prevención de Riesgos'); firmaLine(ML + halfW + 12, halfW, 'Firma Supervisor / Jefe Directo');
            y += 16;

            // Pie en todas las páginas
            const total = pdf.internal.getNumberOfPages();
            for (let p = 1; p <= total; p++) {
                pdf.setPage(p);
                pdf.setFont('helvetica', 'italic'); pdf.setFontSize(7); pdf.setTextColor(140, 140, 140);
                pdf.text('Documento controlado — ' + EJECUTORA + ' · CT Padre Hurtado · archivar en el expediente del trabajador.', ML, PH - 8);
                pdf.setFont('helvetica', 'normal'); pdf.setTextColor(150, 150, 150); pdf.text('Pág. ' + p + ' de ' + total, PW - MR, PH - 8, { align: 'right' });
            }
            return pdf;
        };

        // ───────────────────────── APP ─────────────────────────
        const App = () => {
            const [store, setStore] = useState(() => {
                const base = defaultStore();
                try { const raw = localStorage.getItem(STORAGE_KEY); if (raw) return { ...base, ...JSON.parse(raw) }; } catch (e) {}
                return base;
            });
            const [escalaIdx, setEscalaIdx] = useState(() => { try { return Math.min(2, Math.max(0, parseInt(localStorage.getItem('rioloa_prog_escala') || '0', 10) || 0)); } catch (e) { return 0; } });
            const [saveNote, setSaveNote] = useState('Guardado');
            // Estado de la nube: cargando | ok | guardando | local | sin-clave | error
            const [nube, setNube] = useState({ modo: 'cargando', updated: null });
            const [claveModal, setClaveModal] = useState(false);
            const storeRef = useRef(store);
            const saltarPush = useRef(false);
            const putTimer = useRef(null);
            const anioActual = new Date().getFullYear();
            const [anio, setAnio] = useState(anioActual);
            const [tab, setTab] = useState('semanas');
            const [msg, setMsg] = useState('');

            const guardarLocal = (st) => {
                try { localStorage.setItem(STORAGE_KEY, JSON.stringify(st)); }
                catch (e) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ ...st, logo: null })); } catch (e2) {} }
            };
            const pushNube = async (st) => {
                setNube(n => ({ ...n, modo: 'guardando' })); setSaveNote('Guardando en la nube…');
                try { const d = await NUBE.put(st); setNube({ modo: 'ok', updated: d.updated }); setSaveNote('Guardado en la nube'); }
                catch (e) {
                    if (e.code === 401) { setNube({ modo: 'sin-clave', updated: null }); setSaveNote('Falta la clave de la nube'); }
                    else { setNube(n => ({ modo: 'error', updated: n.updated })); setSaveNote('Sin conexión — guardado local'); }
                }
            };
            const enlazarNube = async () => {
                setNube({ modo: 'cargando', updated: null }); setSaveNote('Conectando…');
                try {
                    const data = await NUBE.get();
                    if (data && data.json) {
                        saltarPush.current = true;
                        setStore({ ...defaultStore(), ...data.json });
                        setNube({ modo: 'ok', updated: data.updated }); setSaveNote('Cargado de la nube');
                    } else {
                        setNube({ modo: 'ok', updated: null });
                        pushNube(storeRef.current);
                    }
                } catch (e) {
                    if (e.code === 401) { setNube({ modo: 'sin-clave', updated: null }); setSaveNote('Guardado local (falta clave)'); }
                    else { setNube({ modo: 'local', updated: null }); setSaveNote('Guardado local'); }
                }
            };

            useEffect(() => { enlazarNube(); }, []);
            useEffect(() => { document.documentElement.style.fontSize = ESCALAS[escalaIdx].px + 'px'; try { localStorage.setItem('rioloa_prog_escala', String(escalaIdx)); } catch (e) {} }, [escalaIdx]);
            useEffect(() => {
                storeRef.current = store;
                guardarLocal(store);
                if (saltarPush.current) { saltarPush.current = false; return; }
                if (nube.modo === 'ok' || nube.modo === 'guardando' || nube.modo === 'error') {
                    setSaveNote('Guardando…');
                    clearTimeout(putTimer.current);
                    putTimer.current = setTimeout(() => pushNube(store), 900);
                } else if (nube.modo === 'sin-clave') { setSaveNote('Guardado local (falta clave)'); }
                else if (nube.modo === 'local') { setSaveNote('Guardado local'); }
            }, [store]);

            const aviso = (t) => { setMsg(t); setTimeout(() => setMsg(''), 4000); };

            const { semana: semanaHoy, anio: anioHoy } = semanaISO(hoyISO());
            const semanaActual = anio === anioHoy ? semanaHoy : (anio < anioHoy ? 999 : 0);
            const filas = store.programa[anio] || [];
            const activas = store.charlas.filter(c => c.estado === 'activa');
            const charlaDe = (id) => store.charlas.find(c => c.id === id) || { titulo: '(charla eliminada)', desarrollo: '', puntos: [] };
            const config = { codigo: store.codigo, version: store.version, logo: store.logo };

            // ── mutaciones del programa ──
            const setFilas = (fn) => setStore(prev => ({ ...prev, programa: { ...prev.programa, [anio]: fn(prev.programa[anio] || []) } }));
            const keyDe = (f) => `${f.semana}|${f.supervisorId}`;

            const generarPrograma = (desde) => {
                const total = semanasDelAnio(anio);
                if (!activas.length) { aviso('No hay charlas activas en el catálogo.'); return; }
                if (!store.supervisores.length) { aviso('No hay supervisores configurados (Ajustes).'); return; }
                setFilas(prev => {
                    const existentes = new Set(prev.map(keyDe));
                    const nuevas = [];
                    for (const s of store.supervisores)
                        for (let w = desde; w <= total; w++) {
                            if (existentes.has(`${w}|${s.id}`)) continue;
                            nuevas.push({ semana: w, supervisorId: s.id, charlaId: activas[(w - desde) % activas.length].id, charlaOriginalId: null, motivo: null, estado: 'programada', folio: null, fechaEntrega: null, fechaCharla: null });
                        }
                    aviso(`✓ Programa ${anio} generado: semanas ${desde} a ${total} (${nuevas.length} hojas planificadas).`);
                    return [...prev, ...nuevas].sort((a, b) => a.semana - b.semana || a.supervisorId.localeCompare(b.supervisorId));
                });
            };

            const reemplazar = (semana, supervisorId, charlaId, motivo) => {
                let cambiadas = 0, saltadas = 0;
                setFilas(prev => prev.map(f => {
                    if (f.semana !== semana) return f;
                    if (supervisorId && f.supervisorId !== supervisorId) return f;
                    if (f.estado !== 'programada') { saltadas++; return f; }  // ya impresa/entregada: no se toca
                    cambiadas++;
                    return { ...f, charlaOriginalId: f.charlaOriginalId ?? f.charlaId, charlaId, motivo: motivo || null };
                }));
                setTimeout(() => aviso(`✓ Reemplazo aplicado a ${cambiadas} hoja(s).${saltadas ? ` ${saltadas} no se tocaron por estar ya impresas.` : ''}`), 0);
            };
            const restaurar = (semana, supervisorId) => {
                setFilas(prev => prev.map(f =>
                    (f.semana === semana && (!supervisorId || f.supervisorId === supervisorId) && f.charlaOriginalId != null && f.estado === 'programada')
                        ? { ...f, charlaId: f.charlaOriginalId, charlaOriginalId: null, motivo: null } : f));
                aviso('✓ Charla original restaurada.');
            };

            const imprimirFila = (fila) => {
                const sup = store.supervisores.find(s => s.id === fila.supervisorId);
                const charla = charlaDe(fila.charlaId);
                let folio = fila.folio;
                if (!folio) {
                    folio = `CH-${anio}-${String(store.folioSeq).padStart(3, '0')}`;
                    setStore(prev => ({ ...prev, folioSeq: prev.folioSeq + 1 }));
                }
                try {
                    const pdf = buildPDF({ supervisor: sup, charla, folio, config, anio, semana: fila.semana });
                    pdf.autoPrint();
                    window.open(pdf.output('bloburl'), '_blank');
                } catch (e) { aviso('Error con el PDF: ' + e.message); return; }
                setFilas(prev => prev.map(f => keyDe(f) === keyDe(fila)
                    ? { ...f, folio, fechaEntrega: f.fechaEntrega || hoyISO(), estado: f.estado === 'programada' ? 'entregada' : f.estado } : f));
            };
            const vistaPrevia = (fila) => {
                const sup = store.supervisores.find(s => s.id === fila.supervisorId);
                try {
                    const pdf = buildPDF({ supervisor: sup, charla: charlaDe(fila.charlaId), folio: fila.folio || 'BORRADOR', config, anio, semana: fila.semana });
                    window.open(pdf.output('bloburl'), '_blank');
                } catch (e) { aviso('Error con el PDF: ' + e.message); }
            };
            // Impresión del mes completo (todas las hojas del mes en un PDF)
            const imprimirMes = (mes, soloPreview) => {
                const delMes = (filas || []).filter(f => mesDeSemana(anio, f.semana) === mes)
                    .slice().sort((a, b) => a.supervisorId.localeCompare(b.supervisorId) || a.semana - b.semana);
                if (!delMes.length) { aviso('No hay charlas programadas en ' + MESES[mes - 1] + '.'); return; }
                let seq = store.folioSeq;
                const asign = [];
                const items = delMes.map(f => {
                    const sup = store.supervisores.find(s => s.id === f.supervisorId) || { nombre: f.supervisorId, cargo: '' };
                    let folio = f.folio;
                    if (!folio) { folio = soloPreview ? 'BORRADOR' : `CH-${anio}-${String(seq).padStart(3, '0')}`; if (!soloPreview) seq++; }
                    if (!soloPreview) asign.push({ key: keyDe(f), folio });
                    return { supervisor: sup, charla: charlaDe(f.charlaId), folio, anio, semana: f.semana };
                });
                try {
                    const pdf = buildPDFMes(items, config);
                    if (!soloPreview) pdf.autoPrint();
                    window.open(pdf.output('bloburl'), '_blank');
                } catch (e) { aviso('Error con el PDF: ' + e.message); return; }
                if (soloPreview) return;
                const mapF = {}; asign.forEach(a => { mapF[a.key] = a.folio; });
                setStore(prev => {
                    const prog = { ...prev.programa };
                    prog[anio] = (prog[anio] || []).map(f => {
                        const nf = mapF[keyDe(f)];
                        if (nf === undefined) return f;
                        return { ...f, folio: nf, fechaEntrega: f.fechaEntrega || hoyISO(), estado: f.estado === 'programada' ? 'entregada' : f.estado };
                    });
                    return { ...prev, programa: prog, folioSeq: seq };
                });
                aviso(`✓ ${MESES[mes - 1]}: ${delMes.length} hoja(s) generadas y marcadas como entregadas.`);
            };
            // Evaluación de la charla (para responder). conClave=false = versión del trabajador; true = pauta del evaluador.
            const abrirEval = (charla, conClave) => {
                if (!charla || !(charla.preguntas || []).length) { aviso('Esta charla aún no tiene evaluación cargada.'); return; }
                try {
                    const pdf = buildEvaluacion(charla, config, { conClave: !!conClave });
                    if (!conClave) pdf.autoPrint();
                    window.open(pdf.output('bloburl'), '_blank');
                } catch (e) { aviso('Error con la evaluación: ' + e.message); }
            };
            const marcar = (fila, estado, fechaCharla) => {
                setFilas(prev => prev.map(f => keyDe(f) === keyDe(fila)
                    ? { ...f, estado, fechaCharla: estado === 'cumplida' ? (fechaCharla || f.fechaCharla || hoyISO()) : (estado === 'no_cumplida' ? null : f.fechaCharla) } : f));
            };
            const setFechaCharla = (fila, fecha) => setFilas(prev => prev.map(f => keyDe(f) === keyDe(fila) ? { ...f, fechaCharla: fecha } : f));

            // ── exportar / respaldo ──
            const exportarCSV = () => {
                const head = ['anio', 'semana', 'rango', 'supervisor', 'folio', 'tema_n', 'tema_titulo', 'estado', 'fecha_entrega', 'fecha_charla', 'motivo_reemplazo'];
                const rows = [head].concat(filas.map(f => {
                    const c = charlaDe(f.charlaId);
                    const s = store.supervisores.find(x => x.id === f.supervisorId) || { nombre: f.supervisorId };
                    return [anio, f.semana, rangoSemana(anio, f.semana), s.nombre, f.folio || '', c.numero || '', c.titulo, f.estado, f.fechaEntrega || '', f.fechaCharla || '', f.motivo || ''];
                }));
                const csv = rows.map(r => r.map(c => `"${String(c == null ? '' : c).replace(/"/g, '""')}"`).join(',')).join('\r\n');
                descargar(new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' }), `programa_charlas_${anio}.csv`);
            };
            const exportarRespaldo = () => descargar(new Blob([JSON.stringify(store, null, 2)], { type: 'application/json' }), `respaldo_programa_charlas_${hoyISO()}.json`);
            const importarRespaldo = (e) => {
                const f = e.target.files[0]; e.target.value = '';
                if (!f) return;
                const r = new FileReader();
                r.onload = () => { try { const obj = JSON.parse(r.result); if (!obj || !obj.programa || !obj.charlas) throw new Error('Archivo no válido'); if (confirm('¿Reemplazar los datos actuales con el respaldo?')) setStore({ ...defaultStore(), ...obj }); } catch (err) { alert('No se pudo leer el respaldo: ' + err.message); } };
                r.readAsText(f);
            };

            const TABS = [['semanas', 'Semanas'], ['tablero', 'Tablero'], ['programa', 'Programa'], ['charlas', 'Charlas'], ['ajustes', 'Ajustes']];

            return (
                <div className="min-h-screen text-slate-800">
                    <header className="sticky top-0 z-40 bg-white border-b border-slate-200 shadow-sm">
                        <div className="max-w-5xl mx-auto px-4 py-3 flex items-center gap-3 flex-wrap">
                            {store.logo ? <img src={store.logo} alt="Logo" style={{ height: 28 }} className="object-contain" /> : <LogoRioLoa height={28} />}
                            <div className="border-l border-slate-200 pl-3">
                                <div className="text-sm font-black uppercase tracking-tight text-slate-700 leading-none">Programa de charlas</div>
                                <div className="text-[11px] text-slate-400 uppercase tracking-wide">Panel de programación · CT Padre Hurtado</div>
                            </div>
                            <div className="ml-auto flex items-center gap-2">
                                <button onClick={() => setClaveModal(true)} title="Estado de sincronización — clic para la clave de la nube" className="flex items-center gap-1.5 font-semibold text-xs px-2 py-1 rounded-lg hover:bg-slate-50" style={{ color: (NUBE_INFO[nube.modo] || NUBE_INFO.local).color }}>
                                    <Nube size={15} /> <span className="hidden sm:inline">{saveNote}</span>
                                </button>
                            </div>
                        </div>
                    </header>
                    {claveModal && <ModalClave claveActual={NUBE.clave()} onCerrar={() => setClaveModal(false)} onGuardar={(c) => { try { localStorage.setItem(CLAVE_KEY, c); } catch (e) {} setClaveModal(false); enlazarNube(); }} />}

                    <main className="max-w-5xl mx-auto p-4 md:p-6 space-y-5 pb-16">
                        <div className="flex items-center gap-2 flex-wrap">
                            <div className="flex gap-1 bg-white border border-slate-200 rounded-xl p-1 shadow-sm text-sm font-bold flex-1 min-w-[300px] overflow-x-auto">
                                {TABS.map(([t, titulo]) => (
                                    <button key={t} onClick={() => setTab(t)} className="flex-1 py-2 px-3 rounded-lg whitespace-nowrap transition"
                                        style={{ background: tab === t ? TEAL : 'transparent', color: tab === t ? '#fff' : '#64748b' }}>{titulo}</button>
                                ))}
                            </div>
                            <select className="p-2.5 border border-slate-300 rounded-xl bg-white text-sm font-bold" value={anio} onChange={e => setAnio(parseInt(e.target.value, 10))}>
                                {[anioActual - 1, anioActual, anioActual + 1].map(a => <option key={a} value={a}>{a}</option>)}
                            </select>
                        </div>
                        {msg && <div className="text-sm font-semibold text-emerald-700 bg-emerald-50 border border-emerald-200 rounded-xl px-4 py-2.5">{msg}</div>}

                        {tab === 'semanas' && <TabSemanas filas={filas} anio={anio} semanaActual={semanaActual} store={store} charlaDe={charlaDe}
                            imprimirFila={imprimirFila} vistaPrevia={vistaPrevia} imprimirMes={imprimirMes} abrirEval={abrirEval} marcar={marcar} setFechaCharla={setFechaCharla} irPrograma={() => setTab('programa')} />}
                        {tab === 'tablero' && <TabTablero filas={filas} anio={anio} semanaActual={semanaActual} store={store} charlaDe={charlaDe} exportarCSV={exportarCSV} />}
                        {tab === 'programa' && <TabPrograma filas={filas} anio={anio} semanaActual={semanaActual} store={store} activas={activas} charlaDe={charlaDe}
                            generarPrograma={generarPrograma} reemplazar={reemplazar} restaurar={restaurar} />}
                        {tab === 'charlas' && <TabCharlas store={store} setStore={setStore} aviso={aviso} />}
                        {tab === 'ajustes' && <TabAjustes store={store} setStore={setStore} aviso={aviso} exportarRespaldo={exportarRespaldo} importarRespaldo={importarRespaldo} nube={nube} abrirClave={() => setClaveModal(true)} sincronizar={() => pushNube(store)} reconectar={enlazarNube} />}

                        {/* Tamaño de letra */}
                        <div className="flex items-center justify-center gap-2 pt-2">
                            <span className="text-xs font-bold text-slate-500 uppercase tracking-wide">Tamaño de letra</span>
                            <div className="flex items-center gap-1 bg-white border border-slate-200 rounded-lg p-1 shadow-sm">
                                {ESCALAS.map((e, i) => (
                                    <button key={e.id} onClick={() => setEscalaIdx(i)} title={e.id} className="rounded-md font-black leading-none transition" style={{ fontSize: (14 + i * 5) + 'px', padding: '4px 12px', background: escalaIdx === i ? TEAL : 'transparent', color: escalaIdx === i ? '#fff' : '#475569' }}>A</button>
                                ))}
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        // ── TAB: Semanas (operación diaria: imprimir y marcar resultado) ──
        const TabSemanas = ({ filas, anio, semanaActual, store, charlaDe, imprimirFila, vistaPrevia, imprimirMes, abrirEval, marcar, setFechaCharla, irPrograma }) => {
            const semanas = [...new Set(filas.map(f => f.semana))].sort((a, b) => a - b);
            const mesActualNum = new Date().getMonth() + 1;
            const [mesImp, setMesImp] = useState(() => (semanaActual >= 1 && semanaActual <= 53) ? mesActualNum : 1);
            const [sem, setSem] = useState(() => semanas.includes(semanaActual) ? semanaActual : (semanas[0] || 1));
            useEffect(() => { if (semanas.includes(semanaActual)) setSem(semanaActual); }, [anio]);

            if (!filas.length) return (
                <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-8 text-center text-slate-500 text-sm">
                    Aún no hay programa para {anio}. Ve a la pestaña <button onClick={irPrograma} className="font-bold text-sky-600 underline">Programa</button> y genéralo.
                </div>
            );

            const idx = semanas.indexOf(sem);
            const filasSem = filas.filter(f => f.semana === sem);
            const pendReimpresion = filas.filter(f => f.semana < semanaActual && f.estado === 'programada').length;

            return (
                <div className="space-y-4">
                    {pendReimpresion > 0 && (
                        <div className="flex items-start gap-2 text-sm text-amber-800 bg-amber-50 border border-amber-200 rounded-xl px-4 py-3">
                            <Alerta size={18} className="shrink-0 mt-0.5" />
                            <div>Hay <b>{pendReimpresion} hoja(s) de semanas pasadas sin imprimir</b>. Navega con las flechas para revisarlas.</div>
                        </div>
                    )}

                    <div className="bg-white border border-slate-200 rounded-xl p-3 shadow-sm flex flex-wrap items-center gap-2">
                        <span className="text-xs font-black uppercase tracking-tight text-slate-600 flex items-center gap-1.5"><Printer size={15} /> Imprimir el mes completo</span>
                        <select className="p-2 border border-slate-200 rounded-lg bg-slate-50 font-bold text-sm" value={mesImp} onChange={e => setMesImp(parseInt(e.target.value, 10))}>
                            {MESES.map((m, i) => <option key={m} value={i + 1}>{m}</option>)}
                        </select>
                        <button onClick={() => imprimirMes(mesImp, false)} className="flex items-center gap-1.5 px-4 py-2 rounded-lg text-xs font-black uppercase tracking-wide text-white" style={{ background: TEAL }}><Printer size={14} /> Imprimir mes</button>
                        <button onClick={() => imprimirMes(mesImp, true)} className="flex items-center gap-1 px-3 py-2 rounded-lg border border-slate-300 text-xs font-bold text-slate-600 hover:bg-slate-100"><Eye size={13} /> Vista previa</button>
                        <span className="text-[11px] text-slate-400 basis-full">Genera todas las hojas del mes (una por supervisor y semana, con su apoyo). Al imprimir se marcan como entregadas y se les asigna folio.</span>
                    </div>

                    <div className="flex items-center gap-2 bg-white border border-slate-200 rounded-xl p-2 shadow-sm">
                        <button onClick={() => idx > 0 && setSem(semanas[idx - 1])} disabled={idx <= 0} className="p-2 rounded-lg border border-slate-200 text-slate-500 disabled:opacity-30"><Chevron dir="l" size={18} /></button>
                        <select className="flex-1 p-2 border border-slate-200 rounded-lg bg-slate-50 font-bold text-center" value={sem} onChange={e => setSem(parseInt(e.target.value, 10))}>
                            {semanas.map(s => <option key={s} value={s}>Semana {s} · {rangoSemana(anio, s)}{s === semanaActual ? '  ← actual' : ''}</option>)}
                        </select>
                        <button onClick={() => idx < semanas.length - 1 && setSem(semanas[idx + 1])} disabled={idx >= semanas.length - 1} className="p-2 rounded-lg border border-slate-200 text-slate-500 disabled:opacity-30"><Chevron size={18} /></button>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {filasSem.map(f => {
                            const c = charlaDe(f.charlaId);
                            const s = store.supervisores.find(x => x.id === f.supervisorId) || { nombre: f.supervisorId, cargo: '' };
                            const E = ESTADOS[f.estado];
                            return (
                                <div key={f.supervisorId} className="bg-white rounded-xl border shadow-sm p-4 space-y-3" style={{ borderColor: E.border }}>
                                    <div className="flex items-start justify-between gap-2">
                                        <div>
                                            <div className="font-black text-slate-700">{s.nombre}</div>
                                            <div className="text-sm mt-0.5" style={{ color: TEAL }}>{c.numero ? `N° ${c.numero} — ` : ''}{c.titulo}</div>
                                        </div>
                                        <span className="text-[11px] font-black uppercase tracking-wide px-2 py-1 rounded-lg shrink-0" style={{ color: E.color, background: E.bg }}>{E.txt}</span>
                                    </div>
                                    {f.charlaOriginalId != null && (
                                        <div className="text-xs text-amber-800 bg-amber-50 border border-amber-200 rounded-lg px-2.5 py-1.5">
                                            ⇄ Reemplaza a "{charlaDe(f.charlaOriginalId).titulo}"{f.motivo ? ` — ${f.motivo}` : ''}
                                        </div>
                                    )}
                                    <div className="text-xs text-slate-400 flex gap-3 flex-wrap">
                                        {f.folio && <span>Folio <b className="text-slate-600">{f.folio}</b></span>}
                                        {f.fechaEntrega && <span>Impresa {fechaTxt(f.fechaEntrega)}</span>}
                                        {f.estado === 'cumplida' && (
                                            <span className="flex items-center gap-1">Dictada
                                                <input type="date" className="border border-slate-200 rounded px-1 text-xs" value={f.fechaCharla || ''} onChange={e => setFechaCharla(f, e.target.value)} />
                                            </span>
                                        )}
                                    </div>
                                    <div className="flex gap-2 flex-wrap pt-1">
                                        {f.estado === 'programada' && (
                                            <>
                                                <BotonTeal onClick={() => imprimirFila(f)} className="flex-1 !py-2"><Printer size={15} /> Imprimir hoja</BotonTeal>
                                                <button onClick={() => vistaPrevia(f)} className="flex items-center gap-1 px-3 rounded-xl border border-slate-300 text-xs font-bold text-slate-600 hover:bg-slate-100"><Eye size={13} /> Ver</button>
                                            </>
                                        )}
                                        {f.estado === 'entregada' && (
                                            <>
                                                <button onClick={() => marcar(f, 'cumplida')} className="flex-1 flex items-center justify-center gap-1.5 py-2 rounded-xl text-xs font-black uppercase text-white" style={{ background: '#16a34a' }}><Check size={14} /> Cumplida</button>
                                                <button onClick={() => marcar(f, 'no_cumplida')} className="flex-1 flex items-center justify-center gap-1.5 py-2 rounded-xl text-xs font-black uppercase text-white" style={{ background: '#dc2626' }}><X size={14} /> No cumplida</button>
                                                <button onClick={() => imprimirFila(f)} title="Reimprimir" className="px-3 rounded-xl border border-slate-300 text-slate-500 hover:bg-slate-100"><Printer size={14} /></button>
                                            </>
                                        )}
                                        {(f.estado === 'cumplida' || f.estado === 'no_cumplida') && (
                                            <>
                                                <button onClick={() => marcar(f, 'entregada')} className="flex items-center gap-1 px-3 py-2 rounded-xl border border-slate-300 text-xs font-bold text-slate-500 hover:bg-slate-100"><Undo size={13} /> Corregir</button>
                                                <button onClick={() => imprimirFila(f)} title="Reimprimir" className="px-3 rounded-xl border border-slate-300 text-slate-500 hover:bg-slate-100"><Printer size={14} /></button>
                                            </>
                                        )}
                                    </div>
                                    <div className="flex items-center gap-2 flex-wrap pt-2 mt-1 border-t border-slate-100">
                                        <span className="text-[11px] font-black uppercase tracking-wide text-slate-400">Evaluación</span>
                                        {(c.preguntas || []).length > 0 ? (
                                            <>
                                                <button onClick={() => abrirEval(c, false)} className="flex items-center gap-1 px-3 py-1.5 rounded-lg text-xs font-bold text-white" style={{ background: BLUE }}><Printer size={13} /> Imprimir (1 por trabajador)</button>
                                                <button onClick={() => abrirEval(c, true)} title="Versión con respuestas para el evaluador" className="flex items-center gap-1 px-2.5 py-1.5 rounded-lg border border-slate-300 text-xs font-bold text-slate-600 hover:bg-slate-100"><Eye size={12} /> Pauta</button>
                                            </>
                                        ) : <span className="text-[11px] text-slate-300 italic">en desarrollo</span>}
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                    <p className="text-center text-[11px] text-slate-400">La <b>hoja</b> (registro de asistencia) y la <b>evaluación</b> se imprimen por separado. La evaluación se imprime 1 por trabajador; "Pauta" es la versión con respuestas para corregir.</p>
                </div>
            );
        };

        // ── TAB: Tablero (verificación) ──
        const TabTablero = ({ filas, anio, semanaActual, store, charlaDe, exportarCSV }) => {
            const [detalle, setDetalle] = useState('');
            const meta = store.metaMensual;
            const porSup = (id) => filas.filter(f => f.supervisorId === id);
            const mesActual = new Date().getMonth() + 1;
            const esAnioActual = anio === new Date().getFullYear();

            // cumplidas por mes: usa la fecha real de la charla; si no la tiene, el mes de la semana
            const cumplidasMes = (id, mes) => porSup(id).filter(f => f.estado === 'cumplida' && (f.fechaCharla ? mesDe(f.fechaCharla) === mes : mesDeSemana(anio, f.semana) === mes)).length;

            if (!filas.length) return <div className="bg-white rounded-xl border border-slate-200 shadow-sm p-8 text-center text-slate-500 text-sm">Sin programa para {anio}.</div>;

            return (
                <div className="space-y-5">
                    <Section title={`Semana actual${semanaActual >= 1 && semanaActual <= 53 ? ' (S' + semanaActual + ')' : ''}`}>
                        <div className="flex flex-wrap gap-2">
                            {store.supervisores.map(s => {
                                const f = porSup(s.id).find(x => x.semana === semanaActual);
                                const E = f ? ESTADOS[f.estado] : null;
                                return (
                                    <div key={s.id} className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm border" style={{ background: E ? E.bg : '#f8fafc', borderColor: E ? E.border : '#e2e8f0' }}>
                                        <span className="font-semibold text-slate-700">{s.nombre.split(' ')[0]}</span>
                                        {E ? <span className="text-[11px] font-black uppercase" style={{ color: E.color }}>{E.txt}</span> : <span className="text-[11px] text-slate-400">sin programa</span>}
                                    </div>
                                );
                            })}
                        </div>
                    </Section>

                    <Section title={`Resumen mensual ${anio} (meta ${meta}/mes)`} right={
                        <button onClick={exportarCSV} className="flex items-center gap-1 text-xs font-bold text-sky-600 hover:underline"><Download size={14} /> Exportar CSV</button>
                    }>
                        <div className="overflow-x-auto">
                            <table className="w-full text-sm">
                                <thead>
                                    <tr className="text-[11px] uppercase text-slate-400">
                                        <th className="text-left py-1 pr-2">Supervisor</th>
                                        {MESES.map(m => <th key={m} className="px-1 font-bold">{m}</th>)}
                                        <th className="pl-2">Año</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {store.supervisores.map(s => {
                                        const fs = porSup(s.id);
                                        const cumplidas = fs.filter(f => f.estado === 'cumplida').length;
                                        const transcurridas = fs.filter(f => f.semana <= semanaActual).length;
                                        return (
                                            <tr key={s.id} className="border-t border-slate-100">
                                                <td className="py-1.5 pr-2 font-semibold text-slate-700 whitespace-nowrap">{s.nombre.split(' ')[0]}</td>
                                                {MESES.map((m, i) => {
                                                    const c = cumplidasMes(s.id, i + 1);
                                                    const hayProgramado = fs.some(f => mesDeSemana(anio, f.semana) === i + 1);
                                                    const futuro = esAnioActual ? i + 1 > mesActual : anio > new Date().getFullYear();
                                                    const color = (!hayProgramado || futuro) ? '#cbd5e1' : c >= meta ? '#16a34a' : c === 0 ? '#dc2626' : '#d97706';
                                                    return <td key={m} className="text-center font-black tabular-nums" style={{ color }}>{(!hayProgramado || futuro) ? '·' : c}</td>;
                                                })}
                                                <td className="pl-2 text-center font-black whitespace-nowrap" style={{ color: transcurridas && cumplidas >= transcurridas ? '#16a34a' : TEAL }}>{cumplidas}/{transcurridas}</td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                        <p className="text-[11px] text-slate-400 mt-2">Cuenta solo las charlas marcadas <b>cumplidas</b>. La columna "Año" las compara con las semanas ya transcurridas del programa. El CSV sirve de insumo para el informe mensual.</p>
                    </Section>

                    <Section title="Detalle por supervisor">
                        <select className={inputCls} value={detalle} onChange={e => setDetalle(e.target.value)}>
                            <option value="">Selecciona un supervisor…</option>
                            {store.supervisores.map(s => <option key={s.id} value={s.id}>{s.nombre}</option>)}
                        </select>
                        {detalle && (
                            <div className="mt-4 space-y-1">
                                {porSup(detalle).map(f => {
                                    const c = charlaDe(f.charlaId);
                                    const E = ESTADOS[f.estado];
                                    return (
                                        <div key={f.semana} className="flex items-center gap-2 text-sm py-1 px-2 rounded-lg" style={{ background: f.semana === semanaActual ? '#f5fbfd' : 'transparent' }}>
                                            <span className="w-12 shrink-0 font-black text-slate-400 tabular-nums">S{f.semana}</span>
                                            <span className="w-24 shrink-0 text-[11px] text-slate-400 hidden sm:block">{rangoSemana(anio, f.semana)}</span>
                                            <span className="flex-1 truncate text-slate-700">{c.numero ? `N°${c.numero} ` : ''}{c.titulo}{f.charlaOriginalId != null ? ' ⇄' : ''}</span>
                                            {f.folio && <span className="text-[11px] font-mono text-slate-400 shrink-0 hidden sm:inline">{f.folio}</span>}
                                            <span className="text-[11px] font-black uppercase shrink-0" style={{ color: E.color }}>{E.txt}{f.estado === 'cumplida' && f.fechaCharla ? ` ${fechaTxt(f.fechaCharla)}` : ''}</span>
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </Section>
                </div>
            );
        };

        // ── TAB: Programa (generar / reemplazar) ──
        const TabPrograma = ({ filas, anio, semanaActual, store, activas, charlaDe, generarPrograma, reemplazar, restaurar }) => {
            const semDefecto = semanaActual >= 1 && semanaActual <= 53 ? semanaActual : 1;
            const [desde, setDesde] = useState(semDefecto);
            const [rep, setRep] = useState({ semana: semDefecto, supervisorId: '', charlaId: '', motivo: '' });
            const semanas = [...new Set(filas.map(f => f.semana))].sort((a, b) => a - b);
            const filasSemana = filas.filter(f => f.semana === parseInt(rep.semana, 10));

            return (
                <div className="space-y-5">
                    {filas.length === 0 ? (
                        <Section title={`Generar programa anual ${anio}`}>
                            <p className="text-sm text-slate-500 mb-4">Asigna las {activas.length} charlas activas, en orden desde la N°1, a cada semana del año para los {store.supervisores.length} supervisores. Después puedes reemplazar semanas puntuales.</p>
                            <div className="mb-4">
                                <Label>Empezar desde la semana {semDefecto === semanaActual ? `(la actual es la S${semanaActual})` : ''}</Label>
                                <input type="number" min={1} max={53} className={inputCls} value={desde} onChange={e => setDesde(e.target.value)} />
                            </div>
                            <BotonTeal onClick={() => confirm(`¿Generar el programa ${anio} desde la semana ${desde} para todos los supervisores?`) && generarPrograma(parseInt(desde, 10) || 1)} className="w-full">Generar programa {anio}</BotonTeal>
                        </Section>
                    ) : (
                        <Section title="Reemplazar la charla de una semana" right={
                            <button onClick={() => confirm(`¿Completar las semanas faltantes del ${anio}?`) && generarPrograma(semanas.length ? Math.max(...semanas) + 1 : 1)} className="text-xs font-bold text-sky-600 hover:underline">Completar semanas faltantes</button>
                        }>
                            <p className="text-sm text-slate-500 mb-4">Para situaciones puntuales (incidente, condición nueva, campaña): elige la semana y la charla que la sustituye. La original queda guardada y puedes restaurarla. Las hojas ya impresas no se tocan.</p>
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div>
                                    <Label>Semana</Label>
                                    <select className={inputCls} value={rep.semana} onChange={e => setRep(r => ({ ...r, semana: parseInt(e.target.value, 10) }))}>
                                        {semanas.map(s => <option key={s} value={s}>S{s} · {rangoSemana(anio, s)}{s === semanaActual ? ' (actual)' : ''}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <Label>Aplicar a</Label>
                                    <select className={inputCls} value={rep.supervisorId} onChange={e => setRep(r => ({ ...r, supervisorId: e.target.value }))}>
                                        <option value="">Todos los supervisores</option>
                                        {store.supervisores.map(s => <option key={s.id} value={s.id}>{s.nombre}</option>)}
                                    </select>
                                </div>
                                <div className="sm:col-span-2">
                                    <Label>Charla que entra en su lugar</Label>
                                    <select className={inputCls} value={rep.charlaId} onChange={e => setRep(r => ({ ...r, charlaId: e.target.value }))}>
                                        <option value="">Seleccione…</option>
                                        {activas.map(c => <option key={c.id} value={c.id}>{c.numero ? `N° ${c.numero} — ` : ''}{c.titulo}</option>)}
                                    </select>
                                </div>
                                <div className="sm:col-span-2">
                                    <Label>Motivo (queda en el registro y el CSV)</Label>
                                    <input className={inputCls} value={rep.motivo} onChange={e => setRep(r => ({ ...r, motivo: e.target.value }))} placeholder="Ej: incidente con grúa horquilla el 28-06" />
                                </div>
                            </div>
                            <BotonTeal onClick={() => { if (!rep.charlaId) { alert('Elige la charla de reemplazo.'); return; } reemplazar(parseInt(rep.semana, 10), rep.supervisorId || null, parseInt(rep.charlaId, 10), rep.motivo); }} className="w-full mt-4">Aplicar reemplazo</BotonTeal>

                            {filasSemana.length > 0 && (
                                <div className="mt-5 pt-4 border-t border-slate-100">
                                    <div className="text-[11px] uppercase font-bold tracking-wide text-slate-400 mb-2">Así queda la semana S{rep.semana}</div>
                                    <div className="space-y-1">
                                        {filasSemana.map(f => {
                                            const c = charlaDe(f.charlaId);
                                            const s = store.supervisores.find(x => x.id === f.supervisorId) || { nombre: f.supervisorId };
                                            return (
                                                <div key={f.supervisorId} className="flex items-center gap-2 text-sm py-1">
                                                    <span className="w-24 shrink-0 font-semibold text-slate-600">{s.nombre.split(' ')[0]}</span>
                                                    <span className="flex-1 truncate">{c.numero ? `N°${c.numero} ` : ''}{c.titulo}</span>
                                                    {f.estado !== 'programada' && <span className="text-[11px] font-black uppercase" style={{ color: ESTADOS[f.estado].color }}>{ESTADOS[f.estado].txt}</span>}
                                                    {f.charlaOriginalId != null && f.estado === 'programada' && (
                                                        <button onClick={() => restaurar(f.semana, f.supervisorId)} className="text-[11px] font-bold text-amber-700 hover:underline shrink-0">restaurar original</button>
                                                    )}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}
                        </Section>
                    )}
                </div>
            );
        };

        // ── TAB: Charlas (catálogo) ──
        const TabCharlas = ({ store, setStore, aviso }) => {
            const [nueva, setNueva] = useState({ titulo: '', desarrollo: '', puntos: '', duracion: '5 minutos' });
            const [editando, setEditando] = useState(null);
            const activas = store.charlas.filter(c => c.estado === 'activa');

            const crear = () => {
                if (!nueva.titulo || !nueva.desarrollo) { aviso('La charla necesita título y desarrollo.'); return; }
                setStore(prev => {
                    const maxId = Math.max(0, ...prev.charlas.map(c => c.id));
                    const maxN = Math.max(0, ...prev.charlas.filter(c => c.estado === 'activa').map(c => c.numero || 0));
                    return { ...prev, charlas: [...prev.charlas, { id: maxId + 1, numero: maxN + 1, titulo: nueva.titulo, desarrollo: nueva.desarrollo, puntos: nueva.puntos.split('\n').map(s => s.trim()).filter(Boolean).slice(0, 5), duracion: nueva.duracion || '5 minutos', estado: 'activa' }] };
                });
                setNueva({ titulo: '', desarrollo: '', puntos: '', duracion: '5 minutos' });
                aviso('✓ Charla creada. Ya puedes usarla en reemplazos o al completar semanas.');
            };
            const archivar = (c) => {
                if (!confirm(`¿Archivar "${c.titulo}"? No se usará en programas nuevos (las semanas ya asignadas la conservan).`)) return;
                setStore(prev => ({ ...prev, charlas: prev.charlas.map(x => x.id === c.id ? { ...x, estado: 'archivada' } : x) }));
            };
            const guardarEdicion = () => {
                setStore(prev => ({ ...prev, charlas: prev.charlas.map(x => x.id === editando.id ? { ...x, titulo: editando.titulo, desarrollo: editando.desarrollo, puntos: editando.puntos.split('\n').map(s => s.trim()).filter(Boolean).slice(0, 5), duracion: editando.duracion || '5 minutos' } : x) }));
                setEditando(null); aviso('✓ Charla actualizada.');
            };
            const reponerCatalogo = () => {
                const titulos = new Set(store.charlas.map(c => c.titulo.trim().toLowerCase()));
                const faltantes = TEMAS.filter(t => !titulos.has(t.titulo.trim().toLowerCase()));
                if (!faltantes.length) { aviso('El catálogo ya incluye todas las charlas base.'); return; }
                if (!confirm(`Se agregarán ${faltantes.length} charla(s) del catálogo base que hoy no tienes. Tus charlas y tu programa no se modifican. ¿Continuar?`)) return;
                setStore(prev => {
                    let maxId = Math.max(0, ...prev.charlas.map(c => c.id));
                    let maxN = Math.max(0, ...prev.charlas.filter(c => c.estado === 'activa').map(c => c.numero || 0));
                    const nuevas = faltantes.map(t => ({ id: ++maxId, numero: ++maxN, titulo: t.titulo, desarrollo: t.desarrollo, puntos: t.puntos, duracion: '5 minutos', estado: 'activa' }));
                    return { ...prev, charlas: [...prev.charlas, ...nuevas] };
                });
                aviso(`✓ Se agregaron ${faltantes.length} charla(s) del catálogo base.`);
            };
            const faltanBase = TEMAS.filter(t => !store.charlas.some(c => c.titulo.trim().toLowerCase() === t.titulo.trim().toLowerCase())).length;

            return (
                <div className="space-y-5">
                    <Section title="Crear charla nueva (para reemplazos o situaciones específicas)">
                        <div className="space-y-3">
                            <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
                                <div className="sm:col-span-2"><Label>Título</Label><input className={inputCls} value={nueva.titulo} onChange={e => setNueva(p => ({ ...p, titulo: e.target.value }))} placeholder="Ej: Cuidado con la zanja abierta en patio de acopio" /></div>
                                <div><Label>Duración</Label><input className={inputCls} value={nueva.duracion} onChange={e => setNueva(p => ({ ...p, duracion: e.target.value }))} placeholder="Ej: 5 minutos" /></div>
                            </div>
                            <div><Label>Desarrollo (lo que se lee a la cuadrilla)</Label><textarea className={`${inputCls} h-36`} value={nueva.desarrollo} onChange={e => setNueva(p => ({ ...p, desarrollo: e.target.value }))} /></div>
                            <div><Label>Temas tratados / puntos clave (uno por línea, hasta 5)</Label><textarea className={`${inputCls} h-24`} value={nueva.puntos} onChange={e => setNueva(p => ({ ...p, puntos: e.target.value }))} placeholder="Escribe hasta 5 temas, uno por línea" /></div>
                            <BotonTeal onClick={crear} className="w-full">Crear charla</BotonTeal>
                        </div>
                    </Section>

                    <Section title={`Catálogo activo (${activas.length} charlas)`} right={
                        faltanBase > 0 ? <button onClick={reponerCatalogo} className="text-xs font-bold text-sky-600 hover:underline">+ Reponer {faltanBase} charla(s) base</button> : null
                    }>
                        <div className="space-y-3">
                            {activas.map(c => (
                                <div key={c.id} className="border border-slate-200 rounded-xl p-4 bg-white">
                                    <div className="flex items-start justify-between gap-2">
                                        <div className="font-bold text-slate-700">{c.numero ? `N° ${c.numero} — ` : ''}{c.titulo}</div>
                                        <div className="flex gap-2 shrink-0">
                                            <button onClick={() => setEditando({ id: c.id, titulo: c.titulo, desarrollo: c.desarrollo, puntos: (c.puntos || []).join('\n'), duracion: c.duracion || '5 minutos' })} className="text-xs font-bold text-sky-600 hover:underline">Editar</button>
                                            <button onClick={() => archivar(c)} className="text-xs font-bold text-red-500 hover:underline">Archivar</button>
                                        </div>
                                    </div>
                                    <p className="text-sm text-slate-500 mt-2 line-clamp-2">{c.desarrollo}</p>
                                </div>
                            ))}
                        </div>
                    </Section>

                    {editando && (
                        <div className="fixed inset-0 z-50 bg-black/40 flex items-center justify-center p-4" onClick={() => setEditando(null)}>
                            <div className="bg-white rounded-2xl shadow-xl p-6 w-full max-w-2xl max-h-[90vh] overflow-y-auto space-y-3" onClick={e => e.stopPropagation()}>
                                <h3 className="font-black uppercase text-slate-700 text-sm">Editar charla</h3>
                                <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
                                    <div className="sm:col-span-2"><Label>Título</Label><input className={inputCls} value={editando.titulo} onChange={e => setEditando(p => ({ ...p, titulo: e.target.value }))} /></div>
                                    <div><Label>Duración</Label><input className={inputCls} value={editando.duracion} onChange={e => setEditando(p => ({ ...p, duracion: e.target.value }))} placeholder="Ej: 5 minutos" /></div>
                                </div>
                                <div><Label>Desarrollo</Label><textarea className={`${inputCls} h-48`} value={editando.desarrollo} onChange={e => setEditando(p => ({ ...p, desarrollo: e.target.value }))} /></div>
                                <div><Label>Temas tratados / puntos clave (uno por línea, hasta 5)</Label><textarea className={`${inputCls} h-24`} value={editando.puntos} onChange={e => setEditando(p => ({ ...p, puntos: e.target.value }))} /></div>
                                <div className="flex gap-2">
                                    <BotonTeal onClick={guardarEdicion} className="flex-1">Guardar</BotonTeal>
                                    <button onClick={() => setEditando(null)} className="px-4 rounded-xl border border-slate-300 text-sm font-bold text-slate-500">Cancelar</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ── TAB: Ajustes ──
        const TabAjustes = ({ store, setStore, aviso, exportarRespaldo, importarRespaldo, nube, abrirClave, sincronizar, reconectar }) => {
            const [nuevoSup, setNuevoSup] = useState({ nombre: '', cargo: 'Supervisor' });
            const info = NUBE_INFO[nube.modo] || NUBE_INFO.local;
            const fechaHora = (iso) => { if (!iso) return '—'; const d = new Date(iso); return `${String(d.getDate()).padStart(2,'0')}-${String(d.getMonth()+1).padStart(2,'0')}-${d.getFullYear()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; };

            const agregarSup = () => {
                if (!nuevoSup.nombre.trim()) { aviso('Escribe el nombre.'); return; }
                const id = nuevoSup.nombre.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '').replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
                if (store.supervisores.some(s => s.id === id)) { aviso('Ya existe un supervisor con ese nombre.'); return; }
                setStore(prev => ({ ...prev, supervisores: [...prev.supervisores, { id, nombre: nuevoSup.nombre.trim(), cargo: nuevoSup.cargo.trim() || 'Supervisor' }] }));
                setNuevoSup({ nombre: '', cargo: 'Supervisor' });
                aviso('✓ Supervisor agregado. Usa "Completar semanas faltantes" en Programa para asignarle calendario, o genera el programa si aún no existe.');
            };
            const quitarSup = (s) => {
                if (!confirm(`¿Quitar a ${s.nombre}? Sus semanas ya registradas se conservan en los datos, pero dejará de aparecer en el panel y en programas nuevos.`)) return;
                setStore(prev => ({ ...prev, supervisores: prev.supervisores.filter(x => x.id !== s.id) }));
            };
            const limpiarTodo = () => {
                if (!confirm('¿Borrar TODO: programa, historial, charlas personalizadas y ajustes? Esta acción no se puede deshacer.')) return;
                if (!confirm('Última confirmación: se perderá todo lo no respaldado. ¿Continuar?')) return;
                setStore(defaultStore());
            };

            return (
                <div className="space-y-5">
                    <Section title="Sincronización (nube)">
                        <div className="flex items-center gap-2 mb-3">
                            <Nube size={18} style={{ color: info.color }} />
                            <span className="font-black text-sm" style={{ color: info.color }}>{info.txt}</span>
                            {nube.updated && <span className="text-[11px] text-slate-400">· última: {fechaHora(nube.updated)}</span>}
                        </div>
                        <p className="text-sm text-slate-500 mb-3">
                            {nube.modo === 'ok' && 'Tus datos se guardan en Cloudflare y estarán disponibles desde cualquier equipo.'}
                            {nube.modo === 'guardando' && 'Guardando en la nube…'}
                            {nube.modo === 'cargando' && 'Conectando con la nube…'}
                            {nube.modo === 'local' && 'La nube no está configurada (o no hay conexión). La app funciona con memoria local en este equipo; exporta un respaldo para no perder datos.'}
                            {nube.modo === 'sin-clave' && 'La nube pide una clave. Ingrésala para sincronizar entre equipos.'}
                            {nube.modo === 'error' && 'No se pudo conectar con la nube. Se está guardando localmente; reintenta la conexión.'}
                        </p>
                        <div className="flex flex-wrap gap-3">
                            <button onClick={abrirClave} className="flex items-center gap-1.5 text-sm text-slate-600 font-semibold hover:text-sky-600">Ingresar / cambiar clave</button>
                            <button onClick={reconectar} className="flex items-center gap-1.5 text-sm text-slate-600 font-semibold hover:text-sky-600">Reconectar</button>
                            {nube.modo === 'ok' && <button onClick={sincronizar} className="flex items-center gap-1.5 text-sm text-slate-600 font-semibold hover:text-sky-600">Sincronizar ahora</button>}
                        </div>
                    </Section>

                    <Section title="Documento">
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                            <div><Label>Código</Label><input className={inputCls} value={store.codigo} onChange={e => setStore(p => ({ ...p, codigo: e.target.value }))} /></div>
                            <div><Label>Versión</Label><input className={inputCls} value={store.version} onChange={e => setStore(p => ({ ...p, version: e.target.value }))} /></div>
                            <div><Label>Próximo folio</Label><input type="number" className={inputCls} value={store.folioSeq} onChange={e => setStore(p => ({ ...p, folioSeq: Math.max(1, parseInt(e.target.value, 10) || 1) }))} /></div>
                            <div><Label>Meta mensual</Label><input type="number" className={inputCls} value={store.metaMensual} onChange={e => setStore(p => ({ ...p, metaMensual: Math.max(1, parseInt(e.target.value, 10) || 4) }))} /></div>
                        </div>
                        <div className="mt-4 pt-4 border-t border-slate-100">
                            <Label>Logo de la empresa (aparece en la hoja impresa)</Label>
                            {store.logo
                                ? <div className="flex items-center gap-3 mt-1"><img src={store.logo} alt="Logo" className="h-12 object-contain border border-slate-200 rounded p-1 bg-white" /><button onClick={() => setStore(p => ({ ...p, logo: null }))} className="text-xs text-slate-400 hover:text-red-500 underline">quitar (usar el texto RIO LOA por defecto)</button></div>
                                : <div className="flex items-center gap-3 mt-1"><LogoRioLoa height={26} /><label className="text-xs text-sky-600 hover:underline cursor-pointer flex items-center gap-1"><Upload size={13} /> Subir logo (PNG o JPG)<input type="file" accept="image/*" className="hidden" onChange={e => { const f = e.target.files[0]; if (f) fileToDataURL(f, v => setStore(p => ({ ...p, logo: v }))); }} /></label></div>}
                            <p className="text-[11px] text-slate-400 mt-1.5">Recomendado: PNG con fondo transparente y no muy pesado (menos de ~200 KB). Se guarda junto con tus datos.</p>
                        </div>
                    </Section>

                    <Section title="Supervisores">
                        <div className="space-y-1.5">
                            {store.supervisores.map(s => (
                                <div key={s.id} className="flex items-center gap-2 text-sm py-1.5 border-b border-slate-50">
                                    <span className="flex-1 font-semibold text-slate-700">{s.nombre} <span className="text-slate-400 font-normal">— {s.cargo}</span></span>
                                    <button onClick={() => quitarSup(s)} className="text-[11px] font-bold text-red-400 hover:text-red-600 shrink-0">quitar</button>
                                </div>
                            ))}
                        </div>
                        <div className="mt-4 grid grid-cols-1 sm:grid-cols-3 gap-3">
                            <input className={inputCls} placeholder="Nombre completo" value={nuevoSup.nombre} onChange={e => setNuevoSup(p => ({ ...p, nombre: e.target.value }))} />
                            <input className={inputCls} placeholder="Cargo" value={nuevoSup.cargo} onChange={e => setNuevoSup(p => ({ ...p, cargo: e.target.value }))} />
                            <BotonTeal onClick={agregarSup}>Agregar</BotonTeal>
                        </div>
                    </Section>

                    <Section title="Respaldo">
                        <div className="flex flex-wrap items-center gap-4">
                            <button onClick={exportarRespaldo} className="flex items-center gap-1.5 text-sm text-slate-600 font-semibold hover:text-sky-600"><Database size={15} /> Exportar respaldo (JSON)</button>
                            <label className="flex items-center gap-1.5 text-sm text-slate-600 font-semibold hover:text-sky-600 cursor-pointer"><Upload size={15} /> Importar respaldo<input type="file" accept="application/json,.json" className="hidden" onChange={importarRespaldo} /></label>
                            <button onClick={limpiarTodo} className="flex items-center gap-1.5 text-sm text-red-400 hover:text-red-600 font-semibold ml-auto"><Undo size={14} /> Borrar todo</button>
                        </div>
                        <p className="text-[11px] text-slate-400 mt-3">Todos los datos (programa, estados, folios, charlas) viven en este navegador. Exporta un respaldo periódicamente, sobre todo antes de limpiar caché o cambiar de equipo.</p>
                    </Section>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>

    <!-- Bootstrap: compila el JSX con runtime clásico (evita los import del runtime automático) -->
    <script>
        (function () {
            try {
                var src = document.getElementById('app-source').textContent;
                var out = Babel.transform(src, { presets: [['react', { runtime: 'classic' }]] }).code;
                (0, eval)(out);
            } catch (e) {
                console.error(e);
                document.getElementById('root').innerHTML = '<div style="padding:24px;font-family:sans-serif;color:#b91c1c">Error al iniciar la app: ' + (e && e.message) + '</div>';
            }
        })();
    </script>
</body>
</html>
