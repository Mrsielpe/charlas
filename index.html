<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programa de Charlas — Río Loa</title>
    <meta name="theme-color" content="#2A5C6E">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel para compilar JSX en el navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- jsPDF para generar el PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        body { background-color: #eef2f5; }
        textarea { resize: vertical; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/plain" id="app-source">
        const { useState, useEffect, useRef } = React;

        // ═══════════════════════════════════════════════════════════════════
        //  PANEL PERSONAL DE PROGRAMACIÓN DE CHARLAS (uso exclusivo del APR)
        //  Flujo: programar año → imprimir hoja individual (queda ENTREGADA)
        //         → al volver la hoja firmada, marcar CUMPLIDA / NO CUMPLIDA
        //  Todos los datos viven en este navegador (respaldo JSON en Ajustes).
        // ═══════════════════════════════════════════════════════════════════

        const EJECUTORA = 'Maquinarias y Construcciones Río Loa S.A.';
        const TEAL = '#2A5C6E';
        const BLUE = '#4A90B8';
        const MESES = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
        const ESCALAS = [ { id: 'Normal', px: 16 }, { id: 'Grande', px: 18.5 }, { id: 'Extra', px: 21 } ];
        const STORAGE_KEY = 'rioloa_programa_v1';
        const CLAVE_KEY = 'rioloa_prog_clave';

        // ── Sincronización con la nube (Cloudflare D1 vía /api/estado) ──
        // Guarda TODO el estado como un solo JSON. Si la API no está disponible
        // (no configurada u offline), la app sigue funcionando solo con localStorage.
        const NUBE = {
            clave: () => { try { return localStorage.getItem(CLAVE_KEY) || ''; } catch (e) { return ''; } },
            async get() {
                const res = await fetch('/api/estado', { headers: { 'X-Clave': NUBE.clave() } });
                if (res.status === 401) { const e = new Error('clave'); e.code = 401; throw e; }
                if (!res.ok) { const e = new Error('http ' + res.status); e.code = res.status; throw e; }
                return res.json();
            },
            async put(estado) {
                const res = await fetch('/api/estado', { method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Clave': NUBE.clave() }, body: JSON.stringify({ json: estado }) });
                if (res.status === 401) { const e = new Error('clave'); e.code = 401; throw e; }
                if (!res.ok) { const e = new Error('http ' + res.status); e.code = res.status; throw e; }
                return res.json();
            },
        };

        const SUPERVISORES_INICIALES = [
            { id: 'edward-mino',     nombre: 'Edward Miño',     cargo: 'Supervisor' },
            { id: 'sergio-rojas',    nombre: 'Sergio Rojas',    cargo: 'Supervisor' },
            { id: 'manuel-fuentes',  nombre: 'Manuel Fuentes',  cargo: 'Supervisor' },
            { id: 'guillermo-oneto', nombre: 'Guillermo Oneto', cargo: 'Supervisor' },
        ];

        // ── CATÁLOGO INICIAL DE 20 CHARLAS ──
        const TEMAS = [
            { n: 1, titulo: 'Diferencias entre empresa mandante y contratista',
              desarrollo: 'En la planta conviven la empresa mandante (dueña de la faena) y Río Loa como empresa contratista que presta servicios para ella. La Ley 20.123 de subcontratación establece que ambas empresas coordinan la seguridad de quienes trabajan en el recinto, y como trabajador de Río Loa tu responsabilidad es clara: respetar el reglamento especial de la planta, cumplir las instrucciones de tu supervisor y las reglas de la mandante, y utilizar siempre las vías, los accesos y los procedimientos autorizados. Saber quién es quién te permite identificar a quién dirigirte, qué reglas aplican en cada área y cómo cumplir correctamente sin exponerte. Aunque trabajes para Río Loa, dentro de la planta también debes acatar las indicaciones del personal de la mandante en materia de seguridad. Ante cualquier duda, instrucción que no entiendas o condición que te genere inquietud, repórtala de inmediato a tu supervisor de Río Loa antes de continuar.',
              puntos: ['Mandante = dueña de la faena; Río Loa = contratista', 'Ley 20.123 de subcontratación', 'Respetar el reglamento especial de la planta', 'Reportar a tu supervisor de Río Loa', 'Ante dudas, preguntar antes de continuar'] },
            { n: 2, titulo: 'EPP correcto según la zona',
              desarrollo: 'El uso del EPP es obligatorio y personal: la empresa te entrega los elementos necesarios para cada área y tu deber es usarlos correctamente durante toda la jornada, no solo cuando crees que hay riesgo. En Batch House y Molienda corresponde respirador y antiparras por la presencia de polvo; en Galpón Soda, protección química; y protección auditiva donde hay ruido. Antes de iniciar tu turno, revisa que tu EPP esté completo, limpio y en buen estado, y ajústalo correctamente para que cumpla su función. Si un elemento está dañado, vencido o no te queda bien, solicita su reposición a tu supervisor antes de exponerte. Nunca improvises ni reemplaces el EPP por elementos no autorizados. Recuerda que el EPP solo te protege si lo usas bien, completo y en todo momento.',
              puntos: ['El EPP cambia según la zona', 'Respirador y antiparras donde hay polvo', 'Protección química en soda', 'Revisar el EPP antes de iniciar', 'El EPP es personal e intransferible'] },
            { n: 3, titulo: 'Polvo y sílice — protección respiratoria',
              desarrollo: 'El polvo con sílice presente en las materias primas puede afectar tus pulmones si se inhala de forma repetida a lo largo del tiempo, y sus efectos no se notan de inmediato. Por eso es obligatorio usar el respirador entregado, bien ajustado al rostro y con los filtros vigentes, durante toda la tarea en las zonas de exposición. Maneja los materiales según el procedimiento para evitar generar polvo innecesario y no te retires el respirador mientras estés expuesto, aunque sea por un momento. Verifica que el sello sea hermético y que no haya barba u objetos que impidan el ajuste. Si tu respirador no sella bien, está sucio o el filtro está saturado, solicita el recambio a tu supervisor antes de continuar. Cuidar tu protección respiratoria hoy es lo que protege tu salud a futuro.',
              puntos: ['La sílice causa silicosis (irreversible)', 'Respirador bien ajustado', 'Cambiar los filtros a tiempo', 'No levantar polvo innecesario', 'Sin barba u objetos que impidan el sello'] },
            { n: 4, titulo: 'No comer ni beber en zonas de trabajo',
              desarrollo: 'Comer, beber o fumar en las zonas de trabajo puede hacer que ingieras polvo, soda u otras materias primas sin darte cuenta, ya que quedan en las manos, la ropa y las superficies. Por eso debes alimentarte únicamente en las áreas habilitadas para ello, lavándote bien las manos y el rostro antes de hacerlo. No dejes alimentos, bebidas ni utensilios en zonas de proceso, ni guardes comida en los puestos de trabajo o en los bolsillos. Tampoco uses envases de producto para guardar bebidas ni a la inversa. Mantener esta separación entre el trabajo y la alimentación es una regla básica de higiene industrial. Cumplirla es una responsabilidad personal que protege directamente tu salud y la de tus compañeros.',
              puntos: ['No ingerir polvo ni químicos', 'Comer solo en áreas habilitadas', 'Lavarse las manos antes', 'No dejar alimentos en proceso', 'No fumar en zonas de proceso'] },
            { n: 5, titulo: 'Manejo manual de carga y maxisacos',
              desarrollo: 'El manejo manual de cargas mal realizado es una de las principales causas de lesiones a la espalda, y muchas de ellas se vuelven crónicas. Para evitarlas, levanta doblando las rodillas y manteniendo la espalda recta, con la carga pegada al cuerpo y los pies firmes, sin girar el tronco mientras sostienes el peso. Respeta los límites de peso establecidos y, para maxisacos o cargas pesadas, utiliza siempre los medios mecánicos disponibles y pide ayuda a un compañero. Antes de levantar, evalúa el peso, planifica el movimiento y despeja el recorrido para no tropezar ni maniobrar de forma forzada. Si la carga es inestable o no la puedes controlar, detente y busca apoyo. Tu técnica al levantar depende de ti y es clave para no lesionarte hoy ni a largo plazo.',
              puntos: ['Doblar rodillas, espalda recta', 'Carga pegada al cuerpo', 'Ayuda mecánica con maxisacos', 'No girar el tronco con carga', 'Evaluar el peso y despejar el recorrido antes'] },
            { n: 6, titulo: 'Izaje seguro de cargas',
              desarrollo: 'Toda maniobra de izaje requiere atención plena y cumplimiento estricto del procedimiento, porque una carga suspendida es un peligro permanente. Antes de izar, inspecciona las eslingas, ganchos, grilletes y accesorios; si detectas alguno dañado, gastado o sin certificación, no lo uses e infórmalo a tu supervisor. Verifica que la carga esté bien estrobada, equilibrada y dentro de la capacidad del equipo antes de levantarla. Durante la maniobra nunca te ubiques ni transites bajo una carga suspendida ni en su radio de giro, mantén la distancia y comunícate con el operador solo mediante señales claras y acordadas. No intentes guiar la carga con las manos si no corresponde. Cumplir cada uno de estos pasos es lo que evita que una carga te golpee o te atrape.',
              puntos: ['Inspeccionar eslingas y ganchos', 'No pararse bajo la carga suspendida', 'Comunicación con el operador', 'Descartar elementos dañados', 'No guiar la carga con las manos si no corresponde'] },
            { n: 7, titulo: 'Orden, aseo y derrames (5S)',
              desarrollo: 'Mantener el orden y el aseo en tu puesto es parte de tu trabajo diario y previene caídas, golpes, incendios y otros incidentes. Limpia de inmediato cualquier derrame de material o líquido, mantén despejadas las vías de tránsito, escaleras y accesos, y deja cada herramienta y equipo en su lugar al terminar la tarea. No acumules materiales en pasillos ni obstruyas accesos, tableros eléctricos, extintores o salidas de emergencia. Recoge cables, mangueras y restos que puedan hacer tropezar, y segrega los residuos donde corresponde. Un puesto desordenado esconde riesgos que después provocan accidentes. Mantener el orden durante toda la jornada, y no solo al final, es responsabilidad de cada uno y refleja un trabajo bien hecho.',
              puntos: ['Los derrames provocan resbalones', 'Limpiar de inmediato', 'Mantener las vías despejadas', 'Cada cosa en su lugar', 'Segregar los residuos donde corresponde'] },
            { n: 8, titulo: 'Descarga segura de camiones y materiales',
              desarrollo: 'La descarga de camiones y materiales debe hacerse de forma coordinada, sin apuro y siguiendo el procedimiento, porque intervienen vehículos, cargas y personas en un mismo espacio. Antes de iniciar, coordina con el conductor y asegúrate de que el vehículo esté detenido, con el motor apagado, frenado y calzado. Mantente fuera de los puntos ciegos del camión y nunca te ubiques entre el vehículo y una estructura, muro o pila de material. Usa chaleco reflectante, verifica que la carga esté estable antes de soltar las amarras y manipula los elementos con las herramientas y equipos adecuados. No subas a la carga ni te pares en zonas donde puedas caer o ser golpeado. Tu posición, tu comunicación y tu atención durante toda la maniobra son tu mejor protección.',
              puntos: ['Coordinar con el conductor', 'Cuidado con los puntos ciegos', 'No ubicarse en puntos de aplastamiento', 'Usar chaleco reflectante', 'Vehículo detenido, frenado y calzado'] },
            { n: 9, titulo: 'Atrapamiento en correas y molienda',
              desarrollo: 'Las correas transportadoras y los equipos de molienda tienen partes en movimiento que pueden atrapar una mano, la ropa o el pelo en un instante, sin dar tiempo a reaccionar. Por eso nunca debes intervenir, limpiar, lubricar ni destrabar un equipo mientras esté en funcionamiento. Respeta los resguardos y protecciones, no los retires ni operes equipos con ellos abiertos o removidos, y mantén manos, ropa holgada, cordones y herramientas lejos de las partes móviles. Usa la ropa de trabajo ajustada y no uses elementos que puedan engancharse. Si un equipo se atasca o requiere intervención, detenlo por completo y aplica el bloqueo correspondiente antes de actuar, según el procedimiento. Cumplir esta regla sin excepciones es lo que evita atrapamientos que pueden ser graves o mortales.',
              puntos: ['No intervenir equipos en movimiento', 'Respetar los resguardos', 'No retirar protecciones', 'Detener y bloquear antes de destrabar', 'Ropa ajustada y pelo sujeto cerca de partes móviles'] },
            { n: 10, titulo: 'Bloqueo y etiquetado (LOTO)',
              desarrollo: 'Antes de intervenir cualquier equipo para mantención, limpieza o destrabe, debes desenergizarlo, bloquearlo y etiquetarlo siguiendo el procedimiento de bloqueo y etiquetado. Esto aplica a toda fuente de energía: eléctrica, mecánica, neumática, hidráulica o de gravedad. Cada trabajador instala su propio candado o dispositivo de bloqueo, y solo quien lo puso puede retirarlo al terminar. Antes de empezar, verifica la energía cero comprobando que el equipo realmente no pueda arrancar ni liberar energía acumulada. Nunca retires, anules ni prestes el bloqueo de otro compañero, ni operes un equipo que esté bloqueado por alguien más. Aplicar correctamente el bloqueo es lo único que garantiza que el equipo no se active mientras tienes las manos en él.',
              puntos: ['Desenergizar, bloquear y etiquetar', 'Solo quien bloquea, desbloquea', 'Verificar energía cero', 'Antes de toda mantención', 'Nunca retirar el bloqueo de otro compañero'] },
            { n: 11, titulo: 'Ruido en molienda y protección auditiva',
              desarrollo: 'La exposición a ruido alto y sostenido puede dañar tu audición de manera progresiva e irreversible, y cuando lo notas, el daño ya está hecho. En las zonas señalizadas como de uso obligatorio, debes usar el protector auditivo entregado durante todo el tiempo de exposición, no solo por momentos ni cuando el ruido te molesta. Colócalo correctamente —tapones bien insertados o fonos bien sellados— para que cumpla su función, y combínalo según lo indicado cuando el nivel lo requiere. Solicita su reposición cuando esté deteriorado, sucio o no selle bien. Recuerda que el daño auditivo no duele ni se nota de inmediato, pero se acumula con los años y no tiene vuelta atrás. Proteger tu audición depende del uso constante y correcto del protector en cada turno.',
              puntos: ['El ruido daña la audición de forma permanente', 'Protector durante toda la exposición', 'El daño es acumulativo', 'Uso permanente, no a ratos', 'Colocar bien tapones o fonos para que sellen'] },
            { n: 12, titulo: 'Manejo de vidrio y cortes (Despacho/Bodega)',
              desarrollo: 'La manipulación de vidrio y cristal exige cuidado permanente, ya que los bordes y las trizaduras cortan con facilidad incluso con poco contacto. Usa siempre los guantes anticorte entregados y la técnica adecuada para tomar, levantar y trasladar las piezas, sujetándolas de forma firme y controlada. Nunca recojas vidrios rotos con las manos: utiliza los implementos dispuestos para ello, como escobillas, palas o pinzas, y desecha los restos en los contenedores correspondientes. Mantén despejada el área de trabajo, avisa a tus compañeros al trasladar piezas y no cargues más de lo que puedas controlar. Presta especial atención a las piezas con fisuras, que pueden quebrarse al manipularlas. Tu atención constante y el uso de los guantes son los que evitan los cortes.',
              puntos: ['Usar guantes anticorte', 'Cuidado con el vidrio roto', 'No recoger trizaduras con la mano', 'Desechar los restos correctamente', 'Atención especial a las piezas con fisuras'] },
            { n: 13, titulo: 'Espacios confinados: silos, tolvas y escotillas',
              desarrollo: 'Silos, tolvas y escotillas son espacios confinados y representan un riesgo serio, porque pueden tener atmósferas peligrosas, falta de oxígeno o riesgo de sepultamiento por material. Nunca ingreses a uno sin la autorización y el permiso de trabajo correspondiente, sin la medición previa de la atmósfera y sin un vigía permanente en el exterior. Respeta todas las condiciones que establece el permiso y no improvises ingresos rápidos, aunque la tarea parezca breve o sencilla. Asegúrate de contar con los medios de comunicación y rescate definidos antes de entrar. Si te asignan como vigía, permanece atento todo el tiempo, mantén el conteo de quienes ingresan y nunca abandones tu posición ni ingreses tú mismo. Cumplir el procedimiento de espacios confinados es lo que permite entrar y salir con seguridad.',
              puntos: ['Permiso de trabajo obligatorio', 'Monitoreo de la atmósfera', 'Vigía en el exterior', 'No ingresar sin autorización', 'El vigía nunca abandona su posición'] },
            { n: 14, titulo: 'Trabajo en altura: plataformas y silos',
              desarrollo: 'Todo trabajo realizado sobre 1,8 metros requiere protección contra caídas, ya que una caída desde esa altura puede causar lesiones graves o la muerte. Debes usar el arnés entregado, enganchado a un punto de anclaje seguro y certificado, y verificar su estado y el de la línea de vida antes de cada uso. Utiliza escalas, andamios y plataformas solo si están en condiciones y armados correctamente, y muévete por ellos manteniendo siempre tres puntos de apoyo al subir o bajar. No trabajes en altura sin protección, no te sobrecargues de herramientas y no te confíes en tareas cortas o de rutina. Asegura las herramientas para que no caigan sobre quienes están abajo. El uso correcto del arnés, los anclajes y los accesos es tu responsabilidad en cada trabajo en altura.',
              puntos: ['Arnés sobre 1,8 m', 'Punto de anclaje certificado', 'Revisar barandas y plataformas', 'Sin protección, no se sube', 'Asegurar las herramientas para que no caigan'] },
            { n: 15, titulo: 'Soda cáustica y sustancias peligrosas',
              desarrollo: 'La soda cáustica y otras sustancias químicas de la planta son corrosivas y pueden causar quemaduras graves en la piel y los ojos con solo un contacto. Antes de manipularlas, conoce la información de su hoja de datos de seguridad y usa el EPP químico indicado: guantes resistentes, antiparras o careta facial y ropa adecuada. Manipula los productos con cuidado, evita salpicaduras, no los trasvasijes ni mezcles fuera del procedimiento y mantén los envases bien identificados y cerrados. No comas, bebas ni te toques el rostro mientras los manejas. Ante cualquier contacto con piel u ojos, lava de inmediato con abundante agua durante varios minutos y avisa a tu supervisor para recibir atención. Conocer y respetar el manejo seguro de los químicos es lo que te protege de lesiones permanentes.',
              puntos: ['La soda es corrosiva', 'EPP químico obligatorio', 'Conocer la hoja de datos de seguridad', 'Ante contacto: agua abundante y avisar', 'Envases identificados y bien cerrados'] },
            { n: 16, titulo: 'Estrés térmico cerca de hornos',
              desarrollo: 'El trabajo cerca de hornos implica exposición a altas temperaturas que pueden provocar deshidratación, agotamiento o golpe de calor, un cuadro que puede ser grave. Hidrátate de forma frecuente con agua, antes de tener sed, aprovecha las pausas en zonas frescas y no fuerces tu cuerpo más allá de lo indicado por tu supervisor. Usa la ropa adecuada y evita la exposición prolongada e innecesaria a las fuentes de calor. Aprende a reconocer las señales de alerta —mareo, náuseas, dolor de cabeza, calambres, confusión, piel caliente y seca— tanto en ti como en tus compañeros. Si las presentas o las ves en alguien, detén la tarea, avisa de inmediato y busca un lugar fresco. Cuidar tu hidratación y reconocer los síntomas a tiempo es lo que previene una emergencia.',
              puntos: ['Hidratación frecuente', 'Pausas en zona fresca', 'Reconocer el golpe de calor', 'Avisar ante síntomas', 'Usar ropa adecuada y evitar la exposición prolongada'] },
            { n: 17, titulo: 'Grúa horquilla vs. tránsito peatonal',
              desarrollo: 'En las áreas donde circulan grúas horquilla debes extremar el cuidado, ya que el operador no siempre puede verte, sobre todo cuando lleva carga. Mantén siempre distancia con el equipo, no camines ni te detengas detrás ni en sus puntos ciegos, y haz contacto visual con el operador antes de cruzar para asegurarte de que te vio. Respeta las vías peatonales demarcadas, no pases por debajo de cargas elevadas ni te subas al equipo si no estás autorizado. Si eres peatón, cede el paso al equipo aunque tengas la prioridad de la tarea. Nunca te acerques a una horquilla en movimiento ni la uses como medio de transporte. La separación segura entre personas y equipos móviles depende de que cada uno respete su zona y sus reglas.',
              puntos: ['Separación peatón / equipo', 'Contacto visual con el operador', 'No cruzar por los puntos ciegos', 'Usar las vías peatonales', 'El peatón cede el paso al equipo'] },
            { n: 18, titulo: 'Tránsito solo por zonas delimitadas y señalizadas',
              desarrollo: 'Dentro de la planta debes desplazarte únicamente por las vías peatonales y zonas demarcadas para el tránsito de personas, que están definidas para mantenerte alejado de los peligros. No tomes atajos por áreas de equipos, sectores de proceso ni zonas de tránsito de camiones, aunque parezca más rápido o más cómodo. Respeta las señalizaciones, barreras, líneas pintadas y pasos peatonales, y cruza solo donde está autorizado y con atención. No te detengas en zonas de circulación de vehículos ni bloquees los accesos. Mantén la atención en el entorno y no te distraigas mientras te desplazas. Circular por donde corresponde es una decisión que tomas en cada trayecto y que evita atropellos y golpes.',
              puntos: ['Circular por vías señalizadas', 'No tomar atajos', 'Respetar las demarcaciones', 'Lejos de equipos y camiones', 'No distraerse al desplazarse'] },
            { n: 19, titulo: 'No usar el teléfono mientras se camina',
              desarrollo: 'Caminar mientras usas el teléfono te distrae y te expone a caídas, golpes y atropellos, porque dejas de prestar atención al entorno, al piso y a los equipos que se mueven a tu alrededor. Mientras transitas por la planta, mantén el teléfono guardado y la vista en el camino, atento a las señalizaciones y a los vehículos. Si necesitas usarlo, leer un mensaje o atender una llamada, detente primero en un lugar seguro y fuera de las vías de tránsito de personas y equipos. Lo mismo aplica para usar audífonos que te impidan oír alarmas o bocinas. La atención plena al desplazarte es parte del autocuidado y de cuidar a quienes te rodean. Tu seguridad al caminar depende de mantenerte concentrado en el entorno y no en la pantalla.',
              puntos: ['La distracción causa caídas y atropellos', 'Teléfono guardado al caminar', 'Detenerse en lugar seguro para usarlo', 'Atención al entorno', 'No usar audífonos que impidan oír alarmas'] },
            { n: 20, titulo: 'Reporte de casi-accidentes y condiciones subestándar',
              desarrollo: 'Un casi-accidente es un hecho que pudo terminar en lesión o daño pero que, por suerte o por reacción, no ocurrió: es una oportunidad valiosa para corregir antes de que pase algo grave. Tu rol es reportar a tu supervisor cualquier casi-accidente, condición insegura o acción riesgosa que observes, aunque no haya tenido consecuencias y aunque no te involucre directamente. Reportar no es acusar ni buscar culpables, es prevenir: permite tomar medidas a tiempo, corregir y cuidar a todos. No normalices los riesgos ni los dejes pasar por costumbre o por evitar complicarte. Mientras antes se conozca una condición, antes se puede controlar. Cada reporte que haces aporta información que ayuda a evitar un accidente futuro y mejora la seguridad de todo el equipo.',
              puntos: ['Un casi-accidente es un aviso gratis', 'Reportar aunque no haya lesión', 'Corregir antes del accidente', 'No normalizar el riesgo', 'Mientras antes se reporta, antes se controla'] },
            { n: 21, titulo: 'Vaciado de maxisacos en tolvas de alimentación',
              desarrollo: 'Vaciar maxisacos en las tolvas de alimentación junta varios riesgos en una sola tarea: una carga suspendida sobre tu cabeza, el borde abierto de la tolva, una nube de polvo al soltar el material y el filo del cuchillo al abrir el saco. Antes de empezar, verifica que el maxisaco esté bien tomado del equipo de izaje por sus cuatro orejas, centrado sobre la tolva, y nunca te ubiques debajo ni metas las manos entre el saco y la estructura. Abre el saco con la herramienta definida, desde una posición estable y fuera de la línea de caída del material, sin asomarte al interior de la tolva. Respeta la reja o parrilla de la tolva: no la retires ni la pises, porque es lo que impide que caigas o que caigan objetos al proceso. Usa tu respirador y antiparras por el polvo. Coordinar el izaje, mantener la reja puesta y no ubicarte bajo la carga es lo que hace segura esta tarea repetitiva.',
              puntos: ['No ubicarse bajo el maxisaco suspendido', 'Mantener puesta la reja o parrilla de la tolva', 'Abrir el saco desde posición estable, fuera de la caída', 'Respirador y antiparras por el polvo', 'No asomarse al interior de la tolva'] },
            { n: 22, titulo: 'Destaraugue de tolvas, chutes y correas atascadas',
              desarrollo: 'Cuando una tolva, un chute o una correa se atasca, la tentación de destaparlo rápido es justo lo que provoca los accidentes más graves, porque el material acumulado guarda energía y puede soltarse de golpe como una avalancha. Nunca metas las manos, una barreta o el cuerpo a destrabar material con el equipo en marcha o sin haber bloqueado sus energías. El procedimiento correcto parte por detener y bloquear el equipo, verificar energía cero y recién entonces intervenir, siempre desde un costado y nunca en la línea de descarga del material atascado. Ten presente que sobre el taco puede haber material que caiga apenas lo liberes. No improvises golpeando ni te expongas a caer dentro de la tolva. Si la situación supera lo previsto, detente y avisa. Bloquear antes de intervenir y ubicarte fuera de la trayectoria del material es lo que evita que un simple atasco te atrape o te sepulte.',
              puntos: ['El material atascado guarda energía y se suelta de golpe', 'Bloquear y verificar energía cero antes de intervenir', 'Trabajar desde un costado, no en la línea de descarga', 'Ante lo inesperado, detenerse y avisar', 'No golpear ni improvisar para destrabar'] },
            { n: 23, titulo: 'Silos de materia prima: puentes de material y sepultamiento',
              desarrollo: 'Los silos que almacenan materia prima esconden un riesgo mortal: el material puede formar un puente hueco por dentro o pegarse en las paredes, y cuando ese puente se rompe, sepulta en segundos a quien esté sobre o dentro del silo. Por eso jamás debes ingresar a un silo sin permiso de espacio confinado, sin bloqueo de los sistemas de carga y descarga, sin medición de atmósfera y sin vigía. Nunca intentes romper un puente de material parándote encima ni metiéndote por abajo: el colapso es imposible de predecir y no da tiempo de reaccionar. El material fino, además, puede tragarte como arena movediza. Si un silo no descarga, no lo resuelvas improvisando; se aborda con el procedimiento y las herramientas definidas, siempre desde el exterior. Respetar que a un silo no se entra ni se interviene por dentro sin todas las medidas es, literalmente, lo que evita morir sepultado.',
              puntos: ['El puente de material colapsa sin aviso y sepulta', 'No entrar al silo sin permiso, bloqueo, atmósfera y vigía', 'Nunca romper el puente desde arriba ni desde abajo', 'El material fino traga como arena movediza', 'Los silos se intervienen solo desde el exterior'] },
            { n: 24, titulo: 'Puntos de atrape en polines, poleas y molinos',
              desarrollo: 'En el área de molienda hay decenas de puntos de atrape que muerden en un instante: donde la correa se junta con el polín o el tambor, entre engranajes, poleas y correas de transmisión, y en las partes giratorias del molino. Aprende a reconocer estos puntos, porque el riesgo no siempre es evidente hasta que ya tienes la mano adentro. Mantén las guardas y protecciones siempre puestas; si un equipo está operando con una guarda retirada o suelta, no trabajes cerca y repórtalo. Nunca acerques manos, herramientas, escobillas ni trapos a un equipo en movimiento para limpiar o acomodar algo, y no uses ropa suelta, cordones, pulseras ni el pelo largo sin sujetar cerca de partes giratorias. Cualquier intervención se hace con el equipo detenido y bloqueado. Reconocer dónde están los puntos de atrape y respetar las guardas sin excepción es lo que mantiene tus manos lejos de la máquina.',
              puntos: ['Reconocer los puntos de atrape del área', 'Guardas siempre puestas; sin guarda, no operar cerca', 'Nada de manos ni trapos en equipos en movimiento', 'Ropa ajustada, sin cordones ni pelo suelto', 'Toda intervención con el equipo detenido y bloqueado'] },
            { n: 25, titulo: 'Control de polvo y orden en el área de molienda',
              desarrollo: 'El polvo de materias primas en molienda no es solo un tema de respirador: acumulado en pisos, estructuras y barandas genera resbalones, tapa las señales y las condiciones peligrosas, y se levanta con cualquier movimiento volviendo a exponer a todos. Mantén tu área limpia durante el turno, no solo al final, y controla el polvo en su origen respetando los sistemas de captación y ventilación: no los desconectes ni bloquees. Para limpiar, usa los métodos definidos, aspiración o limpieza húmeda cuando corresponda, y nunca uses aire comprimido para soplarte la ropa o las superficies, porque eso solo dispersa el polvo y te lo hace respirar. No dejes que el material se acumule en pasillos, escaleras ni sobre equipos. Reporta si un sistema de captación no está funcionando. Controlar el polvo en la fuente y mantener el orden en el turno es lo que protege tu respiración y evita caídas en toda el área.',
              puntos: ['El polvo acumulado resbala y se vuelve a levantar', 'Respetar los sistemas de captación y ventilación', 'Limpieza húmeda o aspiración, nunca aire comprimido', 'Ordenar durante el turno, no solo al final', 'Reportar los sistemas de captación que fallan'] },
            { n: 26, titulo: 'Correas transportadoras: guardas, paradas de emergencia y cuerdas de tiro',
              desarrollo: 'Las correas transportadoras trasladan material a lo largo de toda la planta y, junto con su utilidad, arrastran uno de los riesgos más serios: el atrapamiento en sus puntos de carga, descarga y retorno. Antes de trabajar cerca de una correa, ubica sus dispositivos de seguridad y aprende a usarlos: las paradas de emergencia y las cuerdas de tiro que recorren su costado, que debes poder accionar sin dudar si algo o alguien queda atrapado. Verifica que las guardas de polines, tambores y transmisiones estén puestas, y nunca cruces por encima o por debajo de una correa en movimiento fuera de los pasos habilitados. No intentes retirar material adherido, alinear la banda ni limpiar el retorno con la correa andando; eso se hace detenido y bloqueado. Reporta guardas faltantes, cuerdas de tiro cortadas o paradas que no responden. Conocer y respetar los resguardos y saber accionar la parada de emergencia es lo que evita una tragedia en la correa.',
              puntos: ['Ubicar y saber accionar paradas de emergencia y cuerdas de tiro', 'Guardas de polines, tambores y transmisiones siempre puestas', 'No cruzar ni limpiar la correa en movimiento', 'Reportar guardas y paradas que fallan', 'Cruzar solo por los pasos habilitados'] },
            { n: 27, titulo: 'Operación segura de grúa horquilla: chequeo y capacidad',
              desarrollo: 'La grúa horquilla es una herramienta potente y, mal operada, uno de los equipos que más accidentes graves causa; por eso solo debe manejarla personal autorizado y con licencia vigente. Antes de operar, haz tu chequeo preoperacional: frenos, dirección, luces, alarma de retroceso, bocina, estado de las horquillas, cadenas y neumáticos, y niveles; si algo falla, no la uses e infórmalo. Respeta siempre la capacidad de carga indicada en la placa del equipo y recuerda que esa capacidad disminuye cuando la carga está alta o el centro de carga es más largo. No sobrecargues ni improvises contrapesos. Transporta la carga baja, inclinada hacia atrás y con buena visibilidad; si la carga te tapa la vista, circula en retroceso o usa un guía. Sube y baja las horquillas solo con el equipo detenido. Operar solo si estás autorizado, revisar el equipo antes y respetar la capacidad es la base para no volcar ni golpear a nadie.',
              puntos: ['Solo personal autorizado y con licencia vigente', 'Chequeo preoperacional antes de cada turno', 'Respetar la capacidad de la placa del equipo', 'Carga baja e inclinada atrás; si tapa la vista, guía o retroceso', 'No transportar personas en el equipo'] },
            { n: 28, titulo: 'Estabilidad de la grúa horquilla: evitar el volcamiento',
              desarrollo: 'La mayoría de las muertes con grúa horquilla ocurren por volcamiento, y casi siempre se pueden evitar entendiendo cómo se mantiene el equilibrio del equipo. La horquilla se sostiene sobre un triángulo de estabilidad, y ese equilibrio se pierde al girar con la carga en alto, al tomar curvas con velocidad, al circular por rampas de forma incorrecta o al cargar más de lo permitido. Para no volcar, mueve el equipo con la carga baja, reduce la velocidad en curvas y pisos irregulares, y nunca gires mientras subes o bajas una pendiente: en rampas circula recto, con la carga hacia el lado de arriba. No transportes personas ni las levantes en las horquillas. Si el equipo empieza a volcar, no saltes: sujétate del volante, afírmate e inclínate hacia el lado contrario dentro de la cabina, porque la estructura te protege. Entender qué rompe la estabilidad y manejar con eso en mente es lo que evita el volcamiento que mata.',
              puntos: ['El volcamiento es la principal causa de muerte con horquilla', 'No girar con la carga en alto ni en pendientes', 'Bajar velocidad en curvas y pisos irregulares', 'Si vuelca, no saltar: sujetarse dentro de la cabina', 'No levantar personas en las horquillas'] },
            { n: 29, titulo: 'Apilamiento y estanterías (racks): almacenamiento seguro',
              desarrollo: 'Un mal apilamiento o una estantería sobrecargada pueden derrumbarse sobre una persona sin previo aviso, con consecuencias graves. Al apilar material, hazlo sobre una base firme y nivelada, respetando las alturas máximas definidas, trabando las cargas para que no se desplacen y sin superar el peso que la base inferior puede soportar. No apiles bultos dañados, deformados o inestables, ni dejes cargas sobresaliendo hacia los pasillos. En las estanterías o racks, respeta la capacidad indicada de cada nivel, distribuye el peso hacia abajo y no fuerces cargas que no calzan. Revisa el estado de la estructura: un rack golpeado por una horquilla, con largueros doblados o anclajes sueltos, pierde gran parte de su resistencia y debe reportarse y señalizarse de inmediato. No te subas a las estanterías para alcanzar algo en altura; usa el medio adecuado. Apilar firme, respetar las capacidades y cuidar la estructura de los racks es lo que evita un derrumbe encima de alguien.',
              puntos: ['Base firme, altura máxima y cargas trabadas', 'Respetar la capacidad de cada nivel del rack', 'Reportar racks golpeados o largueros doblados', 'No treparse a las estanterías', 'No dejar cargas sobresaliendo a los pasillos'] },
            { n: 30, titulo: 'Carga, amarre y trincado en camiones',
              desarrollo: 'Una carga mal asegurada sobre un camión es un peligro que viaja: puede desplazarse durante la maniobra, caer al soltar las amarras o volcarse en el trayecto, golpeando a quien esté cerca. Al cargar, distribuye el peso de forma pareja y estable, sin exceder los límites del vehículo, y asegura cada elemento con los amarres, fajas o cadenas adecuados y en buen estado, revisando que no estén cortados ni desgastados. Antes de soltar el trincado en la descarga, verifica siempre que la carga esté estable y no vaya a caer sobre ti al liberar la tensión; ubícate a un costado, nunca de frente a la carga. Coordina con el conductor y no permitas que el camión se mueva mientras alguien está cargando o amarrando. Sube a la plataforma de carga solo si es seguro y con los medios adecuados. Asegurar bien la carga y liberar el trincado desde una posición protegida es lo que evita que la carga te caiga encima.',
              puntos: ['Distribuir el peso parejo y dentro del límite', 'Amarres y fajas en buen estado, sin cortes', 'Antes de soltar, verificar que la carga no caiga', 'Ubicarse a un costado y coordinar con el conductor', 'El camión no se mueve mientras alguien carga'] },
            { n: 31, titulo: 'Manejo y acopio de casco de vidrio (cullet)',
              desarrollo: 'El casco de vidrio, o cullet, que se recupera para volver a fundir es un material tan útil como traicionero: sus bordes cortan con solo rozarlos, genera polvo de vidrio al moverlo y forma pilas inestables que pueden deslizarse. Al manipularlo, usa siempre guantes anticorte, antiparras y la ropa adecuada, y nunca metas las manos entre el material para acomodarlo o sacar algo; usa las herramientas dispuestas. No recojas trozos con las manos desnudas ni de a puñados. Al formar o retirar acopios, cuida la estabilidad de la pila y no te ubiques al pie de un montón alto que pueda deslizarse sobre ti. Ten cuidado con el vidrio oculto en el piso y en las zonas de tránsito, y mantén el área despejada de esquirlas. El polvo de vidrio también irrita las vías respiratorias y los ojos. Tratar el cullet con guantes anticorte, herramientas y respeto por la inestabilidad de las pilas es lo que evita cortes profundos y golpes.',
              puntos: ['El cullet corta con solo rozarlo', 'Guantes anticorte, antiparras y herramientas, no las manos', 'Cuidar la estabilidad de las pilas de acopio', 'Atención al vidrio oculto en pisos y vías', 'El polvo de vidrio irrita ojos y vías respiratorias'] },
            { n: 32, titulo: 'Pallets y transpaletas: uso seguro y buen estado',
              desarrollo: 'Los pallets y las transpaletas son tan cotidianos que se pierde el respeto por sus riesgos, y sin embargo causan aplastamientos de pies, atrapamientos de manos y golpes con frecuencia. Antes de usar un pallet, revísalo: uno con tablas quebradas, clavos salidos o esquinas dañadas puede colapsar con la carga o herirte al tomarlo; los dañados se retiran, no se siguen usando. Con la transpaleta manual o eléctrica, verifica su estado, no superes su capacidad, y empújala en vez de tirarla cuando sea posible para tener mejor control y no atraparte las piernas. Cuida los pies: nunca los pongas bajo la carga ni bajo las ruedas, y usa siempre calzado de seguridad. En pendientes, mantén la carga hacia abajo y controla la velocidad; una transpaleta cargada cuesta mucho detenerla. No transportes personas ni sobrecargues por encima de la pila. Revisar el pallet, respetar la capacidad y cuidar manos y pies es lo que evita las lesiones de todos los días con estos equipos.',
              puntos: ['Retirar pallets con tablas quebradas o clavos salidos', 'No superar la capacidad de la transpaleta', 'Empujar, no tirar; cuidar pies y piernas', 'En pendiente, carga hacia abajo y velocidad controlada', 'No transportar personas en la transpaleta'] },
            { n: 33, titulo: 'Herramientas manuales en buen estado',
              desarrollo: 'Las herramientas manuales —llaves, martillos, destornilladores, alicates— parecen inofensivas, pero su mal estado o su uso incorrecto causan cortes, golpes y esguinces todos los días. Antes de usar una herramienta, revísala: que el mango esté firme y sin astillas, que la cabeza no esté deformada ni con rebabas, y que sea la herramienta correcta para la tarea. No uses una llave como martillo, un destornillador como palanca ni improvises extensiones en los mangos para hacer más fuerza. Mantén las herramientas limpias, sin grasa, y guárdalas en su lugar cuando termines, nunca sueltas en altura o en zonas de tránsito. Si una herramienta está dañada, retírala de uso e infórmalo para su reposición; no dejes que otro la tome sin saber. Usar la herramienta correcta, en buen estado y de la forma para la que fue diseñada es lo que evita que una tarea simple termine en lesión.',
              puntos: ['Revisar mango y cabeza antes de usar', 'La herramienta correcta para cada tarea', 'No improvisar ni forzar', 'Retirar de uso lo dañado', 'Guardar cada herramienta en su lugar'] },
            { n: 34, titulo: 'Herramientas eléctricas portátiles',
              desarrollo: 'El esmeril angular, el taladro y otras herramientas eléctricas portátiles concentran mucha energía en poco espacio y, mal usadas, provocan proyección de partículas, cortes graves y contactos eléctricos. Antes de conectarlas, revisa que el cable y el enchufe estén en buen estado, sin cortes ni empalmes improvisados, y que las protecciones y guardas estén puestas: nunca retires la guarda del esmeril. Usa el disco correcto para el material y verifica que no esté trizado antes de montarlo. Sujeta la herramienta con firmeza, con ambas manos cuando corresponda, y mantén el cuerpo fuera de la línea de proyección de chispas y partículas. Usa antiparras o careta, y no uses ropa suelta, guantes que puedan enredarse ni el cabello largo sin sujetar cerca de partes giratorias. Desconéctala antes de cambiar accesorios y nunca la dejes en el suelo mientras el disco sigue girando. El respeto por estas reglas es lo que evita accidentes que ocurren en una fracción de segundo.',
              puntos: ['Revisar cable, enchufe y guardas', 'Disco correcto y sin trizaduras', 'Antiparras o careta siempre', 'Desconectar antes de cambiar accesorios', 'No dejar la herramienta con el disco girando'] },
            { n: 35, titulo: 'Riesgo eléctrico y contacto con energía',
              desarrollo: 'La electricidad no se ve ni se huele, y un contacto puede causar quemaduras graves, paro cardíaco o la muerte, incluso con voltajes que parecen bajos. No intervengas tableros, enchufes ni equipos eléctricos si no estás autorizado y capacitado para ello; esa es tarea del personal eléctrico calificado. Reporta de inmediato cualquier cable pelado, enchufe recalentado, tablero abierto o con humedad, o cualquier chispazo u olor a quemado. No uses equipos con cables dañados ni sobrecargues los enchufes con alargadores en cadena. Mantén las manos secas al operar equipos eléctricos y respeta las distancias de seguridad frente a líneas o equipos energizados. Antes de intervenir cualquier equipo, aplica el procedimiento de bloqueo y verifica energía cero. Ante una persona electrocutada, no la toques: corta primero la energía y pide ayuda. Tratar toda instalación como si estuviera energizada, hasta comprobar lo contrario, es la actitud que te protege.',
              puntos: ['Solo personal eléctrico calificado interviene', 'Reportar cables y tableros dañados', 'No sobrecargar enchufes', 'Ante electrocución: cortar energía, no tocar', 'Tratar toda instalación como energizada'] },
            { n: 36, titulo: 'Uso correcto de extintores',
              desarrollo: 'Un extintor bien usado apaga un principio de incendio en segundos; mal usado o vencido, no sirve cuando más lo necesitas. Aprende dónde están los extintores de tu área, de qué tipo son y para qué clase de fuego sirven, porque usar el equivocado puede empeorar la situación. Revisa que estén señalizados, despejados, con el manómetro en la zona verde y la tarjeta de inspección al día. Para usarlo recuerda la regla simple: tira del seguro, apunta a la base del fuego, aprieta el gatillo y mueve en abanico. Ubícate siempre con una salida a tu espalda y a una distancia prudente, y ataca el fuego solo si es pequeño y tienes escape seguro; si crece, evacúa y da la alarma. Nunca uses agua sobre fuego eléctrico o de líquidos. Después de usar un extintor, aunque sea poco, repórtalo para su recarga. Saber usarlo antes de la emergencia es lo que marca la diferencia.',
              puntos: ['Conocer ubicación y tipo de extintor', 'Manómetro en verde y tarjeta al día', 'Tirar, apuntar, apretar, abanicar', 'Solo fuegos pequeños con escape seguro', 'Reportar el extintor usado para recargarlo'] },
            { n: 37, titulo: 'Plan de emergencia y vías de evacuación',
              desarrollo: 'En una emergencia —incendio, sismo, escape de gas— no hay tiempo para improvisar: se reacciona como se preparó. Conoce el plan de emergencia de la planta, la señal de alarma, tus vías de evacuación y la zona de seguridad que te corresponde, antes de que pase algo. Mantén siempre despejadas las vías, salidas y accesos; nunca bloquees una puerta de emergencia ni un extintor con materiales. Al sonar la alarma, deja lo que estás haciendo, detén tu equipo si es seguro hacerlo, y dirígete con calma y sin correr a la zona de seguridad por la ruta señalizada, sin devolverte por objetos personales. Sigue las instrucciones de los líderes de evacuación y del personal a cargo, y una vez en la zona de seguridad permanece ahí hasta que se autorice el regreso, para que el conteo de personas sea correcto. Participar en los simulacros con seriedad es lo que hace que, el día real, todos sepan qué hacer.',
              puntos: ['Conocer alarma, vías y zona de seguridad', 'Mantener las vías siempre despejadas', 'Evacuar sin correr y sin devolverse', 'Permanecer en la zona hasta el conteo', 'Participar en serio en los simulacros'] },
            { n: 38, titulo: 'Primeros auxilios: qué hacer y qué no',
              desarrollo: 'Ante una lesión o una persona que se descompensa, los primeros minutos son decisivos, y actuar bien puede salvar una vida tanto como actuar mal puede agravarla. Lo primero es mantener la calma, asegurar el lugar para no convertirte en una segunda víctima, y dar aviso de inmediato pidiendo ayuda y activando la respuesta de emergencia. No muevas a un lesionado con posible golpe en la cabeza, cuello o espalda, salvo que haya un peligro mayor e inminente. No des de beber ni comer a una persona inconsciente o con lesiones internas, ni apliques remedios caseros sobre quemaduras o heridas. Si sabes primeros auxilios, aplícalos dentro de lo que te corresponde; si no, tu rol es avisar, acompañar y despejar el paso para quienes atenderán. Conoce quiénes son los brigadistas o encargados de tu área y dónde está el botiquín. Saber a quién llamar y qué no hacer es, muchas veces, la mejor ayuda que puedes dar.',
              puntos: ['Asegurar el lugar y dar aviso de inmediato', 'No mover a un lesionado grave sin necesidad', 'No dar agua a un inconsciente', 'Conocer brigadistas y botiquín', 'No aplicar remedios caseros sobre heridas o quemaduras'] },
            { n: 39, titulo: 'Escalas portátiles: uso seguro',
              desarrollo: 'Las escalas portátiles causan caídas graves cuando se usan mal o en mal estado, muchas veces en tareas cortas donde se confía de más. Antes de usar una escala, revísala: peldaños firmes, largueros sin fisuras, zapatas antideslizantes en buen estado, y que sea la adecuada para la altura, sin improvisar parándote en la última grada. Apóyala en una superficie firme y nivelada, respetando el ángulo correcto —un cuarto de la altura de separación en la base—, y amárrala o pide que alguien la sostenga. Sube y baja siempre de frente, con las dos manos libres y manteniendo tres puntos de apoyo; sube las herramientas aparte, no en las manos. No te estires hacia los lados: mejor baja y mueve la escala. No la uses cerca de energía eléctrica si es metálica, ni la ubiques frente a puertas sin bloquear. Tratar la escala con el mismo respeto que un trabajo en altura es lo que evita la caída.',
              puntos: ['Revisar peldaños, largueros y zapatas', 'Superficie firme y ángulo correcto', 'Subir de frente, tres puntos de apoyo', 'No estirarse: bajar y mover la escala', 'No pararse en la última grada de la escala'] },
            { n: 40, titulo: 'Trabajos en caliente y permiso de trabajo',
              desarrollo: 'Soldar, esmerilar o cortar genera chispas, calor y proyecciones que pueden iniciar un incendio o una explosión, sobre todo cerca de materiales combustibles o atmósferas inflamables. Ningún trabajo en caliente debe iniciarse sin el permiso de trabajo correspondiente y sin verificar las condiciones que este exige. Antes de comenzar, despeja o cubre los materiales combustibles del área, ten un extintor a mano y, cuando corresponda, un vigía de fuego atento durante la tarea y un tiempo después de terminar, porque las chispas pueden quedar latentes. Revisa que no haya gases o líquidos inflamables cerca y que la ventilación sea adecuada. Usa el EPP específico: careta, guantes y ropa resistente. Nunca sueldes ni cortes recipientes que hayan contenido inflamables sin la preparación y autorización adecuadas. Respetar el permiso y sus condiciones, sin saltarse pasos por apuro, es lo que evita que una chispa se transforme en una tragedia.',
              puntos: ['Permiso de trabajo obligatorio', 'Despejar combustibles y tener extintor', 'Vigía de fuego durante y después', 'EPP específico para trabajo en caliente', 'Las chispas pueden quedar latentes tras terminar'] },
            { n: 41, titulo: 'Prevención y clases de fuego',
              desarrollo: 'Un incendio necesita tres cosas para existir: combustible, oxígeno y una fuente de calor; nuestra tarea es evitar que esos tres se junten. La prevención parte por el orden y el aseo: no acumular materiales combustibles, controlar los derrames de inflamables y mantener despejadas las fuentes de calor. Conoce las clases de fuego, porque cada una se combate distinto: los sólidos comunes como papel o madera, los líquidos y grasas inflamables, los equipos eléctricos energizados y los metales especiales; usar el agente equivocado puede avivar el fuego en vez de apagarlo. Reporta de inmediato cualquier condición que aumente el riesgo: cables recalentados, fugas, acumulación de material o extintores obstruidos. Ante un principio de incendio, da la alarma primero; combate el fuego solo si es pequeño, conoces el extintor correcto y tienes escape seguro. Prevenir es siempre más fácil que apagar, y todo empieza por no dejar que el fuego encuentre con qué encenderse.',
              puntos: ['Combustible + oxígeno + calor = fuego', 'Orden y aseo previenen incendios', 'Cada clase de fuego se combate distinto', 'Dar la alarma antes de combatir', 'El agente equivocado puede avivar el fuego'] },
            { n: 42, titulo: 'Cilindros de gases comprimidos',
              desarrollo: 'Los cilindros de gases comprimidos —oxígeno, acetileno, argón y otros— guardan mucha energía a alta presión y, mal manejados, pueden convertirse en verdaderos proyectiles o alimentar un incendio. Transpórtalos siempre con su capuchón de protección puesto, en posición vertical y asegurados con cadena o soporte, nunca acostados ni rodándolos por el suelo tomados de la válvula. Almacénalos de pie, amarrados, en lugares ventilados, lejos de fuentes de calor y separando los oxidantes de los inflamables. No los expongas al sol intenso ni a golpes, y revisa que las válvulas, mangueras y reguladores no tengan fugas usando agua jabonosa, nunca una llama. Cierra la válvula al terminar y cuando el cilindro esté vacío, y márcalo como tal. No uses grasa ni aceite en las conexiones de oxígeno. Tratar cada cilindro con respeto, asegurado y protegido, es lo que evita que su energía se libere de golpe.',
              puntos: ['Transportar vertical, asegurado y con capuchón', 'Almacenar de pie y ventilado', 'Separar oxidantes de inflamables', 'Detectar fugas con agua jabonosa, no con llama', 'Sin grasa ni aceite en las conexiones de oxígeno'] },
            { n: 43, titulo: 'Posturas de trabajo y ergonomía',
              desarrollo: 'Las molestias y lesiones musculoesqueléticas —a la espalda, cuello, hombros y muñecas— no aparecen de un golpe, sino que se acumulan por posturas forzadas, movimientos repetitivos y esfuerzos mantenidos día tras día. Cuida tu postura: mantén la espalda en posición neutra, evita girar el tronco al levantar o trasladar, y no trabajes con los brazos por encima de los hombros ni muy agachado por tiempos prolongados sin apoyo. Ajusta la altura de trabajo cuando sea posible para no encorvarte, acerca los materiales para no estirarte, y alterna las tareas para no repetir el mismo movimiento por horas. Usa las ayudas mecánicas disponibles en vez de forzar el cuerpo. Si una postura te genera dolor o incomodidad persistente, no la normalices: repórtalo, porque a tiempo se corrige. Cuidar cómo se mueve y se posiciona tu cuerpo hoy es lo que te permite trabajar sin dolor durante muchos años.',
              puntos: ['Espalda neutra, sin girar el tronco', 'Evitar brazos sobre los hombros mantenido', 'Alternar tareas y usar ayudas mecánicas', 'Reportar el dolor, no normalizarlo', 'Acercar los materiales para no estirarse'] },
            { n: 44, titulo: 'Pausas activas y prevención de lesiones',
              desarrollo: 'El cuerpo no está hecho para mantener la misma postura o repetir el mismo movimiento durante horas sin descanso; por eso las pausas activas no son una pérdida de tiempo, sino una herramienta que previene lesiones y fatiga. Se trata de detener brevemente la tarea cada cierto tiempo para cambiar de posición, estirar suavemente los músculos y articulaciones que más trabajan, y soltar la tensión acumulada en cuello, hombros, espalda y muñecas. Bastan unos minutos, hechos con movimientos suaves y sin rebotes, para mejorar la circulación, reducir la fatiga y bajar el riesgo de molestias crónicas. Aprovecha además los cambios de tarea para variar la exigencia del cuerpo. Escucha las señales de tu cuerpo: si un músculo se carga o una articulación molesta, es momento de pausar y estirar. Incorporar las pausas activas como un hábito, y no como una excepción, es una inversión directa en tu salud y bienestar diario.',
              puntos: ['El cuerpo no resiste la misma postura por horas', 'Pausas breves para estirar y soltar tensión', 'Movimientos suaves, sin rebotes', 'Escuchar las señales del cuerpo', 'Aprovechar los cambios de tarea para variar la exigencia'] },
            { n: 45, titulo: 'Protección de la vista y proyección de partículas',
              desarrollo: 'Los ojos son delicados y las lesiones oculares suelen ser graves e irreversibles, pero casi todas se evitan con la protección adecuada y el hábito de usarla. En las tareas donde hay proyección de partículas, polvo, esquirlas, salpicaduras químicas o radiación —esmerilar, picar, soplar con aire, manejar químicos, soldar— el uso de antiparras, gafas o careta es obligatorio durante toda la tarea, no solo por momentos. Elige la protección correcta para el riesgo: antiparras cerradas contra polvo y salpicaduras, careta sobre las antiparras cuando hay proyección fuerte, y filtro adecuado para soldadura. Mantén los lentes limpios y sin rayaduras para no quitártelos por mala visión. Nunca uses aire comprimido para limpiarte la ropa o el cuerpo, ni apuntes hacia otros. Ante cualquier partícula o salpicadura en el ojo, no te lo refriegues: lava con agua o en la ducha lavaojos y avisa. Proteger tus ojos toma un segundo; recuperarlos, muchas veces, no es posible.',
              puntos: ['Casi toda lesión ocular es evitable', 'Protección correcta según el riesgo', 'Lentes limpios para no quitárselos', 'Ante salpicadura: lavar, no refregar', 'No usar aire comprimido para limpiarse'] },
            { n: 46, titulo: 'Calzado de seguridad y cuidado de los pies',
              desarrollo: 'Los pies están expuestos a golpes, aplastamientos, pisadas sobre objetos punzantes, resbalones y salpicaduras, y el calzado de seguridad es la barrera que los protege durante toda la jornada. Úsalo siempre, bien abrochado, dentro de las áreas donde es obligatorio, y no lo reemplaces por calzado común aunque sea por un rato. Revisa que esté en buen estado: puntera firme, suela sin desgaste excesivo que mantenga el agarre, y sin cortes ni deterioro que comprometan la protección. Elige el calzado adecuado al riesgo de tu tarea —puntera reforzada contra golpes, suela antideslizante donde hay superficies mojadas, resistencia química donde se manejan sustancias—. Mantén los cordones amarrados para no tropezar y el calzado limpio y seco. Si está dañado o muy gastado, solicita su reposición antes de que deje de protegerte. Un buen calzado, en buen estado y bien usado, es lo que evita que una pisada o una caída de objeto termine en lesión.',
              puntos: ['Usarlo siempre y bien abrochado', 'Revisar puntera y suela', 'Calzado adecuado al riesgo de la tarea', 'Reponerlo cuando está gastado', 'Cordones amarrados para no tropezar'] },
            { n: 47, titulo: 'Guantes según el riesgo de la tarea',
              desarrollo: 'No existe un guante que sirva para todo: cada tarea tiene su riesgo y su guante, y usar el equivocado puede darte una falsa sensación de protección o, peor, aumentar el peligro. Para manipular vidrio o materiales cortantes usa guantes anticorte; para químicos, guantes resistentes al producto según su hoja de datos; para calor, guantes térmicos; y para manejo general, guantes que den agarre sin sacrificar destreza. Antes de usarlos, revísalos: sin cortes, roturas ni desgaste que dejen expuesta la mano. Ajústalos bien, pero recuerda una regla clave: nunca uses guantes cerca de partes giratorias o equipos en movimiento, porque pueden engancharse y arrastrar tu mano. Quítatelos correctamente cuando manejas químicos para no contaminarte, y no reutilices guantes desechables. Solicita el recambio cuando estén dañados. Elegir y usar el guante correcto para cada tarea es lo que realmente protege tus manos, que son tu herramienta más valiosa.',
              puntos: ['Cada tarea tiene su tipo de guante', 'Revisar que no estén dañados', 'Nunca guantes cerca de partes giratorias', 'Solicitar recambio cuando se deterioran', 'Quitarse los guantes de químicos correctamente'] },
            { n: 48, titulo: 'Fatiga, sueño y autocuidado',
              desarrollo: 'La fatiga y la falta de sueño reducen tu atención, tu tiempo de reacción y tu capacidad de tomar buenas decisiones, casi como lo haría el alcohol, y eso te expone a cometer errores y a sufrir accidentes. Llegar descansado al trabajo es parte de tu responsabilidad: cuida tus horas de sueño, más aún si trabajas en turnos, y aprovecha los descansos para recuperarte de verdad. Durante la jornada, reconoce las señales de fatiga —bostezos, vista pesada, dificultad para concentrarte, irritabilidad— tanto en ti como en tus compañeros. Si te sientes muy cansado para realizar una tarea de riesgo con seguridad, no la fuerces: avisa a tu supervisor. Hidrátate, aliméntate bien y evita depender de la cafeína para funcionar. Un compañero que se ve agotado también es un riesgo para el equipo. Reconocer tu propio estado y cuidarte fuera y dentro del trabajo es la base para operar con seguridad.',
              puntos: ['La fatiga reduce atención y reacción', 'Llegar descansado es responsabilidad propia', 'Reconocer las señales en ti y en otros', 'Avisar si estás muy cansado para una tarea de riesgo', 'Un compañero agotado también es un riesgo'] },
            { n: 49, titulo: 'Alcohol y drogas en el trabajo',
              desarrollo: 'El alcohol y las drogas afectan la coordinación, el juicio, los reflejos y la percepción del riesgo, y en un entorno con máquinas, alturas, químicos y vehículos, presentarse bajo su efecto pone en peligro tu vida y la de todos a tu alrededor. Por eso está prohibido trabajar bajo la influencia de alcohol o drogas, y esta regla no admite excepciones ni autoengaños. Ten presente que algunos medicamentos también producen somnolencia o disminuyen tu capacidad de reacción: si estás en tratamiento, consúltalo y avisa cuando corresponda. El consumo de la noche anterior puede seguir afectándote durante el turno, así que la responsabilidad empieza fuera del trabajo. Si notas que un compañero no está en condiciones, no lo encubras: hacerlo es exponerlo a él y a los demás; lo correcto es informar para cuidarlo. Llegar en plenas condiciones a trabajar no es solo una norma: es un acto de respeto por tu seguridad y la del equipo.',
              puntos: ['Alcohol y drogas afectan juicio y reflejos', 'Prohibido trabajar bajo su influencia', 'Cuidado con medicamentos que dan sueño', 'No encubrir: informar es cuidar', 'El consumo de la noche anterior aún te afecta'] },
            { n: 50, titulo: 'Conducción y vehículos dentro de la planta',
              desarrollo: 'Conducir dentro de la planta o hacia ella exige la misma atención que cualquier tarea de riesgo, porque los atropellos y las colisiones están entre los accidentes más graves. Respeta las velocidades máximas, la señalización y las vías internas, y recuerda que en planta conviven peatones, equipos móviles y cargas en un espacio reducido. Antes de mover un vehículo, haz tu inspección: frenos, luces, neumáticos, espejos y alarma de retroceso. Usa siempre el cinturón de seguridad, incluso en trayectos cortos, y mantén la distancia. Extrema el cuidado al retroceder y en las intersecciones ciegas, apoyándote en un guía cuando la visibilidad sea limitada. No uses el teléfono al conducir, no manejes con fatiga y cede el paso al peatón. Estaciona en los lugares autorizados, con freno de mano y, si corresponde, calzado. Conducir a la defensiva, atento y sin apuro, es lo que evita que un vehículo cause una tragedia.',
              puntos: ['Respetar velocidad, señalización y vías', 'Inspeccionar el vehículo antes de mover', 'Cinturón siempre, sin teléfono', 'Cuidado al retroceder y ceder al peatón', 'No conducir con fatiga'] },
            { n: 51, titulo: 'Golpes por o contra objetos',
              desarrollo: 'Los golpes contra estructuras y los impactos de objetos que caen o se mueven son de los accidentes más frecuentes, y muchas veces dejan lesiones serias en cabeza, manos y piernas. Para evitar el golpe contra objetos, mantén la atención en tu entorno, respeta la señalización de estructuras bajas o salientes, y no transites distraído ni cargando bultos que te tapen la visión. Para evitar los golpes por objetos, no te ubiques ni transites bajo cargas suspendidas o trabajos en altura, respeta las áreas restringidas y usa el casco donde es obligatorio. Asegura los materiales y herramientas para que no caigan, sobre todo cuando trabajas en niveles superiores, y no dejes objetos al borde de plataformas o en zonas de tránsito. Cuidado con las herramientas y piezas bajo tensión o resorte, que pueden saltar. Mantener el orden, la atención y el respeto por las zonas de riesgo es lo que evita que un objeto o una estructura te golpee.',
              puntos: ['Atención al entorno y a estructuras bajas', 'No transitar bajo cargas ni trabajos en altura', 'Asegurar materiales para que no caigan', 'Usar casco donde es obligatorio', 'Cuidado con piezas bajo tensión o resorte que saltan'] },
            { n: 52, titulo: 'Caídas al mismo nivel',
              desarrollo: 'Las caídas al mismo nivel —resbalones y tropiezos— se subestiman por ser tan comunes, pero causan esguinces, fracturas y golpes que dejan a las personas con licencia por semanas. La mayoría se origina en condiciones evitables: pisos mojados o con derrames, cables y mangueras cruzando el paso, desniveles, materiales en las vías o mala iluminación. Mantén tu área ordenada y limpia, seca de inmediato los derrames o señalízalos, y recoge lo que pueda hacer tropezar. Camina atento al piso, sin correr y sin las manos en los bolsillos, respetando las vías demarcadas y usando los pasamanos en escaleras. Usa calzado en buen estado, con suela que agarre. No te distraigas con el teléfono al desplazarte y presta especial atención en zonas con agua, aceite o polvo resbaladizo. Reporta las condiciones inseguras del piso para que se corrijan. Prestar atención por donde caminas y mantener el paso despejado es lo que evita una caída que parece tonta pero lesiona en serio.',
              puntos: ['Resbalones y tropiezos lesionan en serio', 'Secar o señalizar derrames de inmediato', 'Vías despejadas y calzado con buen agarre', 'Caminar atento, sin correr ni distraerse', 'Reportar las condiciones inseguras del piso'] },
            { n: 53, titulo: 'Radiación UV y trabajo bajo el sol',
              desarrollo: 'La radiación ultravioleta del sol es un riesgo real para quienes trabajan a la intemperie: causa quemaduras, envejecimiento de la piel y, con los años, cáncer de piel, además de daño a la vista. El daño es acumulativo y no depende del calor, así que también te expones en días nublados o fríos. Protégete usando la ropa adecuada que cubra brazos y cuello, gorro tipo legionario bajo el casco y bloqueador solar con factor alto, aplicado antes de la exposición y reaplicado durante la jornada, sobre todo si sudas. Usa lentes con protección UV. Aprovecha la sombra en los descansos y organiza, cuando se pueda, las tareas de mayor exposición fuera de las horas de radiación más intensa del mediodía. Hidrátate con frecuencia. Conoce el índice UV del día para ajustar tu protección. Cuidarte del sol cada día, aunque no lo sientas fuerte, es lo que protege tu piel y tu vista a largo plazo.',
              puntos: ['El daño UV es acumulativo, aun con nubes', 'Ropa cubierta, gorro y bloqueador reaplicado', 'Lentes con protección UV', 'Buscar sombra y evitar el mediodía', 'Hidratarse con frecuencia durante la jornada'] },
            { n: 54, titulo: 'Trabajo con frío y a la intemperie',
              desarrollo: 'El frío, sobre todo combinado con viento y humedad, no es solo una molestia: puede provocar hipotermia, entumecimiento que reduce la destreza y el tacto, y con ello más riesgo de errores y accidentes. Para trabajar seguro en frío, abrígate por capas, que permiten regular la temperatura según la actividad, y protege las extremidades, la cabeza y el cuello, que son por donde más calor se pierde. Mantén la ropa seca; la humedad enfría rápidamente el cuerpo, así que cámbiate si te mojas. Toma pausas en lugares abrigados para recuperar temperatura y entrar en calor. Reconoce las señales de alerta —temblores intensos, entumecimiento, torpeza, confusión— en ti y en tus compañeros, y actúa a tiempo. Consume líquidos y alimentos que aporten energía. Cuidado además con las superficies heladas y resbaladizas. Vestirte adecuadamente y respetar las pausas de recuperación es lo que te permite trabajar en frío sin que tu cuerpo ni tu concentración se resientan.',
              puntos: ['El frío reduce destreza y concentración', 'Abrigarse por capas y mantener la ropa seca', 'Pausas en lugares abrigados', 'Reconocer señales de hipotermia a tiempo', 'Cuidado con las superficies heladas y resbaladizas'] },
            { n: 55, titulo: 'Riesgos psicosociales y manejo del estrés',
              desarrollo: 'La seguridad no es solo física: la carga mental, el estrés sostenido, las malas relaciones o las exigencias mal gestionadas también afectan tu salud y aumentan el riesgo de accidentes, porque una mente sobrecargada se distrae y decide peor. Los riesgos psicosociales son parte de la prevención y se pueden abordar. Reconoce las señales del estrés en ti —irritabilidad, insomnio, cansancio permanente, dificultad para concentrarte— y no las dejes pasar. Organiza tu trabajo, pide apoyo cuando la carga te supere y comunica los problemas antes de que se acumulen. Cuida las relaciones con tus compañeros: un buen ambiente de trabajo protege a todos. Aprovecha los canales que la empresa dispone para plantear estas situaciones y participa en las evaluaciones de riesgo psicosocial. Buscar ayuda no es debilidad, es autocuidado. Atender tu bienestar mental, hablar de lo que te afecta y apoyarte en el equipo es también una forma de trabajar más seguro.',
              puntos: ['La carga mental también afecta la seguridad', 'Reconocer las señales del estrés', 'Comunicar y pedir apoyo a tiempo', 'Buscar ayuda es autocuidado', 'Cuidar el buen ambiente con los compañeros'] },
            { n: 56, titulo: 'Ambiente laboral y Ley Karin',
              desarrollo: 'Un trabajo seguro también es un trabajo sin acoso ni violencia. La Ley Karin refuerza el derecho de todas las personas a un ambiente laboral libre de acoso laboral, acoso sexual y violencia en el trabajo, y establece que estas conductas no se toleran ni se dejan pasar. El acoso laboral es el maltrato reiterado que humilla o menoscaba; el acoso sexual es cualquier requerimiento de carácter sexual no consentido; y la violencia incluye agresiones de terceros. Todos somos responsables de mantener el respeto: trata a tus compañeros como quieres ser tratado, evita bromas o comentarios que ofendan, y no seas cómplice con el silencio. Si vives o presencias una situación de este tipo, tienes canales confidenciales para denunciar, y la empresa debe investigar y proteger a los afectados sin represalias. Conoce el protocolo y a quién acudir. Cuidar el trato y el respeto entre todos es lo que construye un ambiente donde se puede trabajar sano y seguro.',
              puntos: ['Derecho a un trabajo sin acoso ni violencia', 'Acoso laboral, sexual y violencia no se toleran', 'Canales confidenciales para denunciar', 'El respeto entre todos es de cada uno', 'El silencio también es complicidad'] },
            { n: 57, titulo: 'Etiquetado de sustancias químicas (SGA)',
              desarrollo: 'En la planta se manejan sustancias químicas que pueden ser corrosivas, tóxicas, inflamables o dañinas para la salud, y la etiqueta es la primera fuente de información para manejarlas con seguridad. El Sistema Globalmente Armonizado, o SGA, usa pictogramas —rombos rojos con símbolos— que te dicen de un vistazo el peligro: llama para inflamable, calavera para tóxico, corrosión para lo que quema piel y metales, y otros. Antes de usar cualquier producto, lee su etiqueta: identifica el producto, sus peligros, y las precauciones de uso y almacenamiento. Nunca uses un envase sin etiqueta o con etiqueta ilegible, ni trasvasijes productos a envases sin identificar, y jamás a envases de alimentos o bebidas. Mantén los productos en sus envases originales, bien cerrados. Si la etiqueta indica un EPP, úsalo. Saber leer la etiqueta y respetar lo que dice es el primer paso para no exponerte a un producto que puede lesionarte.',
              puntos: ['La etiqueta es la primera información de peligro', 'Pictogramas SGA indican el riesgo', 'Nunca usar envases sin etiqueta', 'No trasvasijar a envases de alimentos', 'Mantener los productos en su envase original y cerrado'] },
            { n: 58, titulo: 'Hoja de datos de seguridad (HDS)',
              desarrollo: 'Cada sustancia química peligrosa debe contar con su Hoja de Datos de Seguridad, un documento que reúne todo lo que necesitas saber para manejarla, y tienes derecho a conocerla antes de trabajar con el producto. La HDS te dice los peligros de la sustancia, el EPP que debes usar, cómo manipularla y almacenarla, qué hacer ante un derrame, y —muy importante— los primeros auxilios en caso de contacto, ingestión o inhalación. Antes de usar un producto que no conoces, revisa su HDS y familiarízate al menos con sus peligros, sus medidas de protección y las acciones de emergencia. Debes saber dónde están disponibles las hojas en tu área para consultarlas cuando las necesites, especialmente ante una emergencia, cuando no hay tiempo para improvisar. Ante un accidente con un químico, la información de su HDS puede orientar la atención. Conocer y saber consultar la HDS es lo que convierte un producto peligroso en uno que puedes manejar con seguridad.',
              puntos: ['Toda sustancia peligrosa tiene su HDS', 'Indica peligros, EPP y primeros auxilios', 'Consultarla antes de usar un producto nuevo', 'Saber dónde están disponibles en tu área', 'Es tu derecho conocerla antes de trabajar con el producto'] },
            { n: 59, titulo: 'Señalización de seguridad',
              desarrollo: 'La señalización de seguridad es un lenguaje que nos advierte de los peligros y nos indica qué hacer, y solo sirve si todos la entendemos y la respetamos. Los colores y las formas tienen significado: el rojo señala prohibición y elementos contra incendio; el amarillo, advertencia de un peligro; el azul, una obligación como usar un EPP; y el verde, condiciones de seguridad como salidas, vías de evacuación y zonas seguras. Aprende a reconocer las señales de tu área y actúa según lo que indican, sin ignorarlas por costumbre. No retires, tapes ni dañes la señalización, y reporta cuando falte, esté deteriorada o ya no corresponda al riesgo real. Respeta especialmente las señales de prohibición y de peligro, y mantén visibles y despejadas las señales de emergencia y los elementos de seguridad. Prestar atención a la señalización y hacerle caso, en vez de pasar por alto lo que advierte, es una forma sencilla y constante de cuidarte.',
              puntos: ['Cada color y forma tiene un significado', 'Rojo prohíbe, amarillo advierte, azul obliga, verde informa', 'No retirar ni tapar la señalización', 'Reportar señales faltantes o deterioradas', 'Hacer caso a la señal, no ignorarla por costumbre'] },
            { n: 60, titulo: 'Sismo: cómo actuar en la planta',
              desarrollo: 'Vivimos en un país sísmico, y un terremoto puede sorprenderte en cualquier momento, por lo que saber cómo reaccionar en la planta es fundamental. Durante el sismo, si estás en un lugar cerrado, protégete: aléjate de estanterías, materiales apilados, ventanas y estructuras que puedan caer, y ubícate en una zona más segura agachado y cubriéndote la cabeza. Si operas un equipo, deténlo de forma segura si alcanzas a hacerlo, sin arriesgarte. No corras ni salgas en pleno movimiento, donde puedes tropezar o ser golpeado por objetos que caen. Una vez que el sismo pase, evacúa con calma hacia la zona de seguridad por las vías señalizadas, atento a réplicas, derrames o estructuras dañadas. No regreses a las instalaciones hasta que se autorice. Ten presente el riesgo de caída de materiales y de fugas tras el movimiento. Conocer de antemano tu zona de seguridad y cómo protegerte es lo que te permite reaccionar bien cuando la tierra se mueve.',
              puntos: ['Durante el sismo: alejarse de lo que puede caer', 'Protegerse la cabeza, no correr', 'Evacuar con calma al pasar el movimiento', 'Atento a réplicas, derrames y daños', 'No regresar hasta que se autorice'] },
            { n: 61, titulo: 'Segregación y manejo de residuos',
              desarrollo: 'El manejo correcto de los residuos protege tu salud, el orden de la planta y el medio ambiente, y empieza por segregar cada residuo donde corresponde. Separa según su tipo: los comunes, los reciclables y, con especial cuidado, los residuos peligrosos como aceites, solventes, envases contaminados, trapos con químicos o restos de sustancias, que no pueden mezclarse con la basura común. Usa los contenedores identificados para cada residuo y no los sobrellenes. Los residuos peligrosos deben manejarse con el EPP adecuado y almacenarse en los lugares designados, cerrados y señalizados, evitando derrames. No acumules residuos en las vías ni en el puesto de trabajo, porque generan riesgo de caídas e incendio. Ante un derrame de residuo peligroso, contén y avisa según el procedimiento. Cuidar cómo separas y dispones lo que desechas no es un trámite: es parte de mantener un lugar de trabajo sano, ordenado y respetuoso con el entorno.',
              puntos: ['Segregar cada residuo donde corresponde', 'Los peligrosos no van con la basura común', 'Contenedores identificados y sin sobrellenar', 'No acumular residuos en vías ni puestos', 'Contener y avisar ante un derrame peligroso'] },
            { n: 62, titulo: 'Análisis de trabajo seguro antes de la tarea',
              desarrollo: 'Antes de comenzar una tarea, sobre todo si no es rutinaria, vale la pena detenerse un momento a pensar qué puede salir mal y cómo evitarlo; eso es, en esencia, un análisis de trabajo seguro. Consiste en dividir la tarea en pasos, identificar los peligros de cada paso —caídas, atrapamientos, químicos, energía, cargas— y definir las medidas de control antes de exponerte. Hazlo con el equipo, porque entre todos se ven más riesgos, y considera las condiciones del día: el clima, el entorno, quiénes trabajan cerca. Verifica que tengas el EPP, las herramientas y los permisos necesarios antes de partir. Si durante la tarea cambian las condiciones o aparece algo no previsto, detente y vuelve a analizar. No es papeleo: es la costumbre de pensar antes de actuar, que evita que un peligro te tome por sorpresa. Tomarte esos minutos para planificar la seguridad de la tarea es lo que hace la diferencia entre trabajar por inercia y trabajar con control.',
              puntos: ['Pensar qué puede salir mal antes de partir', 'Identificar peligros y controles por paso', 'Verificar EPP, herramientas y permisos', 'Si cambian las condiciones, detenerse y reanalizar', 'Analizarlo en equipo: entre todos se ven más riesgos'] },
            { n: 63, titulo: 'Observación de conducta y detención por seguridad',
              desarrollo: 'La seguridad se construye entre todos, y eso incluye observar cómo trabajamos y tener el valor de detener una tarea cuando algo no está bien. Observar la conducta no es vigilar ni acusar: es fijarse en las prácticas seguras para reforzarlas, y en las inseguras para corregirlas a tiempo, conversando de forma respetuosa. Si ves a un compañero exponiéndose —sin su EPP, saltándose un paso, en una posición de riesgo— acércate y coméntalo; probablemente no se dio cuenta, y ese aviso puede evitarle una lesión. Del mismo modo, todos tenemos el derecho y el deber de detener un trabajo cuando percibimos un riesgo grave o una condición insegura, sin miedo a represalias; ninguna tarea es tan urgente como para arriesgar a una persona. Detener, avisar y corregir antes de continuar siempre es la decisión correcta. Cuidarnos mutuamente, hablar cuando vemos un riesgo y respaldar a quien detiene una tarea es lo que hace fuerte la seguridad del equipo.',
              puntos: ['Observar para reforzar y corregir, no para acusar', 'Avisar a un compañero que se expone', 'Todos pueden detener un trabajo riesgoso', 'Ninguna tarea urgente justifica un riesgo grave', 'Respaldar a quien detiene una tarea por seguridad'] },
