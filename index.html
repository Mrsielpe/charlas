            36: { "preguntas": [{"q": "Antes de usar un extintor, ¿qué debes verificar primero?", "alt": ["Que el extintor tenga la etiqueta más nueva del mercado", "Que el extintor sea del color rojo más brillante", "Que el manómetro esté en la zona verde y la tarjeta de mantención esté al día"], "correcta": 2}, {"q": "¿Cuál es la secuencia correcta para usar un extintor?", "alt": ["Apretar, apuntar, tirar, abanicar", "Abanicar, tirar, apretar, apuntar al humo", "Tirar el seguro, apuntar a la base del fuego, apretar la manija, abanicar de lado a lado"], "correcta": 2}, {"q": "¿A qué parte del fuego se debe apuntar el chorro del extintor?", "alt": ["A las llamas más altas", "Al humo que se eleva", "A la base del fuego"], "correcta": 2}, {"q": "¿Cuándo es correcto usar un extintor para combatir un incendio?", "alt": ["Solo si hay más de tres personas ayudando", "En cualquier incendio, sin importar su tamaño", "Solo en fuegos pequeños y cuando existe una vía de escape segura detrás de ti"], "correcta": 2}, {"q": "Si el fuego es grande o no tienes una salida segura, ¿qué debes hacer?", "alt": ["Acercarte más para apagarlo rápido", "Usar dos extintores al mismo tiempo", "No intentar apagarlo, evacuar y dar aviso según el procedimiento de la planta"], "correcta": 2}, {"q": "Después de usar un extintor, aunque sea parcialmente, ¿qué debes hacer?", "alt": ["Dejarlo donde estaba sin decir nada", "Reportarlo de inmediato para que sea recargado", "Guardarlo en tu casillero personal"], "correcta": 1}, {"q": "¿Por qué es importante conocer la ubicación y el tipo de extintor de tu área de trabajo?", "alt": ["Porque así puedes decorar mejor el sector", "Para reaccionar rápido y usar el extintor adecuado según el tipo de fuego", "Porque es un requisito solo para el jefe de turno"], "correcta": 1}], "compromiso": ["Conocer la ubicación y el tipo de extintor asignado a mi área de trabajo.", "Revisar que el manómetro esté en verde y la tarjeta de mantención esté al día antes de confiar en un extintor.", "Aplicar siempre la técnica de tirar, apuntar, apretar y abanicar al usar un extintor.", "Usar el extintor solo en fuegos pequeños y contando con una vía de escape segura.", "Reportar de inmediato cualquier extintor que haya sido usado, para que se recargue a tiempo.", "No intentar apagar un incendio que supere mis capacidades y dar aviso oportuno según el procedimiento."] },
            37: { "preguntas": [{"q": "¿Qué debes hacer al escuchar la alarma de emergencia?", "alt": ["Terminar la tarea que estás haciendo y luego evacuar", "Esperar que un compañero te avise si es real", "Dirigirte de inmediato a la vía de evacuación y zona de seguridad"], "correcta": 2}, {"q": "¿Cómo deben mantenerse siempre las vías de evacuación?", "alt": ["Con materiales apilados temporalmente si hay poco espacio", "Despejadas, sin materiales ni obstáculos", "Cerradas con candado por seguridad"], "correcta": 1}, {"q": "¿Cuál es la forma correcta de evacuar durante una emergencia?", "alt": ["Corriendo para salir lo antes posible", "Caminando rápido, sin correr y sin devolverse", "Devolverse a buscar pertenencias si es rápido"], "correcta": 1}, {"q": "Si olvidaste algo importante dentro del área durante la evacuación, ¿qué debes hacer?", "alt": ["Volver rápido a buscarlo antes de que llegue el supervisor", "Pedirle a otro trabajador que entre por ti", "No devolverte por ningún motivo y seguir hacia la zona de seguridad"], "correcta": 2}, {"q": "Una vez que llegas a la zona de seguridad, ¿qué debes hacer?", "alt": ["Permanecer ahí hasta que se realice el conteo de personal", "Retirarte a tu casa si la emergencia parece controlada", "Volver a tu puesto de trabajo apenas se calme la situación"], "correcta": 0}, {"q": "¿Por qué es importante conocer de antemano la alarma, las vías y la zona de seguridad de tu área?", "alt": ["Porque permite reaccionar rápido y de forma segura en una emergencia real", "Es solo un requisito administrativo sin mayor utilidad", "Porque así se evita hacer los simulacros"], "correcta": 0}, {"q": "¿Cómo debes participar en los simulacros de emergencia?", "alt": ["Participando solo si no interrumpe el trabajo", "Solo si el supervisor está mirando", "Tomándolos en serio, como si fueran una emergencia real"], "correcta": 2}], "compromiso": ["Conocer la alarma, las vías de evacuación y la zona de seguridad de mi área de trabajo.", "Mantener siempre despejadas las vías de evacuación, sin dejar materiales ni obstáculos.", "Evacuar caminando rápido, sin correr y sin devolverme por ningún motivo.", "Permanecer en la zona de seguridad hasta que se realice el conteo de personal.", "Participar en serio en cada simulacro, como si fuera una emergencia real.", "Reportar de inmediato cualquier vía de evacuación bloqueada u obstruida que detecte."] },
            38: { "preguntas": [{"q": "Si un compañero sufre un accidente grave, ¿qué se debe hacer primero?", "alt": ["Moverlo de inmediato a un lugar cómodo", "Asegurar el lugar y dar aviso de inmediato", "Darle agua para que reaccione"], "correcta": 1}, {"q": "¿Qué se debe hacer con un trabajador que quedó inconsciente tras un golpe?", "alt": ["No darle agua y pedir ayuda de inmediato", "Darle agua de a poco para que despierte", "Sentarlo y darle agua con azúcar"], "correcta": 0}, {"q": "Un compañero tiene una fractura y mucho dolor en la pierna, ¿qué corresponde hacer?", "alt": ["Estirarle la pierna para acomodar el hueso", "No moverlo sin necesidad y esperar ayuda especializada", "Ayudarlo a caminar hasta la enfermería"], "correcta": 1}, {"q": "¿Ante una quemadura con líquido caliente, qué se debe evitar?", "alt": ["Aplicar remedios caseros como pasta de dientes o aceite", "Enfriar la zona con agua limpia", "Avisar de inmediato al supervisor"], "correcta": 0}, {"q": "¿Por qué es importante conocer a los brigadistas de la planta?", "alt": ["Porque son quienes están capacitados para actuar en una emergencia", "Porque ellos reparten los turnos de trabajo", "Porque son los únicos autorizados a usar el comedor"], "correcta": 0}, {"q": "¿Qué se debe hacer si no se sabe usar algo del botiquín?", "alt": ["Improvisar con lo que se tenga a mano", "Usarlo igual, no puede pasar nada grave", "No usarlo y esperar a un brigadista o personal capacitado"], "correcta": 2}, {"q": "¿Cuál es la actitud correcta frente a una herida abierta de un compañero?", "alt": ["Cubrirla con hojas o barro si no hay gasa", "No aplicar remedios caseros y avisar para atención especializada", "Lavarla con alcohol y vendarla uno mismo sin avisar"], "correcta": 1}], "compromiso": ["Asegurar el lugar del accidente y dar aviso de inmediato ante cualquier emergencia.", "No mover a un lesionado grave si no es estrictamente necesario.", "No dar agua ni ningún líquido a una persona inconsciente.", "Conocer quiénes son los brigadistas y dónde está ubicado el botiquín de mi área.", "No aplicar remedios caseros sobre heridas o quemaduras de un compañero.", "Actuar con calma y dejar la atención especializada a los brigadistas o personal capacitado."] },
            39: { "preguntas": [{"q": "Antes de usar una escala portátil, ¿qué debes revisar?", "alt": ["Peldaños, largueros y zapatas", "Solo el color de la escala", "El peso que tiene el fabricante impreso"], "correcta": 0}, {"q": "¿Cómo se debe subir por una escala?", "alt": ["De espaldas, mirando hacia abajo", "De lado, para ver mejor los peldaños", "De frente a la escala, manteniendo tres puntos de apoyo"], "correcta": 2}, {"q": "Si necesitas alcanzar un punto más lejos de lo que da tu brazo estando en la escala, ¿qué debes hacer?", "alt": ["Bajar y mover la escala hasta la posición correcta", "Estirarte sujetándote con una sola mano", "Pedir a un compañero que sostenga la escala mientras te estiras"], "correcta": 0}, {"q": "¿Dónde se debe apoyar una escala portátil para usarla de forma segura?", "alt": ["Sobre una superficie firme y con el ángulo correcto", "En cualquier lugar disponible, aunque esté desnivelado", "Sobre cajas o tablones para ganar altura"], "correcta": 0}, {"q": "¿Está permitido pararse en la última grada de la escala?", "alt": ["No, nunca se debe usar la última grada como punto de apoyo", "Sí, siempre que sea por poco tiempo", "Sí, si la tarea es rápida y sencilla"], "correcta": 0}, {"q": "¿Qué significa mantener 'tres puntos de apoyo' al subir una escala?", "alt": ["Que la escala tenga tres patas de apoyo en el suelo", "Tener siempre dos manos y un pie, o dos pies y una mano, en contacto con la escala", "Que tres personas sostengan la escala"], "correcta": 1}, {"q": "¿Por qué es importante revisar los largueros y zapatas antes de usar la escala?", "alt": ["Porque así se ve más ordenada la herramienta", "Porque es un requisito solo para escalas nuevas", "Para detectar daños o desgaste que puedan provocar una caída"], "correcta": 2}], "compromiso": ["Revisar siempre peldaños, largueros y zapatas antes de usar una escala portátil.", "Ubicar la escala sobre superficie firme y con el ángulo correcto antes de subir.", "Subir y bajar siempre de frente a la escala, manteniendo tres puntos de apoyo.", "Bajar y mover la escala en vez de estirarme para alcanzar un punto lejano.", "No pararme nunca en la última grada de la escala.", "Reportar de inmediato cualquier escala en mal estado antes de utilizarla."] },
            40: { "preguntas": [{"q": "Antes de iniciar un trabajo en caliente (soldadura, esmerilado, corte), ¿qué se debe hacer primero?", "alt": ["Avisar por radio y comenzar de inmediato", "Tramitar y contar con el permiso de trabajo correspondiente", "Solo pedir autorización verbal al supervisor"], "correcta": 1}, {"q": "¿Qué se debe hacer con los materiales combustibles antes de un trabajo en caliente?", "alt": ["Despejarlos del área y tener un extintor disponible", "Cubrirlos con una lona para protegerlos", "Dejarlos en el lugar si están lejos del punto de trabajo"], "correcta": 0}, {"q": "¿Qué función cumple el vigía de fuego durante un trabajo en caliente?", "alt": ["Ayudar a soldar cuando el trabajador se cansa", "Vigilar el entorno por si se produce un inicio de incendio", "Registrar los materiales usados en el trabajo"], "correcta": 1}, {"q": "¿Hasta cuándo debe mantenerse la vigilancia del vigía de fuego según lo enseñado en la charla?", "alt": ["Solo durante el trabajo, se retira apenas termina", "Durante el trabajo y también después de terminado", "Solo si el supervisor lo solicita expresamente"], "correcta": 1}, {"q": "¿Por qué es importante usar el EPP específico para trabajos en caliente?", "alt": ["Porque protege contra chispas, calor y proyecciones propias de esta tarea", "Porque es un requisito solo para fotografías de auditoría", "Porque reemplaza la necesidad de contar con extintor"], "correcta": 0}, {"q": "¿Por qué las chispas de un trabajo en caliente pueden seguir siendo un riesgo después de terminada la tarea?", "alt": ["Porque nunca representan riesgo una vez que se apaga el equipo", "Porque pueden quedar latentes y generar un incendio horas después", "Porque solo son peligrosas mientras se está soldando"], "correcta": 1}, {"q": "Si un trabajador detecta que no cuenta con el permiso de trabajo vigente para una tarea en caliente, ¿qué debe hacer?", "alt": ["No iniciar el trabajo y regularizar el permiso antes de comenzar", "Iniciar la tarea igual si el trabajo es corto", "Pedir a un compañero que preste su permiso"], "correcta": 0}], "compromiso": ["Tramitar y contar siempre con el permiso de trabajo vigente antes de iniciar un trabajo en caliente.", "Despejar los materiales combustibles del área y verificar la disponibilidad de un extintor antes de comenzar.", "Mantener o asegurar la presencia del vigía de fuego durante y después del trabajo en caliente.", "Usar siempre el EPP específico definido para trabajos en caliente.", "Revisar el área después de terminado el trabajo para descartar chispas o focos de calor latentes.", "Detener la tarea y avisar a mi supervisor si no cuento con el permiso de trabajo correspondiente."] },
            41: { "preguntas": [{"q": "Para que exista fuego, ¿qué tres elementos deben juntarse?", "alt": ["Agua, viento y combustible", "Combustible, oxígeno y calor", "Humo, calor y ceniza"], "correcta": 1}, {"q": "¿Por qué el orden y el aseo en el lugar de trabajo ayudan a prevenir incendios?", "alt": ["Porque hacen el trabajo más rápido", "Porque mejoran la iluminación del área", "Porque reducen la acumulación de materiales combustibles"], "correcta": 2}, {"q": "¿Qué se debe hacer apenas se detecta un incendio, antes de intentar combatirlo?", "alt": ["Esperar a ver si el fuego crece", "Buscar el extintor más cercano sin avisar a nadie", "Dar la alarma"], "correcta": 2}, {"q": "¿Por qué existen distintas clases de fuego (A, B, C, etc.)?", "alt": ["Porque cada clase produce distinto color de humo", "Porque solo sirve para clasificar en informes", "Porque cada tipo de material que se quema requiere un método distinto para combatirlo"], "correcta": 2}, {"q": "¿Qué puede pasar si se usa el agente extintor equivocado para un tipo de fuego?", "alt": ["El fuego se apaga igual de rápido", "El fuego se puede avivar o propagar más", "No pasa nada, todos los agentes sirven para todo"], "correcta": 1}, {"q": "¿Cuál de estas acciones ayuda mejor a prevenir un incendio en el área de trabajo?", "alt": ["Mantener pasillos y zonas de trabajo ordenadas y libres de materiales innecesarios", "Guardar trapos con solvente cerca de fuentes de calor", "Dejar cajas y cartones acumulados junto a equipos eléctricos"], "correcta": 0}, {"q": "Antes de combatir un fuego, ¿qué es igual de importante que dar la alarma?", "alt": ["Filmar la situación para el reporte", "Reconocer la clase de fuego para usar el agente correcto", "Retirar solo los objetos de valor cercanos"], "correcta": 1}], "compromiso": ["Mantener mi área de trabajo ordenada y limpia para evitar la acumulación de materiales combustibles.", "Dar la alarma de inmediato apenas detecte un principio de incendio, antes de intentar combatirlo.", "Reconocer la clase de fuego antes de actuar, para usar el método o agente extintor correcto.", "No usar nunca un agente extintor sin saber si es el adecuado para esa clase de fuego.", "Respetar las señalizaciones y ubicaciones de los equipos contra incendio, manteniéndolos despejados.", "Reportar de inmediato cualquier condición insegura que pueda originar calor, chispas o acumulación de combustible."] },
            42: { "preguntas": [{"q": "¿Cómo se debe transportar un cilindro de gas comprimido?", "alt": ["De pie, asegurado y con su capuchón puesto", "Acostado sobre el suelo para evitar que ruede", "Arrastrándolo por el suelo tomándolo del capuchón"], "correcta": 0}, {"q": "¿Cuál es la forma correcta de almacenar los cilindros de gas?", "alt": ["Acostados y apilados unos sobre otros", "De pie y en un lugar ventilado", "Da lo mismo la posición, mientras estén bajo techo"], "correcta": 1}, {"q": "¿Por qué los cilindros de oxígeno deben mantenerse separados de los inflamables?", "alt": ["Porque ocupan menos espacio si están separados", "Porque es solo una norma de orden y aseo", "Porque juntos pueden generar riesgo de incendio o explosión"], "correcta": 2}, {"q": "¿Cómo se debe detectar una fuga en un cilindro de gas?", "alt": ["Con agua jabonosa, observando si se forman burbujas", "Acercando una llama para ver si se enciende", "Golpeando el cilindro para escuchar un sonido hueco"], "correcta": 0}, {"q": "¿Qué se debe evitar en las conexiones de un cilindro de oxígeno?", "alt": ["Verificar el manómetro antes de usar", "El uso de llave para ajustar la conexión", "Grasa o aceite en las conexiones"], "correcta": 2}, {"q": "¿Para qué sirve el capuchón del cilindro durante el transporte?", "alt": ["Para proteger la válvula de golpes o daños", "Para identificar el tipo de gas por su color", "Para facilitar que el cilindro se pueda acostar"], "correcta": 0}, {"q": "Si un cilindro no está bien asegurado durante el transporte, ¿qué riesgo principal existe?", "alt": ["Que se ensucie la superficie del cilindro", "Que se caiga, dañe la válvula y provoque un escape de gas", "Que se demore más tiempo el transporte"], "correcta": 1}], "compromiso": ["Transportar siempre los cilindros en posición vertical, asegurados y con su capuchón puesto.", "Almacenar los cilindros de pie y en zonas ventiladas.", "Mantener separados los cilindros oxidantes de los inflamables.", "Revisar posibles fugas usando agua jabonosa, nunca con llama.", "No usar grasa ni aceite en las conexiones de oxígeno.", "Reportar de inmediato a mi supervisor cualquier cilindro dañado o mal almacenado."] },
            43: { "preguntas": [{"q": "¿Cómo debe mantenerse la espalda al levantar o mover materiales?", "alt": ["Girando el tronco para ahorrar pasos", "Curvada hacia adelante para mayor fuerza", "Neutra, sin girar el tronco"], "correcta": 2}, {"q": "¿Qué se debe evitar mantener por tiempo prolongado según lo enseñado en la charla?", "alt": ["Los pies separados al ancho de hombros", "Los brazos apoyados en la cintura", "Los brazos por sobre los hombros"], "correcta": 2}, {"q": "Si una tarea exige postura forzada por mucho rato, ¿qué corresponde hacer?", "alt": ["Aguantar hasta terminar la tarea completa", "Trabajar más rápido para terminar antes", "Alternar tareas y usar ayudas mecánicas"], "correcta": 2}, {"q": "¿Qué se debe hacer si aparece dolor de espalda o de otra zona del cuerpo por el trabajo?", "alt": ["Sobarse y seguir trabajando igual", "Esperar que se pase solo antes de avisar", "Reportarlo de inmediato, sin normalizarlo"], "correcta": 2}, {"q": "Antes de manipular materiales, ¿qué se recomienda hacer para evitar estirarse en exceso?", "alt": ["Estirar los brazos al máximo para alcanzarlos", "Dejar los materiales lo más lejos posible", "Acercar los materiales al cuerpo"], "correcta": 2}, {"q": "¿Cuál de estas es una ayuda mecánica que ayuda a proteger la espalda?", "alt": ["Un carro o transpaleta para trasladar carga", "Girar el tronco con la carga en brazos", "Cargar todo el peso solo con los brazos"], "correcta": 0}, {"q": "¿Por qué es importante alternar tareas durante la jornada?", "alt": ["Para no sobrecargar siempre los mismos músculos y articulaciones", "Para que la jornada se sienta más corta", "Para llenar el reporte de producción"], "correcta": 0}], "compromiso": ["Mantener mi espalda neutra y evitar girar el tronco al mover cargas.", "Evitar mantener los brazos por sobre los hombros por tiempo prolongado.", "Alternar mis tareas y usar ayudas mecánicas disponibles cuando corresponda.", "Reportar de inmediato cualquier dolor, sin normalizarlo ni ocultarlo.", "Acercar los materiales antes de manipularlos, en vez de estirarme para alcanzarlos.", "Aplicar en terreno lo aprendido sobre posturas de trabajo y ergonomía."] },
            44: { "preguntas": [{"q": "¿Por qué es importante hacer pausas activas durante la jornada?", "alt": ["Porque así se termina más rápido el turno", "Porque el cuerpo no resiste la misma postura por horas seguidas", "Porque lo exige el reglamento interno de horarios de colación"], "correcta": 1}, {"q": "¿Cómo deben hacerse los movimientos al estirar durante una pausa activa?", "alt": ["De forma suave, sin rebotes", "Con rebotes rápidos para sentir más el estiramiento", "Lo más fuerte posible para que rinda el tiempo"], "correcta": 0}, {"q": "Si durante la jornada sientes tensión o molestia en el cuerpo, ¿qué debes hacer?", "alt": ["Ignorarla porque es normal y va a pasar sola", "Escuchar esa señal y hacer una pausa para soltar tensión", "Aumentar el ritmo de trabajo para distraerte"], "correcta": 1}, {"q": "¿Qué se recomienda hacer con las pausas breves durante la jornada?", "alt": ["Guardarlas todas para el final del turno", "Usarlas para estirar y soltar tensión en el cuerpo", "Aprovecharlas solo si el supervisor las recuerda"], "correcta": 1}, {"q": "¿Qué se debe hacer al cambiar de tarea durante la jornada?", "alt": ["Mantener exactamente la misma postura de la tarea anterior", "Aprovechar el cambio para variar la exigencia física", "Acelerar el ritmo para compensar el tiempo del cambio"], "correcta": 1}, {"q": "¿Qué señales del cuerpo deberían alertarte durante el trabajo?", "alt": ["Solo el dolor muy intenso, lo demás no importa", "Molestias, tensión o cansancio en alguna zona del cuerpo", "Ninguna, hay que aguantar hasta terminar la tarea"], "correcta": 1}, {"q": "¿Cuál es el objetivo principal de esta charla sobre pausas activas?", "alt": ["Prevenir lesiones cuidando el cuerpo durante la jornada", "Reducir el tiempo de colación disponible", "Aumentar la producción diaria de cada trabajador"], "correcta": 0}], "compromiso": ["Voy a hacer pausas breves durante mi jornada para estirar y soltar tensión.", "Voy a realizar mis estiramientos con movimientos suaves, sin rebotes.", "Voy a escuchar las señales de mi cuerpo y detenerme si siento tensión o molestia.", "Voy a aprovechar los cambios de tarea para variar la exigencia física de mi trabajo.", "Voy a evitar mantener la misma postura por horas sin moverme."] },
            45: { "preguntas": [{"q": "¿Qué porcentaje de las lesiones oculares en el trabajo se puede evitar?", "alt": ["Casi ninguna, son parte del riesgo normal del trabajo", "Solo la mitad, depende de la suerte", "Casi todas, usando la protección adecuada"], "correcta": 2}, {"q": "¿Cómo se debe elegir la protección para los ojos?", "alt": ["Solo cuando el supervisor lo exige", "Cualquier lente sirve para cualquier tarea", "Según el riesgo específico de la tarea que se realiza"], "correcta": 2}, {"q": "¿Por qué es importante mantener los lentes de seguridad limpios?", "alt": ["Para no sentir la tentación de quitárselos por mala visibilidad", "Para que no se rayen y se vean nuevos", "Porque así duran menos y hay que cambiarlos seguido"], "correcta": 0}, {"q": "Si te salpica una sustancia en el ojo, ¿qué debes hacer primero?", "alt": ["Lavar el ojo de inmediato, sin refregar", "Refregarte el ojo con fuerza para sacarla", "Esperar un rato a ver si molesta antes de actuar"], "correcta": 0}, {"q": "¿Por qué NO se debe usar aire comprimido para limpiarse el cuerpo o la ropa?", "alt": ["Porque puede proyectar partículas hacia los ojos y causar lesiones", "Porque gasta mucha energía de la planta", "Porque ensucia más la ropa de trabajo"], "correcta": 0}, {"q": "Un compañero refriega su ojo después de una salpicadura porque le arde. ¿Qué deberías hacer?", "alt": ["Indicarle que no refriegue y ayudarlo a lavar el ojo de inmediato", "Dejarlo tranquilo, es su forma de aliviarse", "Decirle que se ponga lentes de seguridad después del hecho"], "correcta": 0}, {"q": "¿Cuál de estas situaciones representa un riesgo de proyección de partículas a los ojos?", "alt": ["Trabajar sentado frente a un computador en oficina", "Esmerilar, cortar o soplar con aire comprimido cerca del rostro", "Caminar por un pasillo señalizado sin equipos en uso"], "correcta": 1}], "compromiso": ["Usar siempre la protección visual adecuada al riesgo de mi tarea.", "Mantener mis lentes de seguridad limpios para no quitármelos durante el trabajo.", "Ante cualquier salpicadura en los ojos, lavar de inmediato y no refregar.", "No usar aire comprimido para limpiarme el cuerpo o la ropa.", "Reportar de inmediato cualquier molestia o lesión ocular a mi supervisor.", "Revisar el estado de mis lentes de seguridad antes de iniciar cada turno."] },
            46: { "preguntas": [{"q": "¿Cómo se debe usar siempre el calzado de seguridad?", "alt": ["Suelto para mayor comodidad", "Bien abrochado o ajustado", "Solo cuando el supervisor está presente"], "correcta": 1}, {"q": "¿Qué partes del calzado de seguridad se deben revisar antes de usarlo?", "alt": ["La puntera y la suela", "Solo el color y la marca", "Solo el precio de compra"], "correcta": 0}, {"q": "¿Qué se debe hacer si los cordones del calzado están sueltos?", "alt": ["Seguir trabajando igual, no afecta", "Cortarlos para que no molesten", "Amarrarlos para no tropezar"], "correcta": 2}, {"q": "El calzado de seguridad que se usa en la tarea debe ser...", "alt": ["Cualquiera que esté disponible en ese momento", "El más liviano sin importar el riesgo", "Adecuado al riesgo de la tarea que se realiza"], "correcta": 2}, {"q": "¿Cuándo corresponde reponer el calzado de seguridad?", "alt": ["Solo al final del año, sin excepción", "Cuando está gastado o dañado", "Nunca, dura toda la vida laboral"], "correcta": 1}, {"q": "¿Por qué es importante revisar la suela del calzado periódicamente?", "alt": ["Porque no tiene relación con la seguridad", "Porque así se ve más nuevo el zapato", "Porque una suela gastada aumenta el riesgo de resbalones y caídas"], "correcta": 2}, {"q": "¿Qué riesgo se previene principalmente al mantener los cordones bien amarrados?", "alt": ["El riesgo de quemaduras en las manos", "El riesgo de tropiezos y caídas", "El riesgo de ruido excesivo"], "correcta": 1}], "compromiso": ["Usar siempre mi calzado de seguridad bien abrochado durante toda la jornada.", "Revisar la puntera y la suela de mi calzado antes de comenzar la tarea.", "Utilizar el calzado adecuado según el riesgo de la actividad que voy a realizar.", "Solicitar la reposición de mi calzado cuando esté gastado o dañado.", "Mantener siempre los cordones bien amarrados para evitar tropiezos.", "Reportar de inmediato si mi calzado de seguridad no está en condiciones óptimas."] },
            47: { "preguntas": [{"q": "Antes de ponerte los guantes para una tarea, ¿qué debes hacer primero?", "alt": ["Usar cualquier guante que esté más cerca, para no atrasarte", "Pedirle a un compañero que los revise por ti", "Revisar que sean del tipo correcto para esa tarea y que no estén dañados"], "correcta": 2}, {"q": "¿Por qué no se deben usar guantes cerca de partes giratorias de una máquina?", "alt": ["Porque el guante puede quedar atrapado y arrastrar la mano hacia el mecanismo", "Porque incomodan el movimiento de las manos", "Porque se pueden ensuciar más rápido"], "correcta": 0}, {"q": "Si notas que tus guantes de trabajo están rotos, gastados o perforados, ¿qué corresponde hacer?", "alt": ["Seguir usándolos hasta el fin de la jornada", "Solicitar el recambio antes de continuar la tarea", "Darlos vuelta y usar el lado que está menos dañado"], "correcta": 1}, {"q": "¿Por qué cada tarea requiere un tipo específico de guante?", "alt": ["Porque los guantes genéricos son más caros que los específicos", "Porque así lo pide la moda de seguridad de la empresa", "Porque cada guante protege de un riesgo distinto (corte, calor, químico, etc.)"], "correcta": 2}, {"q": "¿Cuál es la forma correcta de quitarse guantes que estuvieron en contacto con productos químicos?", "alt": ["Sacarlos evitando tocar la parte exterior contaminada con las manos desnudas", "Sacudirlos fuerte para limpiarlos y volver a usarlos", "Tirarlos rápido con las manos y lavarse después si alcanza el tiempo"], "correcta": 0}, {"q": "Un trabajador usa guantes de tela común para manipular un producto químico corrosivo. ¿Qué riesgo principal corre?", "alt": ["Ninguno, todos los guantes protegen igual de los químicos", "Que el guante se vea sucio más rápido", "Que el guante no proteja la piel y el químico la dañe igual"], "correcta": 2}, {"q": "¿Cuándo se debe solicitar el recambio de un guante de trabajo?", "alt": ["Solo al terminar el año, según el calendario de entrega", "Nunca, los guantes se             48: { "preguntas": [{"q": "¿Qué efecto tiene la fatiga sobre un trabajador en terreno?", "alt": ["Reduce la atención y el tiempo de reacción", "Mejora la concentración en tareas repetitivas", "No afecta el desempeño si la tarea es simple"], "correcta": 0}, {"q": "Llegar descansado a la faena es responsabilidad de...", "alt": ["Solo del supervisor directo", "Uno mismo", "Solo del área de Prevención de Riesgos"], "correcta": 1}, {"q": "¿Cuál de estas es una señal de fatiga que debemos reconocer en nosotros mismos o en un compañero?", "alt": ["Hablar más rápido de lo normal", "Bostezos frecuentes, lentitud o distracción", "Usar el equipo de protección personal correctamente"], "correcta": 1}, {"q": "Si me siento muy cansado antes de una tarea de riesgo, ¿qué debo hacer?", "alt": ["Tomar café y comenzar igual la tarea", "Avisar a mi supervisor antes de realizarla", "Pedirle a un compañero que la haga sin informar"], "correcta": 1}, {"q": "¿Por qué un compañero agotado también representa un riesgo para el equipo?", "alt": ["Porque solo afecta su propio rendimiento, no al resto", "Porque trabaja más rápido de lo normal", "Porque puede cometer errores que afecten a otros"], "correcta": 2}, {"q": "Si notas que un compañero muestra señales claras de fatiga, ¿cuál es la actitud correcta?", "alt": ["Ignorarlo, no es tu problema", "No decir nada para no incomodarlo", "Conversarlo con él y avisar si es necesario"], "correcta": 2}, {"q": "El autocuidado frente a la fatiga implica principalmente...", "alt": ["Trabajar más horas para demostrar compromiso", "Cuidar el descanso y reconocer los propios límites", "Evitar hablar del cansancio con el equipo"], "correcta": 1}], "compromiso": ["Llegar a mi jornada de trabajo descansado, cuidando mis horas de sueño.", "Reconocer las señales de fatiga en mí mismo y no ignorarlas.", "Avisar de inmediato a mi supervisor si estoy demasiado cansado para una tarea de riesgo.", "Estar atento al estado de mis compañeros y conversar si noto signos de agotamiento.", "No exigirme más allá de mis capacidades cuando estoy fatigado.", "Fomentar un ambiente de confianza donde avisar el cansancio no sea mal visto."] },
            49: { "preguntas": [{"q": "¿Cómo afectan el alcohol y las drogas al trabajar?", "alt": ["Afectan el juicio y los reflejos", "No afectan si es poca cantidad", "Solo afectan la digestión"], "correcta": 0}, {"q": "¿Se puede trabajar bajo la influencia de alcohol o drogas?", "alt": ["No, está prohibido", "Sí, si el trabajo es liviano", "Sí, si nadie se da cuenta"], "correcta": 0}, {"q": "¿Por qué hay que tener cuidado con algunos medicamentos?", "alt": ["Porque pueden dar sueño y bajar el estado de alerta", "Porque siempre son más caros", "Porque cambian el color de la piel"], "correcta": 0}, {"q": "Un compañero de trabajo llega con signos de haber consumido alcohol. ¿Qué corresponde hacer?", "alt": ["Encubrirlo para que no lo despidan", "Informar de inmediato, porque informar es cuidar", "Dejarlo trabajar igual para no atrasar la faena"], "correcta": 1}, {"q": "¿El consumo de alcohol o drogas de la noche anterior puede afectar el turno de hoy?", "alt": ["No, el efecto desaparece al dormir una noche", "Sí, el efecto puede seguir presente al día siguiente", "Solo afecta si se consumió la misma mañana"], "correcta": 1}, {"q": "¿Qué riesgo genera trabajar con los reflejos disminuidos por alcohol o drogas?", "alt": ["Ninguno, si se trabaja con cuidado", "Mejora la concentración", "Mayor probabilidad de accidentes"], "correcta": 2}, {"q": "Si un trabajador debe tomar un medicamento que da sueño antes de su turno, ¿qué debe hacer?", "alt": ["Informar la situación antes de iniciar la tarea", "Tomarlo y no decir nada", "Guardarlo para tomarlo después del turno sin avisar"], "correcta": 0}], "compromiso": ["Me comprometo a no trabajar bajo la influencia de alcohol o drogas.", "Me comprometo a informar a mi supervisor si tomo medicamentos que puedan darme sueño o bajar mi estado de alerta.", "Me comprometo a no encubrir a un compañero que se presente a trabajar bajo la influencia de alcohol o drogas, e informar de inmediato.", "Me comprometo a considerar que el consumo de la noche anterior puede seguir afectándome y actuar con responsabilidad antes de iniciar mi turno.", "Me comprometo a cuidar mi juicio y mis reflejos para proteger mi seguridad y la de mis compañeros."] },
            50: { "preguntas": [{"q": "Antes de mover un vehículo dentro de la planta, ¿qué debes hacer primero?", "alt": ["Inspeccionar el vehículo", "Tocar la bocina y avanzar de inmediato", "Acelerar para ganar tiempo"], "correcta": 0}, {"q": "¿Qué corresponde hacer respecto a la velocidad y la señalización dentro de la planta?", "alt": ["Acelerar si no hay nadie cerca", "Respetar siempre la velocidad y la señalización establecida", "Ignorar las señales si se conoce bien el camino"], "correcta": 1}, {"q": "Al conducir dentro de la planta, ¿qué debes hacer con el cinturón de seguridad y el teléfono?", "alt": ["Usar el teléfono solo en tramos rectos", "El cinturón es opcional en trayectos cortos", "Usar cinturón siempre y no usar el teléfono al conducir"], "correcta": 2}, {"q": "Al retroceder un vehículo, ¿cuál es la conducta correcta?", "alt": ["Retroceder rápido para no bloquear el tránsito", "Hacerlo con extremo cuidado y ceder el paso al peatón", "Retroceder sin mirar si se conoce el sector"], "correcta": 1}, {"q": "¿Qué se debe hacer si un conductor siente fatiga antes o durante la conducción?", "alt": ["Conducir más lento pero continuar el trayecto", "Tomar una bebida energética y seguir conduciendo", "No conducir con fatiga, informar y detenerse a descansar"], "correcta": 2}, {"q": "¿Por qué es importante respetar las vías señalizadas dentro de la planta?", "alt": ["Para prevenir accidentes entre vehículos y peatones", "Para evitar el ruido de otros vehículos", "Porque así se llega más rápido al destino"], "correcta": 0}, {"q": "Frente a un peatón cerca del vehículo, ¿qué debe hacer el conductor?", "alt": ["Avanzar despacio sin detenerse", "Tocar la bocina para que se apure", "Cederle el paso y esperar a que esté seguro"], "correcta": 2}], "compromiso": ["Respetar siempre la velocidad máxima, la señalización y las vías establecidas dentro de la planta.", "Inspeccionar mi vehículo antes de moverlo, revisando que esté en condiciones seguras.", "Usar cinturón de seguridad en todo momento y no usar el teléfono mientras conduzco.", "Retroceder con extremo cuidado, verificando el entorno y cediendo el paso al peatón.", "No conducir si estoy fatigado y reportar esta condición antes de tomar un vehículo.", "Mantener siempre la atención en la conducción, priorizando la seguridad de las personas dentro de la planta."] },
            51: { "preguntas": [{"q": "Antes de caminar por un pasillo o zona de trabajo, ¿qué debes hacer para evitar golpes con estructuras bajas?", "alt": ["Caminar rápido para pasar antes de que algo caiga", "Estar atento al entorno y revisar la altura de tuberías, vigas o estructuras", "Mirar el celular para avisar si viene alguien"], "correcta": 1}, {"q": "Si ves una carga suspendida siendo trasladada por una grúa, ¿qué debes hacer?", "alt": ["Pasar rápido por debajo para no atrasar la maniobra", "Acercarte para ayudar a guiar la carga con las manos", "No transitar bajo la carga y esperar a que termine la maniobra"], "correcta": 2}, {"q": "¿Por qué no se debe transitar bajo trabajos en altura que se están realizando?", "alt": ["Porque está prohibido por estética del área", "Porque ensucia el piso de la zona", "Porque puede caer una herramienta, material o pieza y golpear a alguien"], "correcta": 2}, {"q": "Un material queda apilado cerca de un pasillo de circulación. ¿Qué corresponde hacer?", "alt": ["Dejarlo así porque después alguien lo va a mover", "Asegurarlo o afianzarlo correctamente para que no caiga sobre alguien", "Ponerle un letrero y seguir trabajando sin fijarlo"], "correcta": 1}, {"q": "¿Cuándo es obligatorio el uso de casco de seguridad?", "alt": ["En las zonas o áreas donde esté definido como obligatorio", "Solo cuando el supervisor está mirando", "Únicamente si llueve dentro de la planta"], "correcta": 0}, {"q": "Al intervenir un equipo con piezas bajo tensión o resorte (que pueden saltar al liberarse), ¿qué debes hacer?", "alt": ["Sacar la pieza de golpe para terminar rápido", "No importa, esas piezas nunca sueltan fuerza real", "Tener especial cuidado, conocer el mecanismo y liberar la tensión de forma controlada"], "correcta": 2}, {"q": "¿Cuál de las siguientes es una causa típica de \"golpe por o contra objetos\" en la planta?", "alt": ["Reportar oportunamente los riesgos detectados", "Usar siempre casco en zonas obligatorias", "Materiales u objetos mal asegurados que caen o piezas que saltan por tensión liberada"], "correcta": 2}], "compromiso": ["Mantenerme atento al entorno y a las estructuras bajas al circular por la planta.", "No transitar bajo cargas suspendidas ni bajo trabajos en altura.", "Asegurar y afianzar correctamente los materiales para que no caigan sobre otras personas.", "Usar siempre el casco de seguridad en las zonas donde es obligatorio.", "Tener especial cuidado con piezas bajo tensión o resorte que puedan saltar al intervenir un equipo.", "Reportar de inmediato cualquier condición insegura relacionada con caída de objetos o golpes."] },
            52: { "preguntas": [{"q": "¿Qué se debe hacer de inmediato si hay un derrame de líquido en el piso?", "alt": ["Secarlo o señalizarlo de inmediato", "Dejarlo así porque se seca solo", "Avisar solo al final del turno"], "correcta": 0}, {"q": "¿Qué tipo de calzado ayuda a prevenir caídas al mismo nivel?", "alt": ["Calzado liso y desgastado", "No importa el tipo de calzado", "Calzado con buen agarre"], "correcta": 2}, {"q": "¿Cómo se debe caminar por las áreas de trabajo para evitar tropiezos?", "alt": ["Mirando el celular mientras se camina", "Corriendo para ahorrar tiempo", "Atento, sin correr ni distraerse"], "correcta": 2}, {"q": "Si encuentras una condición insegura en el piso, como un cable suelto, ¿qué corresponde hacer?", "alt": ["Reportarlo", "Ignorarlo si no es tu área", "Esperar a que otro trabajador lo pise primero"], "correcta": 0}, {"q": "¿Por qué es importante mantener las vías de tránsito despejadas?", "alt": ["Porque se ve más ordenado, sin relación con la seguridad", "Solo es una exigencia estética de la empresa mandante", "Para evitar resbalones y tropiezos que pueden lesionar en serio"], "correcta": 2}, {"q": "Un resbalón o tropiezo en el piso de la planta puede provocar...", "alt": ["Lesiones serias", "Ninguna consecuencia real", "Solo una molestia sin importancia"], "correcta": 0}, {"q": "¿Cuál de estas conductas reduce el riesgo de caídas al mismo nivel?", "alt": ["Distraerse con el teléfono al caminar", "Caminar atento y con vías despejadas", "Correr entre las áreas de trabajo"], "correcta": 1}], "compromiso": ["Secar o señalizar de inmediato cualquier derrame que encuentre en el piso.", "Usar siempre calzado con buen agarre y en buen estado.", "Mantener las vías de tránsito despejadas de obstáculos.", "Caminar atento, sin correr ni distraerme con el celular.", "Reportar de inmediato cualquier condición insegura del piso que detecte."] },
            53: { "preguntas": [{"q": "¿Es cierto que la radiación UV puede dañar la piel incluso cuando el cielo está nublado?", "alt": ["No, las nubes bloquean toda la radiación UV", "Sí, el daño UV es acumulativo y ocurre aunque haya nubes", "Solo daña si hay sol directo y cielo despejado"], "correcta": 1}, {"q": "¿Qué elementos de protección personal ayudan a reducir la exposición al sol durante la jornada?", "alt": ["Ropa que cubra el cuerpo, gorro y bloqueador reaplicado", "Solo usar bloqueador una vez en la mañana", "Basta con trabajar con mangas cortas si hace calor"], "correcta": 0}, {"q": "¿Qué característica deben tener los lentes que se usan para protegerse del sol en terreno?", "alt": ["Deben ser oscuros, sin importar el tipo de lente", "Deben tener protección UV", "Cualquier lente de sol sirve igual"], "correcta": 1}, {"q": "¿Qué se recomienda hacer para reducir la exposición directa al sol durante la jornada?", "alt": ["Trabajar siempre bajo el sol sin interrupción", "Exponerse más tiempo al mediodía porque es cuando más se broncea", "Buscar sombra y evitar exponerse al mediodía"], "correcta": 2}, {"q": "¿Con qué frecuencia se debe beber agua durante la jornada de trabajo bajo el sol?", "alt": ["Solo cuando se sienta mucha sed", "Con frecuencia, durante toda la jornada", "Una vez al inicio de la jornada es suficiente"], "correcta": 1}, {"q": "¿Por qué es importante reaplicar el bloqueador solar durante la jornada y no solo aplicarlo una vez?", "alt": ["Porque el bloqueador solo funciona si se aplica al mediodía", "Porque aplicarlo una vez en la mañana protege todo el día sin falta", "Porque el bloqueador pierde efecto con el sudor y el paso del tiempo"], "correcta": 2}, {"q": "¿Qué franja horaria es más recomendable evitar para trabajar expuesto directamente al sol, cuando es posible organizarlo?", "alt": ["No existe una franja horaria más riesgosa que otra", "El amanecer, porque el sol recién sale", "El mediodía, cuando la radiación es más intensa"], "correcta": 2}], "compromiso": ["Usar siempre ropa que cubra mi piel, gorro y bloqueador solar reaplicado durante la jornada", "Usar lentes con protección UV cuando trabaje expuesto al sol", "Buscar sombra y evitar exponerme directamente al sol en el horario de mediodía cuando sea posible", "Hidratarme con frecuencia durante toda la jornada de trabajo", "Recordar que el daño UV se acumula aunque el cielo esté nublado, y protegerme igual"] },
            54: { "preguntas": [{"q": "¿Qué efecto tiene el frío intenso sobre un trabajador en terreno?", "alt": ["Reduce la destreza y la concentración", "Aumenta la fuerza muscular de forma notoria", "Mejora los tiempos de reacción"], "correcta": 0}, {"q": "¿Cuál es la forma correcta de abrigarse para trabajar a la intemperie?", "alt": ["Usar una sola prenda bien gruesa", "Usar ropa mojada porque abriga más", "Vestirse por capas y mantener la ropa seca"], "correcta": 2}, {"q": "¿Qué se recomienda hacer durante las pausas cuando se trabaja con frío?", "alt": ["Quedarse en el lugar más ventoso para refrescarse", "Seguir trabajando sin detenerse para no enfriarse", "Tomar las pausas en lugares abrigados"], "correcta": 2}, {"q": "¿Cuál de las siguientes es una señal temprana de hipotermia que se debe reconocer a tiempo?", "alt": ["Aumento repentino de la temperatura corporal", "Temblores, torpeza y confusión", "Mayor rapidez y precisión en los movimientos"], "correcta": 1}, {"q": "¿Qué se debe hacer al caminar sobre superficies heladas o resbaladizas?", "alt": ["Caminar con precaución, con pasos cortos y firmes", "Correr para cruzar rápido esa zona", "Ignorar el riesgo si se tiene experiencia"], "correcta": 0}, {"q": "¿Por qué es importante mantener la ropa seca al trabajar con frío?", "alt": ["Porque la humedad no afecta la temperatura corporal", "Porque la ropa mojada calienta más rápido", "Porque la ropa mojada acelera la pérdida de calor del cuerpo"], "correcta": 2}, {"q": "Si un compañero muestra confusión, temblores intensos o habla lenta en un ambiente frío, ¿qué se debe hacer?", "alt": ["Reconocer la señal de hipotermia y avisar de inmediato para actuar", "Dejarlo solo hasta que se le pase", "Pedirle que trabaje más rápido para entrar en calor"], "correcta": 0}], "compromiso": ["Vestirme por capas y mantener mi ropa seca durante toda la jornada", "Tomar mis pausas en lugares abrigados cuando trabaje a la intemperie", "Estar atento a señales de hipotermia en mí y en mis compañeros, y reportarlas de inmediato", "Caminar con precaución en superficies heladas o resbaladizas", "Reportar de inmediato cualquier condición de frío extremo que ponga en riesgo mi seguridad"] },
            55: { "preguntas": [{"q": "¿Por qué la carga mental (estrés) también es un tema de seguridad laboral?", "alt": ["Porque distrae y baja la concentración, aumentando el riesgo de accidentes", "Porque solo afecta el humor, sin relación con el trabajo", "Porque únicamente es un problema personal fuera de la planta"], "correcta": 0}, {"q": "¿Cuál de las siguientes es una señal habitual de estrés que debemos aprender a reconocer?", "alt": ["Mejora repentina de la memoria sin motivo", "Aumento de la fuerza física sin explicación", "Cansancio, irritabilidad o dificultad para concentrarse"], "correcta": 2}, {"q": "Si un compañero de trabajo está sobrepasado por el estrés, ¿qué se recomienda hacer?", "alt": ["Comunicarlo y pedir apoyo a tiempo, antes de que afecte más", "Ignorarlo, ya que no es un tema laboral", "Ocultarlo para no parecer débil ante el equipo"], "correcta": 0}, {"q": "Buscar ayuda cuando uno se siente sobrepasado por el estrés es una señal de...", "alt": ["Falta de compromiso con el trabajo", "Debilidad que se debe evitar mostrar", "Autocuidado y responsabilidad con uno mismo"], "correcta": 2}, {"q": "¿Qué actitud ayuda a cuidar el buen ambiente laboral entre compañeros?", "alt": ["Competir sin apoyar a los demás", "Respetar, apoyar y comunicarse con buena disposición", "Guardarse los problemas para no involucrar al equipo"], "correcta": 1}, {"q": "Un trabajador que sigue operando maquinaria pese a sentirse muy estresado y con dificultad para concentrarse, ¿qué riesgo genera?", "alt": ["Solo afecta su rendimiento, nunca la seguridad", "Ningún riesgo, el estrés no afecta el trabajo con máquinas", "Aumenta la probabilidad de cometer un error o accidente"], "correcta": 2}, {"q": "¿Cuál es la actitud correcta frente a las señales de estrés propio o de un compañero?", "alt": ["Esperar a que se pase solo, sin decir nada", "Minimizarlas para no perder tiempo de trabajo", "Reconocerlas y actuar a tiempo, comunicando y pidiendo apoyo"], "correcta": 2}], "c             56: { "preguntas": [{"q": "¿Qué derecho tiene todo trabajador según lo tratado en la charla?", "alt": ["A elegir a su jefe directo", "A trabajar sin acoso ni violencia", "A faltar sin justificar"], "correcta": 1}, {"q": "¿Cuál de las siguientes conductas NO se tolera en el trabajo?", "alt": ["Saludar a los compañeros", "El acoso laboral y sexual", "Pedir ayuda a un compañero"], "correcta": 1}, {"q": "Si una persona sufre o presencia una situación de acoso, ¿qué debe hacer?", "alt": ["Usar los canales confidenciales para denunciar", "Resolverlo por su cuenta con violencia", "Quedarse callada para no tener problemas"], "correcta": 0}, {"q": "¿De quién depende que exista respeto en el ambiente laboral?", "alt": ["Solo del jefe o supervisor", "De cada uno de nosotros", "Solo del área de Recursos Humanos"], "correcta": 1}, {"q": "¿Qué significa que 'el silencio también es complicidad'?", "alt": ["Que no hablar de un abuso ayuda a que siga ocurriendo", "Que es mejor no opinar nunca en el trabajo", "Que callar siempre es lo más seguro"], "correcta": 0}, {"q": "¿Qué característica deben tener los canales para denunciar acoso o violencia?", "alt": ["Deben ser públicos para todos los trabajadores", "Deben ser confidenciales", "Deben requerir la autorización del agresor"], "correcta": 1}, {"q": "¿Cuál de estas actitudes refleja lo enseñado en la charla sobre ambiente laboral?", "alt": ["Ignorar una denuncia de un compañero", "Tratar con respeto a todos, sin excepción", "Burlarse de un compañero si otros lo hacen"], "correcta": 1}], "compromiso": ["Tratar con respeto a todos mis compañeros y compañeras de trabajo, sin excepción.", "No tolerar ni participar en ninguna forma de acoso laboral, sexual o violencia en el trabajo.", "Usar los canales confidenciales de denuncia si soy testigo o víctima de acoso o violencia.", "No quedarme en silencio frente a una situación de acoso, porque el silencio también es complicidad.", "Fomentar un ambiente laboral sano y seguro par             57: { "preguntas": [{"q": "¿Qué es lo primero que debemos revisar antes de usar un producto químico?", "alt": ["El tamaño del envase", "Su color", "Su etiqueta"], "correcta": 2}, {"q": "¿Qué indican los pictogramas SGA en una etiqueta?", "alt": ["El tipo de peligro que representa el producto", "El precio del producto", "La fecha de fabricación"], "correcta": 0}, {"q": "Si encuentras un envase con un químico pero sin etiqueta, ¿qué debes hacer?", "alt": ["No usarlo y reportarlo", "Usarlo igual si parece inofensivo", "Olerlo para identificarlo"], "correcta": 0}, {"q": "¿Está permitido trasvasijar un producto químico a una botella de bebida u otro envase de alimento?", "alt": ["Sí, solo por un día", "Sí, si se lava bien el envase antes", "No, nunca, por el riesgo de intoxicación"], "correcta": 2}, {"q": "¿Cómo se deben mantener los productos químicos según lo enseñado en la charla?", "alt": ["En cualquier recipiente disponible", "En su envase original y cerrado", "Destapados para que se evapore el olor"], "correcta": 1}, {"q": "Un pictograma SGA con una calavera indica principalmente que el producto es...", "alt": ["Inflamable únicamente", "Tóxico o mortal", "Reciclable"], "correcta": 1}, {"q": "¿Por qué es importante la etiqueta de un producto químico para un trabajador?", "alt": ["Porque entrega la primera información sobre el peligro del producto", "Porque indica la marca del fabricante", "Porque es un requisito solo decorativo"], "correcta": 0}], "compromiso": ["Revisar siempre la etiqueta antes de usar cualquier producto químico.", "Nunca usar ni manipular envases de sustancias químicas sin etiqueta.", "No trasvasijar productos químicos a envases de alimentos o bebidas.", "Mantener los productos químicos en su envase original y bien cerrado.", "Reportar de inmediato a mi supervisor cualquier envase sin etiquetar que encuentre.", "Reconocer los pictogramas SGA para identificar el riesgo antes de manipular un producto."] },
            58: { "preguntas": [{"q": "¿Qué información entrega la Hoja de Datos de Seguridad (HDS) de un producto?", "alt": ["Solo el precio y proveedor del producto", "Los peligros, el EPP necesario y los primeros auxilios", "El horario de entrega del pedido"], "correcta": 1}, {"q": "¿Cuándo debes revisar la HDS de un producto nuevo?", "alt": ["Después de usarlo, si algo sale mal", "Solo si el supervisor te lo pide por escrito", "Antes de empezar a usarlo"], "correcta": 2}, {"q": "¿Qué sustancias deben tener HDS disponible?", "alt": ["Solo las sustancias inflamables", "Solo las sustancias importadas", "Toda sustancia peligrosa que se use en la planta"], "correcta": 2}, {"q": "Si necesitas consultar la HDS de un producto en tu área, ¿qué debes saber?", "alt": ["Que solo el gerente puede mostrártela", "Dónde están disponibles en tu área de trabajo", "Que se solicita una vez al año"], "correcta": 1}, {"q": "¿Es un derecho del trabajador conocer la HDS antes de trabajar con un producto?", "alt": ["No, es una decisión exclusiva del supervisor", "Solo si el producto viene en envase grande", "Sí, es un derecho del trabajador"], "correcta": 2}, {"q": "Además de los peligros, ¿qué otra información clave incluye la HDS?", "alt": ["Las primeras auxilios en caso de exposición o accidente", "El nombre del transportista del producto", "La fecha de fabricación de la empresa mandante"], "correcta": 0}, {"q": "Si un compañero va a usar un producto químico nuevo y no sabe qué EPP usar, ¿qué debe hacer?", "alt": ["Consultar la HDS del producto antes de usarlo", "Usar el EPP que tenga más cerca", "Preguntarle a otro compañero de otra área"], "correcta": 0}], "compromiso": ["Consultar la Hoja de Datos de Seguridad antes de usar cualquier producto químico nuevo.", "Usar siempre el EPP indicado en la HDS del producto que manipulo.", "Saber dónde están disponibles las HDS en mi área de trabajo.", "Exigir mi derecho a conocer la HDS antes de trabajar con una sustancia peligrosa.", "Aplicar las medidas de primeros auxilios indicadas en la HDS en caso de exposición o accidente.", "Reportar de inmediato si en mi área falta la HDS de algún producto peligroso."] },
            59: { "preguntas": [{"q": "¿Qué significa una señal de color rojo?", "alt": ["Información", "Obligación", "Prohibición"], "correcta": 2}, {"q": "¿Qué significa el color azul en la señalización?", "alt": ["Advertencia", "Obligación", "Prohibición"], "correcta": 1}, {"q": "El color verde en una señal indica generalmente...", "alt": ["Peligro inminente", "Prohibición de paso", "Información o vía de evacuación/emergencia"], "correcta": 2}, {"q": "Si una señal de seguridad está deteriorada o falta en su lugar, ¿qué debo hacer?", "alt": ["Sacar una foto y guardarla para después", "No decir nada porque no es mi tarea", "Reportarlo de inmediato para que se reponga"], "correcta": 2}, {"q": "¿Está permitido retirar o tapar una señalización porque estorba en el área de trabajo?", "alt": ["No, nunca se debe retirar ni tapar sin autorización", "Sí, pero solo si la vuelvo a poner al terminar", "Sí, si molesta se puede sacar"], "correcta": 0}, {"q": "Un trabajador pasa todos los días por el mismo lugar y ya se acostumbró a una señal de advertencia. ¿Cómo debe actuar?", "alt": ["Puede pasar más rápido porque confía en su experiencia", "Puede ignorarla porque ya la conoce de memoria", "Igual debe respetarla, la costumbre no la anula"], "correcta": 2}, {"q": "¿Qué significa el color amarillo en la señalización de seguridad?", "alt": ["Advertencia o precaución", "Obligación", "Prohibición"], "correcta": 0}], "compromiso": ["Respetar siempre la señalización de seguridad, sin importar cuántas veces pase por el mismo lugar.", "No retirar ni tapar ninguna señal, aunque me parezca que estorba.", "Reportar de inmediato al supervisor cualquier señal faltante, dañada o deteriorada que encuentre.", "Reconocer el significado de cada color (rojo, amarillo, azul, verde) antes de actuar en el área de trabajo.", "Detenerme a leer y obedecer una señal aunque tenga apuro por terminar la tarea."] },
            60: { "preguntas": [{"q": "Cuando comienza a temblar en la planta, ¿qué es lo primero que debo hacer?", "alt": ["Alejarme de estanterías, vidrios u objetos que puedan caer", "Correr de inmediato hacia la salida más cercana", "Sacar fotos del sismo para el reporte"], "correcta": 0}, {"q": "Durante el movimiento sísmico, ¿cómo debo protegerme?", "alt": ["Quedarme de pie mirando hacia el techo", "Sujetarme fuerte de una máquina en funcionamiento", "Cubrirme la cabeza y buscar un lugar seguro, sin correr"], "correcta": 2}, {"q": "¿Por qué no se debe correr durante un sismo?", "alt": ["Porque está prohibido por el reglamento de tránsito", "Porque aumenta el riesgo de caídas y golpes con objetos", "Porque hace más ruido y asusta a los demás"], "correcta": 1}, {"q": "Una vez que el movimiento sísmico termina, ¿qué corresponde hacer?", "alt": ["Evacuar con calma siguiendo las vías señalizadas", "Volver de inmediato a mi puesto de trabajo", "Quedarme donde estoy esperando instrucciones por celular"], "correcta": 0}, {"q": "Después de un sismo, además de las réplicas, ¿a qué debo estar atento?", "alt": ["Solo a mis pertenencias personales", "A derrames y daños en instalaciones o equipos", "A cronometrar cuánto duró el movimiento"], "correcta": 1}, {"q": "Si siento una réplica mientras evacúo, ¿qué debo hacer?", "alt": ["Detenerme a grabar un video para mostrarlo después", "Devolverme corriendo al lugar donde estaba antes", "Mantener la calma y seguir protegiéndome hasta que pase"], "correcta": 2}, {"q": "¿Cuándo puedo regresar a mi área de trabajo después de un sismo?", "alt": ["Cuando yo mismo lo estime conveniente", "Apenas deje de sentirse el movimiento", "Solo cuando se autorice el reingreso"], "correcta": 2}], "compromiso": ["Alejarme siempre de objetos, estanterías o estructuras que puedan caer al sentir un sismo.", "Protegerme la cabeza y mantener la calma, sin correr, durante todo el movimiento sísmico.", "Evacuar de forma ordenada y calmada por las vías señalizadas una vez que pase el sismo.", "Estar atento a posibles réplicas, derrames o daños en la planta después del evento.", "No regresar a mi puesto de trabajo hasta que se autorice el reingreso.", "Reportar de inmediato a mi jefatura cualquier daño o situación de riesgo que observe tras el sismo."] },
            61: { "preguntas": [{"q": "¿Dónde deben ir los residuos peligrosos generados en la planta?", "alt": ["Junto con la basura común, no hay diferencia", "En cualquier tambor vacío que esté disponible cerca", "En un contenedor identificado exclusivo para residuos peligrosos"], "correcta": 2}, {"q": "Si un contenedor de residuos está lleno hasta el tope, ¿qué debo hacer?", "alt": ["Seguir apilando residuos encima aunque se desborde", "Dejar los residuos nuevos en el piso al lado del contenedor", "Avisar para que se cambie o vacíe antes de seguir usándolo"], "correcta": 2}, {"q": "¿Por qué es importante segregar cada residuo en el contenedor que corresponde?", "alt": ["Porque cada tipo de residuo requiere un manejo y destino distinto", "Porque así los contenedores se ven más ordenados y nada más", "Porque es un requisito solo para los residuos de oficina"], "correcta": 0}, {"q": "¿Está permitido dejar residuos acumulados en las vías de tránsito o puestos de trabajo?", "alt": ["Sí, mientras sea por poco tiempo no genera problema", "No, porque genera riesgo de caídas, choques y obstruye el paso", "Sí, siempre que estén apilados de forma ordenada"], "correcta": 1}, {"q": "Ante un derrame de un residuo peligroso, ¿cuál es la acción correcta?", "alt": ["Contener el derrame y avisar de inmediato", "Taparlo con material absorbente y seguir trabajando sin informar", "Esperar a que se seque o evapore solo"], "correcta": 0}, {"q": "Los contenedores de residuos en planta deben estar, sobre todo, ¿cómo?", "alt": ["Escondidos para que no se vean en el área de trabajo", "Todos iguales y sin ninguna identificación, para simplificar", "Identificados según el tipo de residuo que reciben"], "correcta": 2}, {"q": "¿Qué actitud corresponde frente a la segregación de residuos en el día a día?", "alt": ["Dejar que otro compañero decida dónde va cada residuo", "Aplicar siempre la segregación correcta, sea quien sea que observe", "Hacerlo solo cuando el supervisor está mirando"], "cor             62: { "preguntas": [{"q": "Antes de comenzar una tarea, ¿qué es lo primero que debemos hacer según el análisis de trabajo seguro?", "alt": ["Pensar qué puede salir mal antes de partir", "Empezar rápido para no atrasarse", "Avisar al final del turno si algo salió mal"], "correcta": 0}, {"q": "¿Cómo se deben identificar los peligros en una tarea?", "alt": ["Peligro y control por cada paso de la tarea", "Solo al final, cuando ya se terminó el trabajo", "Solo si ocurre un incidente"], "correcta": 0}, {"q": "Antes de iniciar la tarea, ¿qué debemos verificar?", "alt": ["El EPP, las herramientas y los permisos correspondientes", "El clima del día siguiente", "Nada, si ya se hizo esa tarea antes"], "correcta": 0}, {"q": "Si durante la tarea cambian las condiciones (por ejemplo, aparece un riesgo nuevo), ¿qué corresponde hacer?", "alt": ["Detenerse y volver a analizar la tarea", "Avisar solo al final del turno", "Terminar rápido antes que empeore"], "correcta": 0}, {"q": "¿Por qué es recomendable analizar la tarea en equipo antes de partir?", "alt": ["Entre todos se identifican más riesgos", "Porque así se demora menos tiempo", "Porque es obligatorio que lo firme el jefe"], "correcta": 0}, {"q": "¿Cuál es el objetivo principal de hacer un análisis de trabajo seguro antes de la tarea?", "alt": ["Cumplir con un papeleo administrativo", "Anticiparse a los riesgos y controlarlos antes de empezar", "Reemplazar la charla de seguridad"], "correcta": 1}, {"q": "Un compañero nuevo se une a la cuadrilla justo antes de iniciar una tarea. ¿Qué se debería hacer?", "alt": ["Que observe no más, sin participar del análisis", "Empezar la tarea y explicarle los riesgos después", "Incluirlo en el análisis de trabajo seguro antes de partir"], "correcta": 2}], "compromiso": ["Antes de partir cualquier tarea, me detendré a pensar qué puede salir mal.", "Identificaré los peligros y sus controles en cada paso de mi trabajo.", "Verificaré que mi EPP, mis herramientas y los permisos estén             63: { "preguntas": [{"q": "Cuando observamos a un compañero trabajando, ¿cuál es el propósito principal de esa observación de conducta?", "alt": ["Reforzar lo que hace bien y corregir lo que hace mal, no acusarlo", "Buscar errores para reportarlo ante la jefatura", "Compararlo con otros trabajadores del turno"], "correcta": 0}, {"q": "Si vemos a un compañero exponerse a un riesgo, ¿qué debemos hacer?", "alt": ["Ignorarlo porque no es nuestra responsabilidad", "Avisarle de inmediato para que corrija la situación", "Esperar a que un supervisor lo note"], "correcta": 1}, {"q": "¿Quiénes tienen la facultad de detener un trabajo que consideren riesgoso?", "alt": ["Solo el supervisor a cargo", "Solo el asesor de prevención de riesgos", "Todos los trabajadores, sin excepción"], "correcta": 2}, {"q": "Un trabajo debe entregarse con urgencia y para cumplir el plazo habría que saltarse una medida de seguridad. ¿Qué corresponde hacer?", "alt": ["Pedir autorización verbal y continuar igual", "Avanzar rápido y revisar la seguridad después", "Ninguna urgencia justifica asumir un riesgo grave"], "correcta": 2}, {"q": "Un compañero detiene una tarea porque detecta un riesgo grave. ¿Cómo debemos actuar frente a esa decisión?", "alt": ["Respaldarlo, ya que detener a tiempo previene un accidente", "Presionarlo para que retome el trabajo cuanto antes", "Cuestionarlo delante del resto del equipo"], "correcta": 0}, {"q": "¿Cuál de estas actitudes refleja mejor el espíritu de la observación de conducta enseñado en la charla?", "alt": ["Solo observar si el supervisor lo pide expresamente", "Anotar en secreto las fallas para usarlas después", "Corregir con respeto a un compañero que actúa de forma insegura"], "correcta": 2}, {"q": "¿Por qué es importante que cualquier trabajador pueda detener una tarea insegura?", "alt": ["Porque permite evitar accidentes antes de que ocurran", "Porque retrasa la producción y eso conviene a la empresa mandante", "Porque es un trámite obligatorio que exige la normativa"], "correcta": 0}], "compromiso": ["Observar a mis compañeros con el objetivo de reforzar sus buenas prácticas y corregir con respeto las conductas inseguras, sin acusar.", "Avisar de inmediato a cualquier compañero que vea exponerse a un riesgo.", "Detener una tarea, aunque no sea la mía, si identifico un riesgo grave para alguien.", "No aceptar que una tarea urgente se realice asumiendo un riesgo grave.", "Respaldar a todo compañero que decida detener un trabajo por seguridad."] },
            64: { "preguntas": [{"q": "Las reglas por la vida en tareas de alto riesgo (altura, confinados, bloqueo, cargas, conducción) se definen como:", "alt": ["Normas que no se negocian bajo ninguna circunstancia", "Recomendaciones que se pueden ajustar si hay apuro", "Sugerencias que dependen de la experiencia del trabajador"], "correcta": 0}, {"q": "Si una tarea te obliga a incumplir una regla por la vida, ¿qué debes hacer?", "alt": ["Detenerte y no continuar hasta resolver la condición insegura", "Terminar rápido para minimizar el tiempo de exposición", "Continuar con precaución adicional"], "correcta": 0}, {"q": "¿Por qué no se deben saltar las reglas por la vida por costumbre?", "alt": ["Porque en estos riesgos no hay segundas oportunidades", "Porque está prohibido por política de imagen de la empresa", "Porque genera más papeleo administrativo"], "correcta": 0}, {"q": "¿Cuál de las siguientes tareas está incluida entre los riesgos críticos mencionados en la charla?", "alt": ["Uso de computador en oficina", "Llenado de formularios administrativos", "Trabajo en altura o espacios confinados"], "correcta": 2}, {"q": "El apuro en una tarea crítica es motivo válido para:", "alt": ["Detenerse, evaluar y aplicar el control aunque tome más tiempo", "Saltarse una regla por la vida si es solo por esta vez", "Avisar después de terminar la tarea"], "correcta": 0}, {"q": "¿Qué caracteriza a los riesgos que matan mencionados en esta charla?", "alt": ["Que tienen reglas que no se negocian y no dan segundas oportunidades", "Que solo afectan a trabajadores nuevos sin experiencia", "Que se controlan únicamente con capacitación teórica"], "correcta": 0}, {"q": "El bloqueo de energía y el control de cargas suspendidas son ejemplos de:", "alt": ["Actividades opcionales según el clima", "Tareas que solo realiza el supervisor", "Controles críticos asociados a reglas por la vida"], "correcta": 2}], "compromiso": ["Respetar siempre las reglas por la vida en tareas de altura, espacios confinados, bloqueo, cargas y conducción, sin excepciones.", "Detenerme de inmediato si una tarea me obliga a incumplir una regla crítica, y avisar a mi supervisor antes de continuar.", "No saltarme controles críticos por apuro, costumbre o presión de plazos.", "Aplicar siempre el bloqueo y etiquetado antes de intervenir equipos o sistemas de energía.", "Verificar las condiciones de seguridad en cada tarea de alto riesgo, aunque la haya hecho muchas veces antes.", "Recordar que en estos riesgos no hay segundas oportunidades, por lo que actuaré siempre con la máxima precaución."] },
        };

        // ───────────────────────── UTILIDADES ─────────────────────────
        const hoyISO = () => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
        const fechaTxt = (iso) => iso ? iso.split('-').reverse().join('-') : '';
        const mesDe = (iso) => parseInt((iso || '').slice(5, 7), 10);

        const semanaISO = (fechaISO) => {
            const [y, m, d] = fechaISO.split('-').map(Number);
            const date = new Date(Date.UTC(y, m - 1, d));
            const day = date.getUTCDay() || 7;
            date.setUTCDate(date.getUTCDate() + 4 - day);
            const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
            return { anio: date.getUTCFullYear(), semana: Math.ceil(((date - yearStart) / 86400000 + 1) / 7) };
        };
        const semanasDelAnio = (anio) => semanaISO(`${anio}-12-28`).semana;
        const rangoSemana = (anio, semana) => {
            const j4 = new Date(Date.UTC(anio, 0, 4));
            const lunes1 = new Date(j4); lunes1.setUTCDate(j4.getUTCDate() - ((j4.getUTCDay() || 7) - 1));
            const lu = new Date(lunes1); lu.setUTCDate(lunes1.getUTCDate() + (semana - 1) * 7);
            const doo = new Date(lu); doo.setUTCDate(lu.getUTCDate() + 6);
            const f = (d) => `${String(d.getUTCDate()).padStart(2,'0')}-${String(d.getUTCMonth()+1).padStart(2,'0')}`;
            return `${f(lu)} al ${f(doo)}`;
        };
        // Mes "dominante" de una semana ISO (el del jueves) — para el resumen mensual
        const mesDeSemana = (anio, semana) => {
            const j4 = new Date(Date.UTC(anio, 0, 4));
            const lunes1 = new Date(j4); lunes1.setUTCDate(j4.getUTCDate() - ((j4.getUTCDay() || 7) - 1));
            const jue = new Date(lunes1); jue.setUTCDate(lunes1.getUTCDate() + (semana - 1) * 7 + 3);
            return jue.getUTCMonth() + 1;
        };
        const descargar = (blob, filename) => { const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = filename; document.body.appendChild(a); a.click(); a.remove(); setTimeout(() => URL.revokeObjectURL(a.href), 1500); };
        const fileToDataURL = (file, cb) => { const r = new FileReader(); r.onloadend = () => cb(r.result); r.readAsDataURL(file); };
        const imgFormat = (dataUrl) => { const m = /^data:image\/(\w+);/.exec(dataUrl || ''); const f = m ? m[1].toUpperCase() : 'PNG'; return f === 'JPG' ? 'JPEG' : f; };

        // ───────────────────────── ESTADO PERSISTENTE ─────────────────────────
        const defaultStore = () => ({
            supervisores: SUPERVISORES_INICIALES,
            charlas: TEMAS.map((t, i) => ({ id: i + 1, numero: t.n, titulo: t.titulo, desarrollo: t.desarrollo, puntos: t.puntos, duracion: '5 minutos', estado: 'activa', preguntas: (EVALUACIONES[t.n] || {}).preguntas || [], compromiso: (EVALUACIONES[t.n] || {}).compromiso || [], ampliado: (EVALUACIONES[t.n] || {}).ampliado || '' })),
            // programa[anio] = [{ semana, supervisorId, charlaId, charlaOriginalId, motivo,
            //                     estado: programada|entregada|cumplida|no_cumplida, folio, fechaEntrega, fechaCharla }]
            programa: {},
            folioSeq: 1,
            logo: null,
            codigo: 'REG-RRHH-002',
            version: '01',
            metaMensual: 4,
        });

        // ───────────────────────── ICONOS ─────────────────────────
        const I = ({ children, size = 20, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );
        const Printer = (p) => <I {...p}><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></I>;
        const Eye = (p) => <I {...p}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></I>;
        const Download = (p) => <I {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></I>;
        const Upload = (p) => <I {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></I>;
        const Check = (p) => <I {...p}><polyline points="20 6 9 17 4 12"/></I>;
        const X = (p) => <I {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></I>;
        const Undo = (p) => <I {...p}><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></I>;
        const Save = (p) => <I {...p}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></I>;
        const Database = (p) => <I {...p}><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></I>;
        const Alerta = (p) => <I {...p}><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></I>;
        const Chevron = ({ dir = 'r', ...p }) => <I {...p}>{dir === 'l' ? <polyline points="15 18 9 12 15 6"/> : <polyline points="9 18 15 12 9 6"/>}</I>;
        const Nube = (p) => <I {...p}><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></I>;
        const NUBE_INFO = {
            cargando:  { color: '#d97706', txt: 'Conectando…' },
            ok:        { color: '#16a34a', txt: 'Nube' },
            guardando: { color: '#d97706', txt: 'Guardando…' },
            local:     { color: '#64748b', txt: 'Solo local' },
            'sin-clave': { color: '#dc2626', txt: 'Falta clave' },
            error:     { color: '#dc2626', txt: 'Sin conexión' },
        };
        const ModalClave = ({ onCerrar, onGuardar, claveActual }) => {
            const [c, setC] = useState(claveActual || '');
            return (
                <div className="fixed inset-0 z-50 bg-black/40 flex items-center justify-center p-4" onClick={onCerrar}>
                    <div className="bg-white rounded-2xl shadow-xl p-6 w-full max-w-sm space-y-3" onClick={e => e.stopPropagation()}>
                        <h3 className="font-black uppercase text-slate-700 text-sm">Clave de la nube</h3>
                        <p className="text-sm text-slate-500">Escribe la clave que configuraste en Cloudflare (variable <b>APP_CLAVE</b>) para sincronizar tus datos entre equipos. Si no configuraste ninguna, deja el campo vacío.</p>
                        <input type="password" className={inputCls} value={c} onChange={e => setC(e.target.value)} placeholder="Clave de acceso" autoFocus onKeyDown={e => { if (e.key === 'Enter') onGuardar(c); }} />
                        <div className="flex gap-2">
                            <BotonTeal onClick={() => onGuardar(c)} className="flex-1">Conectar</BotonTeal>
                            <button onClick={onCerrar} className="px-4 rounded-xl border border-slate-300 text-sm font-bold text-slate-500">Cancelar</button>
                        </div>
                    </div>
                </div>
            );
        };

        const LogoRioLoa = ({ height = 30 }) => (
            <svg height={height} viewBox="0 0 230 60" xmlns="http://www.w3.org/2000/svg" style={{display:'block'}}>
                <text x="0" y="47" fontFamily="Arial, Helvetica, sans-serif" fontWeight="900" fontSize="54" letterSpacing="-3">
                    <tspan fill={TEAL}>RIO</tspan><tspan fill={BLUE}>LOA</tspan>
                </text>
            </svg>
        );

        const inputCls = "w-full p-3 border border-slate-300 rounded-lg bg-slate-50 focus:bg-white focus:ring-2 focus:ring-sky-200 focus:border-sky-400 outline-none text-base transition";
        const Label = ({ children }) => <label className="block text-xs font-bold text-slate-600 uppercase tracking-wide mb-1">{children}</label>;
        const Section = ({ title, right, children }) => (
            <section className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                <div className="flex items-center justify-between px-5 py-3 border-b border-slate-100 flex-wrap gap-2">
                    <h2 className="font-black uppercase tracking-tight text-slate-700">{title}</h2>
                    {right}
                </div>
                <div className="p-5">{children}</div>
            </section>
        );
        const BotonTeal = ({ onClick, disabled, children, className = "" }) => (
            <button onClick={onClick} disabled={disabled} className={`flex items-center justify-center gap-2 py-3 px-5 rounded-xl text-sm font-black uppercase tracking-wide text-white shadow transition ${className}`} style={{ background: disabled ? '#94a3b8' : TEAL }}>{children}</button>
        );

        // Estados de una semana del programa
        const ESTADOS = {
            programada:  { txt: 'Por imprimir', color: '#94a3b8', bg: '#f8fafc', border: '#e2e8f0' },
            entregada:   { txt: 'Entregada',    color: '#d97706', bg: '#fffbeb', border: '#fde68a' },
            cumplida:    { txt: 'Cumplida',     color: '#16a34a', bg: '#f0fdf4', border: '#bbf7d0' },
            no_cumplida: { txt: 'No cumplida',  color: '#dc2626', bg: '#fef2f2', border: '#fecaca' },
        };

        // ───────────────────────── PDF — formato oficial REG-RRHH-002 (Registro de Actividad) ─────────────────────────
        // Cada charla ocupa 2 hojas: registro (firmas) + apoyo (desarrollo del relator).
        // buildDoc admite una o varias charlas en un mismo PDF (imprimir el mes completo).
        const buildDoc = (items, config) => {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            const PW = 210, PH = 297, ML = 20, MR = 20;
            const CW = PW - ML - MR;
            const GRIS_TABLA = [191, 191, 191];   // #bfbfbf como el Word original
            const pageFolio = {};

            const drawLogo = () => {
                if (config.logo) {
                    try {
                        const pr = pdf.getImageProperties(config.logo);
                        const lh = 15, lw = Math.min(lh * (pr.width / pr.height), 55);
                        pdf.addImage(config.logo, imgFormat(config.logo), ML, 5, lw, lh);
                        return;
                    } catch (e) { /* si falla la imagen, cae al logo de texto */ }
                }
                pdf.setFont('helvetica', 'bold'); pdf.setFontSize(17);
                pdf.setTextColor(42, 92, 110); pdf.text('RIO', ML, 16);
                pdf.setTextColor(74, 144, 184); pdf.text('LOA', ML + pdf.getTextWidth('RIO') + 1, 16);
                pdf.setFont('helvetica', 'normal'); pdf.setFontSize(5.5); pdf.setTextColor(90, 90, 90);
                pdf.text('Maquinaria y Construcción', ML, 19.5);
            };
            const drawEncabezado = (item) => {
                drawLogo();
                pdf.setFont('helvetica', 'bold'); pdf.setFontSize(12); pdf.setTextColor(0, 0, 0);
                const t1 = 'REGISTRO DE ACTIVIDAD';
                pdf.text(t1, PW / 2, 14, { align: 'center' });
                let w = pdf.getTextWidth(t1);
                pdf.setDrawColor(0, 0, 0); pdf.setLineWidth(0.4);
                pdf.line(PW / 2 - w / 2, 15.3, PW / 2 + w / 2, 15.3);
                pdf.setFontSize(11);
                const t2 = `(${config.codigo || 'REG-RRHH-002'})`;
                pdf.text(t2, PW / 2, 20, { align: 'center' });
                w = pdf.getTextWidth(t2);
                pdf.line(PW / 2 - w / 2, 21.2, PW / 2 + w / 2, 21.2);
                pdf.setFont('helvetica', 'normal'); pdf.setFontSize(6.5); pdf.setTextColor(120, 120, 120);
                pdf.text(`Folio ${item.folio}`, PW - MR, 11.5, { align: 'right' });
                pdf.text(`Semana ${item.semana} · ${rangoSemana(item.anio, item.semana)} · ${item.anio}`, PW - MR, 15, { align: 'right' });
                pdf.setTextColor(0, 0, 0);
            };

            const linea = (x1, x2, yy) => { pdf.setDrawColor(0, 0, 0); pdf.setLineWidth(0.2); pdf.line(x1, yy + 0.8, x2, yy + 0.8); };
            const casilla = (x, yy, marcada = false, w = 4.2, h = 4.2) => {
                pdf.setDrawColor(0, 0, 0); pdf.setLineWidth(0.3);
                pdf.rect(x, yy - h + 0.8, w, h);
                if (marcada) { pdf.setFont('helvetica', 'bold'); pdf.setFontSize(9); pdf.text('X', x + w / 2, yy - 0.2, { align: 'center' }); pdf.setFont('helvetica', 'normal'); }
            };
            const campo = (label, valor, xIni, xFin, yy) => {
                pdf.setFont('helvetica', 'normal'); pdf.setFontSize(9); pdf.setTextColor(0, 0, 0);
                pdf.text(label, xIni, yy);
                const lx = xIni + pdf.getTextWidth(label) + 1.5;
                linea(lx, xFin, yy);
                if (valor) {
                    pdf.setFont('helvetica', 'bold');
                    let fs = 9;
                    while (fs > 6.5 && pdf.getTextWidth(String(valor)) > (xFin - lx - 3)) { fs -= 0.5; pdf.setFontSize(fs); }
                    pdf.text(String(valor), lx + 2, yy);
                    pdf.setFont('helvetica', 'normal'); pdf.setFontSize(9);
                }
                return lx;
            };

            // ── PÁGINA DE REGISTRO (firmas) ──
            const dibujarRegistro = (item) => {
                const supervisor = item.supervisor, charla = item.charla;
                drawEncabezado(item);
                let y = 33;
                pdf.setFont('helvetica', 'normal'); pdf.setFontSize(9); pdf.setTextColor(0, 0, 0);
                let x = ML;
                [['Capacitación', false], ['Difusión', false], ['Reunión', false], ['Otro', true]].forEach(([lbl, marcada]) => {
                    casilla(x, y, marcada);
                    pdf.setFontSize(9); pdf.text(lbl, x + 5.5, y);
                    x += 5.5 + pdf.getTextWidth(lbl) + 11;
                });
                linea(x - 5, PW - MR, y);
                pdf.setFont('helvetica', 'bold'); pdf.text('Charla de seguridad', x - 2, y);
                pdf.setFont('helvetica', 'normal');
                y += 8.5;

                campo('Nombre de la actividad:', `Charla N°${charla.numero || '—'} — ${charla.titulo}`, ML, PW - MR, y);
                y += 7;
                campo('Fecha', '', ML, ML + 78, y);
                campo('Lugar:', 'CT Padre Hurtado', ML + 82, PW - MR, y);
                y += 7;
                campo('Duración:', charla.duracion || '5 minutos', ML, PW - MR, y);
                y += 7;
                campo('Area o Gerencia Relacionada:', '', ML, PW - MR, y);
                y += 7;

                pdf.setFont('helvetica', 'normal'); pdf.setFontSize(9); pdf.setTextColor(0, 0, 0);
                pdf.text('Temas Tratados:', ML, y);
