            { n: 64, titulo: 'Reglas por la vida y controles críticos',
              desarrollo: 'No todos los riesgos son iguales: algunos pueden causar la muerte o lesiones que cambian la vida para siempre, y frente a ellos existen reglas que no se negocian, a veces llamadas reglas por la vida. Tienen que ver con los peligros de mayor consecuencia: trabajos en altura sin protección, ingreso a espacios confinados sin permiso, intervenir equipos sin bloqueo de energía, ubicarse bajo cargas suspendidas, conducir sin cinturón o bajo efectos de alcohol o drogas, entre otros. Estas reglas resumen los controles críticos, esas barreras que si fallan, el resultado puede ser fatal. Conócelas, respétalas siempre y sin excepción, y no las saltes por apuro, confianza o costumbre, porque en estos riesgos no hay segundas oportunidades. Si una tarea te obliga a incumplir una regla por la vida, detente: hay algo mal en cómo se está planificando. Respetar sin excepción los controles frente a los riesgos que matan es, sencillamente, lo que te asegura volver a casa cada día.',
              puntos: ['Los riesgos que matan tienen reglas que no se negocian', 'Altura, confinados, bloqueo, cargas, conducción', 'No saltarlas por apuro ni costumbre', 'Si una tarea obliga a incumplirlas, detente', 'En estos riesgos no hay segundas oportunidades'] },
        ];

            1: {
                ampliado: 'En toda faena bajo régimen de subcontratación conviven dos empresas con roles distintos pero complementarios. La empresa mandante es la dueña de la faena o instalación: define las reglas generales del recinto, es responsable de coordinar la seguridad de todos quienes trabajan en él y establece un reglamento especial de higiene y seguridad que rige a las empresas contratistas. Río Loa, en cambio, es una empresa contratista: presta servicios especializados dentro de esa planta y mantiene su propia línea de mando, sus procedimientos y su responsabilidad directa sobre sus trabajadores. La Ley 20.123 de subcontratación ordena esta relación: obliga a la mandante a registrar a sus contratistas, a exigir el cumplimiento de la normativa de seguridad y a coordinar las medidas preventivas, y obliga a la contratista a cumplir el reglamento especial de la planta y a proteger a su personal. Para el trabajador de Río Loa esto tiene consecuencias muy concretas: responde a dos niveles de reglas (las de su propia empresa mediante su supervisor y las de la mandante mediante el reglamento especial), debe circular y trabajar solo por las vías, accesos y procedimientos autorizados, debe acatar las indicaciones de seguridad del personal de la mandante y, ante cualquier duda o condición insegura, detenerse y reportar a su supervisor de Río Loa antes de continuar. Saber quién es quién permite identificar a quién dirigirse, qué reglas aplican en cada área y cómo cumplir la tarea sin exponerse ni exponer a otros.',

                    { q: '¿Qué rol cumple Río Loa dentro de la planta?', alt: ['Es la empresa contratista que presta servicios para la mandante.', 'Es la dueña de la planta.', 'Es un organismo administrador del seguro.'], correcta: 0 },
                    { q: '¿Qué ley regula el trabajo en régimen de subcontratación?', alt: ['La Ley 16.744.', 'La Ley 20.123 de subcontratación.', 'La Ley 21.643 (Ley Karin).'], correcta: 1 },

            2: { "preguntas": [{"q": "¿Cómo debe elegirse el EPP que usa un trabajador durante su turno?", "alt": ["Siempre el mismo EPP en toda la planta", "Según la zona y el riesgo del lugar donde se trabaja", "El que esté más a mano en la bodega"], "correcta": 1}, {"q": "En una zona con presencia de polvo, ¿qué EPP es indispensable usar?", "alt": ["Guantes de cuero solamente", "Respirador y antiparras", "Solo casco de seguridad"], "correcta": 1}, {"q": "Al trabajar cerca de la soda, ¿qué tipo de protección se debe usar?", "alt": ["Protección auditiva únicamente", "Protección química adecuada al riesgo", "Ninguna, la soda no requiere EPP especial"], "correcta": 1}, {"q": "¿Qué se debe hacer con el EPP antes de comenzar a trabajar?", "alt": ["Usarlo solo si algún compañero lo recuerda", "Guardarlo hasta que un supervisor lo pida", "Revisar que esté en buen estado y completo"], "correcta": 2}, {"q": "Si un trabajador nota que su respirador está dañado, ¿qué debe hacer?", "alt": ["Usarlo igual hasta el término del turno", "Prestarse uno de otro trabajador sin avisar", "Reportarlo y cambiarlo antes de iniciar la tarea"], "correcta": 2}, {"q": "¿Por qué el EPP es personal e intransferible?", "alt": ["Porque está ajustado y adaptado a cada trabajador", "Porque cada EPP tiene un precio distinto", "Porque solo se puede usar una vez al mes"], "correcta": 0}, {"q": "Un trabajador entra a una zona distinta a la habitual dentro de la planta. ¿Qué debe hacer respecto al EPP?", "alt": ["No es necesario cambiar nada, el EPP es igual en toda la planta", "Verificar y usar el EPP que corresponde a esa nueva zona", "Continuar solo con el EPP que traía puesto"], "correcta": 1}], "compromiso": ["Usar siempre el EPP correcto según la zona en la que me encuentre trabajando.", "Usar respirador y antiparras en toda zona donde exista presencia de polvo.", "Usar la protección química adecuada al manipular o acercarme a la soda.", "Revisar mi EPP antes de iniciar cada tarea y reportar de in             3: { "preguntas": [{"q": "¿Por qué es tan grave inhalar polvo de sílice en el trabajo?", "alt": ["Porque mancha la ropa de trabajo", "Porque solo causa tos leve que se cura sola", "Porque produce silicosis, una enfermedad pulmonar irreversible"], "correcta": 2}, {"q": "Para que el respirador cumpla su función de protegerte del polvo de sílice, este debe estar:", "alt": ["Guardado en la mochila por si acaso", "Colgado del cuello mientras trabajas", "Bien ajustado a la cara, sin fugas"], "correcta": 2}, {"q": "¿Qué se debe hacer con los filtros del respirador?", "alt": ["Usarlos hasta que se rompan visiblemente", "Cambiarlos a tiempo, según corresponda", "No es necesario cambiarlos nunca"], "correcta": 1}, {"q": "Si notas que estás generando mucho polvo innecesario en tu tarea, ¿qué corresponde hacer?", "alt": ["Seguir trabajando igual, es parte del rubro", "Evitar levantar polvo innecesario y controlar la fuente", "Solo taparse la nariz con la mano"], "correcta": 1}, {"q": "¿Por qué la barba puede ser un problema al usar respirador contra sílice?", "alt": ["Porque impide el sello correcto entre la cara y el respirador", "Porque le da mal olor al respirador", "Porque hace que el respirador se vea sucio más rápido"], "correcta": 0}, {"q": "¿Cuál de estas prácticas ayuda a protegerte de la sílice según lo visto en la charla?", "alt": ["Usar el respirador bien ajustado y sin objetos que impidan el sello", "Guardar el respirador en el bolsillo del pantalón", "Usar el respirador solo cuando el supervisor está mirando"], "correcta": 0}, {"q": "La silicosis, la enfermedad que causa la sílice, se caracteriza porque:", "alt": ["Desaparece sola después de unas semanas de descanso", "Es irreversible, es decir, no tiene cura una vez que aparece", "Se cura completamente con antibióticos"], "correcta": 1}], "compromiso": ["Usar siempre el respirador bien ajustado cuando realice tareas con exposición a polvo o sílice.", "Revisar y cambiar los filtros de mi respirador a tiempo, según corresponda.", "Evitar levantar polvo innecesario y controlar la fuente cuando sea posible.", "Mantenerme sin barba u otros objetos que impidan el sello del respirador.", "Reportar de inmediato a mi supervisor si mi respirador está dañado o no sella bien.", "Respetar las medidas de protección respiratoria en toda tarea con riesgo de polvo de sílice."] },
            4: { "preguntas": [{"q": "¿Por qué no se debe comer en las zonas de trabajo de la planta?", "alt": ["Porque está prohibido por horario de colación", "Porque los alimentos se enfrían más rápido", "Porque se puede ingerir polvo o químicos presentes en el ambiente"], "correcta": 2}, {"q": "¿Dónde está permitido comer durante la jornada laboral?", "alt": ["En cualquier pasillo cercano al puesto de trabajo", "Solo en las áreas habilitadas para ello", "En la sala de máquinas si no hay nadie mirando"], "correcta": 1}, {"q": "¿Qué se debe hacer antes de comer, luego de trabajar en zonas de proceso?", "alt": ["Cambiarse de zapatos", "Lavarse las manos", "Ventilar la sala de descanso"], "correcta": 1}, {"q": "Si un trabajador deja alimentos abandonados cerca de una línea de proceso, esto es correcto?", "alt": ["No, no se deben dejar alimentos en zonas de proceso", "Sí, si el turno está por terminar", "Sí, mientras estén tapados con una bolsa"], "correcta": 0}, {"q": "¿Está permitido fumar en las zonas de proceso de la planta?", "alt": ["Sí, siempre que sea al aire libre dentro del sector", "No, fumar en zonas de proceso está prohibido", "Sí, si ningún supervisor está presente"], "correcta": 1}, {"q": "Un trabajador tiene sed mientras opera cerca de polvo en suspensión. ¿Qué debe hacer?", "alt": ["Beber rápido en el mismo puesto para no perder tiempo", "Beber directamente desde una botella destapada en el lugar", "Ir al área habilitada para beber, lejos de la exposición"], "correcta": 2}, {"q": "¿Cuál es el principal riesgo de comer o beber en zonas con químicos o polvo?", "alt": ["Ingerir sustancias dañinas para la salud sin darse cuenta", "Ensuciar el uniforme de trabajo", "Perder tiempo de colación"], "correcta": 0}], "compromiso": ["Comer y beber solo en las áreas habilitadas para ello", "Lavarme siempre las manos antes de comer, especialmente tras trabajar en zonas de proceso", "No dejar alimentos ni bebidas abandonados cerca de las líneas de proceso", "No fumar en zonas de proceso de la planta", "Evitar ingerir polvo o químicos, alejándome del área de exposición para comer o beber"] },
            5: { "preguntas": [{"q": "Al levantar una carga manualmente, ¿qué debo hacer con las rodillas y la espalda?", "alt": ["Doblar solo la espalda y piernas rectas", "Doblar rodillas y mantener la espalda recta", "Doblar rodillas y curvar la espalda al mismo tiempo"], "correcta": 1}, {"q": "¿Cómo debe ir la carga respecto al cuerpo mientras se transporta?", "alt": ["Con los brazos extendidos, lejos del cuerpo", "Pegada al cuerpo", "Sobre un solo hombro, alejada del tronco"], "correcta": 1}, {"q": "Para mover un maxisaco, ¿qué se debe priorizar?", "alt": ["Usar ayuda mecánica en vez de la fuerza de las personas", "Levantarlo entre varios trabajadores sin equipo", "Arrastrarlo por el suelo tirando con los brazos"], "correcta": 0}, {"q": "Si tengo una carga en las manos y necesito cambiar de dirección, ¿qué debo hacer?", "alt": ["Mover los pies para girar, sin torcer el tronco", "Girar solo el tronco manteniendo los pies fijos", "Girar rápido el cuerpo completo desde la cintura"], "correcta": 0}, {"q": "Antes de levantar una carga, ¿qué se debe evaluar y despejar?", "alt": ["Solo el color del objeto a levantar", "El peso de la carga y el recorrido a seguir", "Nada, se levanta directamente para ganar tiempo"], "correcta": 1}, {"q": "¿Cuál es una consecuencia frecuente de girar el tronco con carga en las manos?", "alt": ["Mejora el equilibrio del trabajador", "No genera ningún riesgo si se hace rápido", "Aumenta el riesgo de lesión en la espalda"], "correcta": 2}, {"q": "Si un maxisaco se ve muy pesado o el trayecto tiene obstáculos, ¿qué corresponde hacer?", "alt": ["Usar ayuda mecánica y despejar el camino antes de moverlo", "Intentar moverlo solo, aunque sea difícil", "Cambiar la ruta sobre la marcha sin avisar a nadie"], "correcta": 0}], "compromiso": ["Doblar siempre las rodillas y mantener la espalda recta al levantar cargas.", "Llevar la carga pegada al cuerpo durante todo el traslado.", "Usar ayuda mecánica disponible para mover maxisacos, en vez de forzar             6: { "preguntas": [{"q": "Antes de usar una eslinga, ¿qué debes hacer?", "alt": ["Inspeccionarla y descartarla si está dañada", "Usarla igual si el turno tiene apuro", "Aplicarle grasa para que rinda más"], "correcta": 0}, {"q": "¿Dónde NO debes ubicarte mientras hay una carga suspendida?", "alt": ["A varios metros de distancia, fuera del radio de giro", "Debajo o dentro del área de la carga suspendida", "En la zona señalizada para observadores"], "correcta": 1}, {"q": "Si detectas un gancho con el seguro (pestillo) roto, ¿qué corresponde hacer?", "alt": ["Descartarlo y reportarlo, no utilizarlo", "Sujetarlo con alambre y seguir usándolo", "Usarlo solo para cargas livianas"], "correcta": 0}, {"q": "¿Cómo debe ser la comunicación con el operador del equipo de izaje?", "alt": ["Solo con gestos improvisados, sin coordinación previa", "Clara, con señales o códigos acordados antes de la maniobra", "No es necesaria si el operador tiene experiencia"], "correcta": 1}, {"q": "¿Está permitido guiar la carga suspendida con las manos directamente?", "alt": ["Sí, es la forma más rápida de posicionarla", "Sí, siempre que uses guantes de cuero", "No, salvo que la tarea lo permita expresamente con cuerda guía u otro método autorizado"], "correcta": 2}, {"q": "Una eslinga con cortes, deshilachados o deformaciones debe:", "alt": ["Seguir en uso hasta que se rompa", "Repararse con cinta adhesiva", "Ser descartada de inmediato y reemplazada"], "correcta": 2}, {"q": "¿Qué actitud es correcta durante una maniobra de izaje de carga?", "alt": ["Mantenerse alerta, respetar las señales acordadas y la distancia segura", "Ubicarse bajo la carga para guiarla mejor", "Confiar en que el operador ve todo el entorno sin apoyo"], "correcta": 0}], "compromiso": ["Inspeccionar siempre las eslingas y ganchos antes de cada maniobra de izaje.", "No pararme ni permanecer bajo una carga suspendida.", "Mantener comunicación clara con el operador antes y durante el izaje.", "Descartar y reportar             7: { "preguntas": [{"q": "¿Qué debemos hacer si vemos un derrame de líquido en el piso?", "alt": ["Limpiarlo de inmediato y señalizar el área si es necesario", "Dejarlo para que otro turno lo limpie", "Caminar rápido por el lugar para no resbalar"], "correcta": 0}, {"q": "¿Por qué es peligroso dejar un derrame sin limpiar?", "alt": ["Porque atrae a los supervisores", "Porque ensucia el piso solamente", "Porque provoca resbalones y caídas"], "correcta": 2}, {"q": "¿Cómo deben mantenerse las vías de tránsito y pasillos en la planta?", "alt": ["Despejadas, sin obstáculos que dificulten el paso", "Con cajas apiladas temporalmente", "Ocupadas solo cuando hay poco tiempo"], "correcta": 0}, {"q": "Según el orden y aseo (5S), ¿dónde debe guardarse una herramienta después de usarla?", "alt": ["En cualquier repisa disponible", "En el suelo cerca del puesto de trabajo", "En su lugar asignado"], "correcta": 2}, {"q": "¿Qué debemos hacer con los residuos generados en el trabajo?", "alt": ["Juntarlos todos en una sola bolsa sin distinción", "Segregarlos en el contenedor que corresponde según su tipo", "Dejarlos acumulados hasta fin de semana"], "correcta": 1}, {"q": "¿Cuál es uno de los beneficios directos de mantener el orden y aseo en el área de trabajo?", "alt": ["Aumenta el ruido en la planta", "Disminuye la cantidad de pausas activas", "Reduce el riesgo de accidentes como resbalones y golpes"], "correcta": 2}, {"q": "Si un compañero derrama aceite y no alcanza a limpiarlo, ¿qué debe hacer?", "alt": ["Ignorarlo porque no es su área", "Aislar o señalizar la zona y dar aviso para que se limpie de inmediato", "Cubrirlo con una tapa sin avisar a nadie"], "correcta": 1}], "compromiso": ["Limpiar de inmediato cualquier derrame que provoque en mi área de trabajo", "Mantener despejadas las vías de tránsito y pasillos en todo momento", "Guardar cada herramienta y material en su lugar asignado al terminar mi labor", "Segregar los residuos en el contenedor que corresponde según su tipo", "Reportar de inmediato un derrame que no pueda limpiar solo, señalizando la zona"] },
            8: { "preguntas": [{"q": "Antes de que un camión comience a descargar, ¿qué se debe hacer primero?", "alt": ["Esperar a que el conductor adivine dónde ubicarse", "Empezar a descargar de inmediato para ganar tiempo", "Coordinar con el conductor los pasos de la maniobra"], "correcta": 2}, {"q": "¿Por qué es peligroso ubicarse en los puntos ciegos del conductor durante una descarga?", "alt": ["Porque el conductor no puede verte y podría no darse cuenta de tu presencia", "Porque ahí el ruido del motor es más fuerte", "Porque en esa zona el piso es más resbaladizo"], "correcta": 0}, {"q": "¿Qué es un punto de aplastamiento durante la descarga de un camión?", "alt": ["El área donde se guardan las herramientas del conductor", "El lugar exacto donde se estaciona el camión antes de partir", "Una zona entre partes móviles o entre el vehículo y algo fijo donde una persona puede quedar atrapada"], "correcta": 2}, {"q": "¿Cuál es el propósito principal de usar chaleco reflectante durante la descarga?", "alt": ["Mantener el uniforme más limpio durante la maniobra", "Ser visible para el conductor y otros vehículos en la zona", "Cumplir solo con el reglamento interno de vestimenta"], "correcta": 1}, {"q": "¿Qué condiciones debe cumplir el vehículo antes de iniciar la descarga?", "alt": ["Estar con el motor encendido y las puertas abiertas", "Estar cerca del acceso principal, sin importar el freno", "Estar detenido, con freno de mano puesto y calzado"], "correcta": 2}, {"q": "Si notas que el camión no está bien calzado antes de descargar, ¿qué debes hacer?", "alt": ["Detener la maniobra y avisar para corregir la situación antes de continuar", "Continuar la descarga con cuidado extra", "Ignorarlo si el conductor no dice nada"], "correcta": 0}, {"q": "Durante la maniobra de descarga, ¿cuál es la actitud correcta respecto a la coordinación con el conductor?", "alt": ["Mantener comunicación clara y constante con el conductor en todo momento", "Actuar por cuenta propia sin avisar al conductor para ser más rápido", "Coordinar solo al final de la descarga"], "correcta": 0}], "compromiso": ["Coordinar siempre con el conductor antes de iniciar cualquier maniobra de descarga", "Nunca ubicarme en los puntos ciegos del vehículo ni en zonas de aplastamiento", "Usar siempre mi chaleco reflectante durante la descarga de camiones y materiales", "Verificar que el vehículo esté detenido, frenado y calzado antes de acercarme", "Reportar de inmediato cualquier condición insegura que observe durante la descarga"] },
            9: { "preguntas": [{"q": "Si ves a un compañero acercando las manos a una correa en movimiento para limpiarla, ¿qué debes hacer?", "alt": ["Ayudarlo sujetando la correa para que sea más rápido", "Detenerlo de inmediato y recordarle que hay que detener y bloquear el equipo antes", "Avisarle que tenga cuidado y seguir con tu trabajo"], "correcta": 1}, {"q": "¿Está permitido retirar un resguardo o protección de un equipo de molienda para agilizar una revisión rápida?", "alt": ["No, los resguardos nunca deben retirarse; su función es evitar el atrapamiento", "Sí, si el supervisor no está mirando en ese momento", "Sí, mientras se coloque de vuelta antes de que termine el turno"], "correcta": 0}, {"q": "Antes de destrabar un atasco en una correa transportadora, ¿cuál es el paso obligatorio?", "alt": ["Sacar rápido el material atascado mientras el equipo sigue funcionando", "Detener y bloquear el equipo siguiendo el procedimiento correspondiente", "Pedirle a otro trabajador que sujete la correa mientras tú destrabas"], "correcta": 1}, {"q": "¿Por qué se recomienda usar ropa ajustada y el pelo sujeto cerca de correas y partes móviles?", "alt": ["Para verse más ordenado durante la inspección de la jefatura", "Porque la ropa suelta o el pelo suelto pueden engancharse y causar un atrapamiento", "Porque así rinde más el uniforme de trabajo"], "correcta": 1}, {"q": "Un equipo de molienda está funcionando y notas que le falta una tapa de protección. ¿Qué corresponde hacer?", "alt": ["Reportarlo de inmediato y no intervenir el equipo hasta que se repare la protección", "Operarlo igual, ya que la protección es solo un detalle estético", "Colocar una tabla o lámina improvisada para tapar el hueco y seguir trabajando"], "correcta": 0}, {"q": "¿Cuál de estas acciones representa un riesgo directo de atrapamiento en correas o molienda?", "alt": ["Mantener distancia de las partes móviles mientras el equipo opera", "Intervenir o ajustar el equipo mientras está en movimiento",             10: { "preguntas": [{"q": "¿Qué se debe hacer antes de intervenir un equipo en mantención?", "alt": ["Desenergizar, bloquear y etiquetar el equipo", "Avisar solo por radio y comenzar de inmediato", "Esperar a que otro trabajador lo detenga"], "correcta": 0}, {"q": "¿Quién tiene autorización para retirar un candado de bloqueo?", "alt": ["Solo quien colocó ese bloqueo", "El jefe de mantención", "Cualquier supervisor de turno"], "correcta": 0}, {"q": "Después de bloquear y etiquetar un equipo, ¿qué se debe hacer antes de trabajar en él?", "alt": ["Confiar en que el bloqueo es suficiente sin comprobar", "Retirar de inmediato las protecciones", "Verificar que la energía esté en cero"], "correcta": 2}, {"q": "Si un compañero dejó su candado puesto en un equipo, ¿qué corresponde hacer?", "alt": ["Cortarlo si molesta para avanzar más rápido", "Retirarlo si el trabajo parece terminado", "Nunca retirarlo, solo él puede hacerlo"], "correcta": 2}, {"q": "¿En qué momento se aplica el procedimiento de bloqueo y etiquetado?", "alt": ["Solo en mantenciones programadas con más de un día de anticipación", "Únicamente cuando el equipo es de alto voltaje", "Antes de toda mantención, sin excepción"], "correcta": 2}, {"q": "¿Por qué es importante verificar energía cero antes de intervenir un equipo?", "alt": ["Porque lo exige solo el reglamento interno de la empresa mandante", "Porque así lo pide el supervisor para efectos administrativos", "Para confirmar que no queda energía residual que pueda causar un accidente"], "correcta": 2}, {"q": "¿Qué representa la etiqueta que se coloca junto al candado de bloqueo?", "alt": ["Un adorno para identificar la fecha de mantención", "La identificación de quién bloqueó y que el equipo no debe energizarse", "Un recordatorio opcional que se puede omitir si se tiene apuro"], "correcta": 1}], "compromiso": ["Desenergizar, bloquear y etiquetar todo equipo antes de intervenirlo, sin excepción.", "Verificar siempre que la energía esté en cero antes de comenzar cualquier mantención.", "Nunca retirar el bloqueo o candado de un compañero de trabajo.", "Colocar mi propio bloqueo y etiqueta personal cada vez que intervengo un equipo.", "Aplicar el procedimiento de bloqueo y etiquetado antes de toda mantención, sea grande o pequeña.", "Reportar de inmediato si encuentro un equipo sin bloqueo durante una intervención."] },
            11: { "preguntas": [{"q": "¿Qué tipo de daño puede causar el ruido en la audición si no se usa protección?", "alt": ["Un daño temporal que se recupera solo en unos días", "Un daño permanente que no se puede revertir", "Un daño que solo afecta la voz, no el oído"], "correcta": 1}, {"q": "¿Durante cuánto tiempo se debe usar el protector auditivo en zonas de molienda con ruido?", "alt": ["Solo en la primera hora de la jornada", "Solo cuando el ruido parece muy fuerte", "Toda la exposición al ruido, sin quitárselo"], "correcta": 2}, {"q": "¿Por qué es peligroso quitarse el protector auditivo 'solo un ratito' varias veces al día?", "alt": ["Porque se ensucia más rápido el protector", "Porque el daño al oído es acumulativo, cada exposición suma", "Porque baja el rendimiento del trabajador"], "correcta": 1}, {"q": "¿Cómo se debe usar el protector auditivo durante la jornada de trabajo en molienda?", "alt": ["De forma permanente mientras dure la exposición al ruido", "A ratos, cuando uno se acuerda", "Solo al final del turno, cuando ya hay cansancio"], "correcta": 0}, {"q": "¿Qué pasa si los tapones u orejeras no sellan bien el oído?", "alt": ["No afecta en nada, igual protegen completo", "No cumplen su función y el ruido sigue dañando el oído", "Solo se nota si el ruido es muy débil"], "correcta": 1}, {"q": "¿Qué significa que el daño auditivo por ruido sea 'acumulativo'?", "alt": ["Que cada exposición sin protección se suma y aumenta el daño total", "Que desaparece si se descansa un fin de semana", "Que solo se produce después de un golpe fuerte y único"], "correcta": 0}, {"q": "Al colocarse tapones auditivos, ¿qué se debe verificar antes de empezar a trabajar?", "alt": ["Que estén guardados en el bolsillo por si acaso", "Que sean del color asignado a su turno", "Que sellen bien el conducto auditivo"], "correcta": 2}], "compromiso": ["Usar el protector auditivo durante toda mi exposición al ruido en molienda, sin quitármelo a ratos.", "Verificar que mis tapones o fonos sellen bien antes de comenzar a trabajar.", "Reportar de inmediato si mi protector auditivo está dañado o no sella correctamente.", "Recordar que el daño al oído por ruido es acumulativo y permanente, y actuar en consecuencia.", "Respetar el uso permanente de protección auditiva en las zonas de ruido señalizadas."] },
            12: { "preguntas": [{"q": "¿Qué debes usar al manipular vidrio en Despacho/Bodega para evitar cortes?", "alt": ["Guantes de cuero comunes", "Ningún guante, para tener más sensibilidad", "Guantes anticorte"], "correcta": 2}, {"q": "Si ves vidrio roto en el suelo del área de bodega, ¿qué debes hacer?", "alt": ["Empujarlo con el pie hacia un rincón", "Ignorarlo si no estorba el paso", "Tener cuidado especial y avisar para su retiro seguro"], "correcta": 2}, {"q": "¿Cómo se deben recoger las trizaduras o esquirlas de vidrio?", "alt": ["Con la mano, rápido, para no perder tiempo", "Nunca con la mano; usando herramientas o elementos adecuados", "Con la mano, pero solo si se usa guante delgado"], "correcta": 1}, {"q": "¿Dónde se deben desechar correctamente los restos de vidrio?", "alt": ["En cualquier basurero disponible", "Dejarlos apilados en el suelo para retirarlos después", "En el lugar y contenedor destinado para ese tipo de residuo"], "correcta": 2}, {"q": "Al manipular piezas de vidrio, ¿qué atención especial debes tener con las que presentan fisuras?", "alt": ["Revisarlas con mayor cuidado antes de manipularlas, por su mayor riesgo de quebrarse", "Ninguna, se manipulan igual que las piezas sanas", "Solo evitarlas si son de gran tamaño"], "correcta": 0}, {"q": "¿Cuál es el principal objetivo de usar guantes anticorte en el manejo de vidrio?", "alt": ["Proteger las manos de cortes al contactar bordes y superficies de vidrio", "Cumplir con la vestimenta de la empresa mandante", "Mejorar el agarre de las cajas"], "correcta": 0}, {"q": "¿Qué actitud es la correcta frente al manejo de vidrio y sus restos en el trabajo diario?", "alt": ["Actuar rápido sin detenerse a evaluar el riesgo", "Mantener siempre precaución: usar protección, no tocar trizaduras con la mano y desechar bien los restos", "Solo tener cuidado si el supervisor está presente"], "correcta": 1}], "compromiso": ["Usar siempre guantes anticorte al manipular vidrio en despacho y bodega.", "No recoger trizaduras ni esquirlas de vidrio con la mano, bajo ninguna circunstancia.", "Revisar con especial atención las piezas de vidrio con fisuras antes de manipularlas.", "Desechar los restos y trozos de vidrio en el lugar y contenedor correspondiente.", "Reportar de inmediato la presencia de vidrio roto en el área de trabajo.", "Mantener siempre la precaución al trasladar o apilar piezas de vidrio."] },
            13: { "preguntas": [{"q": "Antes de ingresar a un silo o tolva, ¿qué se debe tramitar obligatoriamente?", "alt": ["Un aviso verbal al final del turno", "Un permiso de trabajo autorizado", "Nada, si el ingreso es rápido"], "correcta": 1}, {"q": "¿Qué se debe hacer antes y durante el ingreso a un espacio confinado como silos o tolvas?", "alt": ["Monitorear la atmósfera del recinto", "Ventilar solo si se siente mal olor", "Confiar en que el aire siempre está bien"], "correcta": 0}, {"q": "¿Quién debe permanecer en el exterior mientras alguien trabaja dentro de un espacio confinado?", "alt": ["Nadie, no es necesario", "Un vigía", "Solo el supervisor, de forma ocasional"], "correcta": 1}, {"q": "Si un trabajador no cuenta con autorización, ¿puede ingresar a un silo, tolva o escotilla?", "alt": ["No, no debe ingresar sin autorización", "Sí, si conoce bien el área", "Sí, solo por unos segundos"], "correcta": 0}, {"q": "Durante el trabajo en un espacio confinado, ¿el vigía puede alejarse un momento de su posición?", "alt": ["Sí, si va a buscar una herramienta", "Sí, si el trabajo ya casi termina", "No, el vigía nunca abandona su posición"], "correcta": 2}, {"q": "¿Cuál de estos lugares se considera un espacio confinado según lo visto en la charla?", "alt": ["Una oficina administrativa", "Un pasillo principal de tránsito", "Un silo o tolva"], "correcta": 2}, {"q": "¿Cuál es una función principal del vigía durante el ingreso a un espacio confinado?", "alt": ["Ayudar a acelerar el trabajo dentro del recinto", "Registrar solo la hora de término de la tarea", "Vigilar desde el exterior y actuar ante una emergencia"], "correcta": 2}], "compromiso": ["Nunca ingresar a un silo, tolva o escotilla sin el permiso de trabajo autorizado", "Exigir y verificar el monitoreo de la atmósfera antes de entrar a un espacio confinado", "Cumplir mi rol de vigía sin abandonar mi posición mientras haya personal trabajando dentro", "No autorizar ni permitir el ingreso de nadie sin la autorización correspondiente", "Detener el trabajo de inmediato si detecto una condición insegura en el espacio confinado"] },
            14: { "preguntas": [{"q": "¿A partir de qué altura es obligatorio usar arnés de seguridad?", "alt": ["Solo si hay viento fuerte", "Solo sobre 5 metros", "Sobre 1,8 metros"], "correcta": 2}, {"q": "¿Dónde se debe enganchar el arnés al trabajar en altura?", "alt": ["En cualquier tubería cercana", "En un punto de anclaje certificado", "En la baranda más próxima, sin revisarla"], "correcta": 1}, {"q": "Antes de subir a una plataforma, ¿qué se debe revisar?", "alt": ["Solo el color de la plataforma", "Que las barandas y la plataforma estén en buen estado", "Nada, si otros ya subieron antes"], "correcta": 1}, {"q": "Si una plataforma o silo no cuenta con protección adecuada, ¿qué corresponde hacer?", "alt": ["Subir con cuidado igual", "No subir y reportar la condición", "Subir rápido para terminar antes"], "correcta": 1}, {"q": "¿Qué se debe hacer con las herramientas al trabajar en altura?", "alt": ["Asegurarlas para que no caigan", "Dejarlas sueltas sobre la plataforma", "Lanzarlas hacia abajo cuando ya no se usan"], "correcta": 0}, {"q": "¿Por qué es importante asegurar las herramientas en altura?", "alt": ["Para que no se rayen", "Para evitar que golpeen a alguien al caer", "Porque así se ven más ordenadas en fotos"], "correcta": 1}, {"q": "¿Qué se entiende por un punto de anclaje certificado?", "alt": ["Un punto verificado y aprobado para soportar una caída", "Cualquier estructura que parezca firme", "Un punto que el trabajador elige a su criterio"], "correcta": 0}], "compromiso": ["Usar siempre el arnés de seguridad al trabajar sobre 1,8 metros de altura.", "Enganchar mi arnés únicamente en puntos de anclaje certificados.", "Revisar el estado de barandas y plataformas antes de subir a ellas.", "No subir a ninguna plataforma o silo si no cuenta con la protección adecuada.", "Asegurar todas mis herramientas para evitar que caigan y pongan en riesgo a otros.", "Reportar de inmediato cualquier condición insegura en plataformas o accesos en altura."] },
            15: { "preguntas": [{"q": "¿Por qué la soda cáustica es peligrosa para la piel y los ojos?", "alt": ["Porque mancha la ropa de trabajo", "Porque es corrosiva y puede causar quemaduras", "Porque tiene un olor muy fuerte"], "correcta": 1}, {"q": "¿Qué se debe usar obligatoriamente al manipular soda cáustica u otras sustancias peligrosas?", "alt": ["El EPP químico correspondiente (guantes, lentes, careta u otros según corresponda)", "Solo guantes de género", "Ninguno, si se tiene experiencia"], "correcta": 0}, {"q": "¿Dónde se encuentra la información sobre los riesgos y manejo seguro de una sustancia química?", "alt": ["En la hoja de datos de seguridad (HDS) del producto", "Preguntando a un compañero cualquiera", "No existe ese tipo de información"], "correcta": 0}, {"q": "Si la soda cáustica tiene contacto con la piel, ¿qué se debe hacer primero?", "alt": ["Esperar a que pase la molestia", "Lavar con agua abundante y avisar de inmediato", "Cubrir la zona con un paño y seguir trabajando"], "correcta": 1}, {"q": "¿Cómo deben mantenerse los envases de sustancias peligrosas?", "alt": ["Identificados y bien cerrados", "Abiertos para ventilar el producto", "Sin etiqueta, para evitar confusiones"], "correcta": 0}, {"q": "Si un envase de sustancia química no tiene etiqueta, ¿qué se debe hacer?", "alt": ["Usarlo igual si el color parece conocido", "No usarlo y reportar la situación de inmediato", "Olerlo para identificar el contenido"], "correcta": 1}, {"q": "¿Qué actitud es la correcta frente al uso de soda cáustica y sustancias peligrosas en el trabajo diario?", "alt": ["Mantener siempre las medidas de seguridad, EPP y buenas prácticas de manejo", "Tomar precauciones solo si el supervisor está mirando", "Confiar en la experiencia y omitir el EPP si se conoce el producto"], "correcta": 0}], "compromiso": ["Usar siempre el EPP químico indicado antes de manipular soda cáustica u otras sustancias peligrosas.", "Revisar la hoja de datos de seguridad (HDS) del producto antes de usarlo.", "Lavar con agua abundante y avisar de inmediato ante cualquier contacto con la piel u ojos.", "Mantener los envases de sustancias peligrosas siempre identificados y bien cerrados.", "Reportar de inmediato cualquier envase sin etiqueta o en mal estado.", "Respetar las medidas de seguridad establecidas para el manejo de sustancias químicas en mi área de trabajo."] },
            16: { "preguntas": [{"q": "¿Por qué es importante hidratarse frecuentemente cuando se trabaja cerca de hornos?", "alt": ["Porque ayuda a reponer los líquidos que el cuerpo pierde por el calor y previene el golpe de calor", "Porque mejora el rendimiento físico para levantar más peso", "Porque evita que la ropa de trabajo se ensucie"], "correcta": 0}, {"q": "¿Dónde se deben realizar las pausas para recuperarse del calor durante la jornada?", "alt": ["En cualquier lugar, no importa la temperatura", "En una zona fresca y ventilada, alejada del calor directo de los hornos", "Solo al final de la jornada, no durante el turno"], "correcta": 1}, {"q": "¿Cuál de las siguientes es una señal de alerta de golpe de calor que debes reconocer?", "alt": ["Piel muy caliente, confusión, mareo o desorientación", "Tener un poco de hambre antes de almorzar", "Sentir frío en las manos al inicio del turno"], "correcta": 0}, {"q": "Si un compañero de trabajo comienza a sentir síntomas de estrés térmico, ¿qué debes hacer?", "alt": ["Avisar de inmediato al supervisor o encargado para que reciba atención", "Esperar a que se le pase solo y seguir trabajando", "Darle solo un vaso de agua y no decir nada a nadie"], "correcta": 0}, {"q": "¿Qué tipo de ropa es más adecuada para trabajar cerca de hornos y protegerse del calor?", "alt": ["Ropa ajustada y de material sintético que no permite transpirar", "Ropa de trabajo apropiada según lo indicado, evitando prendas que agraven la exposición al calor", "No usar ropa de manga larga bajo ninguna circunstancia"], "correcta": 1}, {"q": "¿Qué recomienda la charla respecto al tiempo de exposición prolongada cerca de los hornos?", "alt": ["Se puede estar todo el turno sin problema si se usa casco", "Evitarla, alternando tareas y tomando pausas para no exponerse por periodos largos", "No tiene relación con el riesgo de golpe de calor"], "correcta": 1}, {"q": "¿Cuál de estas acciones ayuda mejor a prevenir el estrés térmico durante la jornada?", "alt": ["Fumar en los descansos para relajarse", "Combinar hidratación frecuente, pausas en zona fresca y uso de ropa adecuada", "Aumentar el ritmo de trabajo para terminar antes y salir del calor"], "correcta": 1}], "compromiso": ["Hidratarme frecuentemente durante toda mi jornada cerca de los hornos, sin esperar a sentir sed.", "Tomar pausas en zona fresca cuando el calor lo requiera, respetando los tiempos de recuperación.", "Estar atento a las señales de golpe de calor en mí y en mis compañeros de trabajo.", "Avisar de inmediato a mi supervisor si presento o detecto síntomas de estrés térmico.", "Usar la ropa de trabajo adecuada y evitar exponerme de forma prolongada al calor directo de los hornos."] },
            17: { "preguntas": [{"q": "Cuando un trabajador necesita cruzar donde circulan grúas horquilla, ¿qué debe hacer primero?", "alt": ["Buscar contacto visual con el operador antes de cruzar", "Cruzar rápido antes de que se acerque el equipo", "Avisar por radio a su supervisor y seguir caminando"], "correcta": 0}, {"q": "¿Por qué es peligroso cruzar por los puntos ciegos de una grúa horquilla?", "alt": ["Porque el piso en esos puntos suele estar resbaladizo", "Porque el operador no puede verte y no sabe que estás ahí", "Porque en esos puntos el equipo hace más ruido de lo normal"], "correcta": 1}, {"q": "¿Quién debe ceder el paso cuando un peatón y una grúa horquilla se encuentran en un mismo espacio?", "alt": ["El operador de la grúa, porque va más lento", "Ninguno, cada uno sigue su camino al mismo tiempo", "El peatón, porque el equipo tiene mayor masa y menor maniobrabilidad"], "correcta": 2}, {"q": "¿Cuál es la forma correcta de desplazarse a pie dentro de zonas donde operan grúas horquilla?", "alt": ["Caminar por donde sea más corto para el trabajador", "Usar siempre las vías peatonales señalizadas", "Caminar pegado a las máquinas para verlas mejor"], "correcta": 1}, {"q": "¿Qué mantiene la separación segura entre peatones y grúas horquilla en la planta?", "alt": ["Que el peatón use casco de mayor visibilidad", "Que la grúa toque bocina antes de cada movimiento", "El respeto de las zonas y distancias definidas para cada uno"], "correcta": 2}, {"q": "Si un operador de grúa horquilla no te ha visto y necesitas pasar cerca, ¿qué corresponde hacer?", "alt": ["Esperar y lograr contacto visual antes de continuar", "Pasar igual, asumiendo que el operador te vio", "Hacer un gesto rápido con la mano y seguir avanzando"], "correcta": 0}, {"q": "¿Qué actitud del peatón ayuda a prevenir un atropello por grúa horquilla?", "alt": ["Mantenerse alerta, respetar las vías y ceder el paso al equipo", "Circular con audífonos para concentrarse en su tarea", "Confiar en que             18: { "preguntas": [{"q": "¿Por dónde debo circular a pie dentro de la planta?", "alt": ["Solo por las vías y zonas delimitadas y señalizadas", "Por cualquier espacio libre que encuentre", "Por donde circulan los camiones si está despejado"], "correcta": 0}, {"q": "Voy a llegar tarde a una reunión. ¿Qué debo hacer al desplazarme?", "alt": ["Tomar un atajo por una zona no habilitada para ganar tiempo", "Correr por la vía señalizada sin mirar alrededor", "Seguir la ruta señalizada aunque tome un poco más de tiempo"], "correcta": 2}, {"q": "¿Qué actitud debo tener frente a las demarcaciones de piso (líneas, franjas, conos)?", "alt": ["Ignorarlas si no hay nadie supervisando", "Respetarlas siempre, indican zonas seguras y de tránsito", "Cruzarlas si el camino señalizado está más largo"], "correcta": 1}, {"q": "¿A qué distancia debo mantenerme de equipos y camiones en movimiento?", "alt": ["Puedo pasar justo al lado si el operador me hace un gesto", "Manteniendo siempre una distancia segura, fuera de su radio de acción", "No importa la distancia si el vehículo va lento"], "correcta": 1}, {"q": "Voy caminando por la planta y recibo una llamada en mi celular. ¿Qué debo hacer?", "alt": ["Contestar y seguir caminando distraído por la vía", "Detenerme en un lugar seguro o esperar para atender la llamada", "Contestar solo si camino más rápido para terminar antes"], "correcta": 1}, {"q": "Un compañero te invita a cruzar por una zona no señalizada para llegar antes al casino. ¿Qué haces?", "alt": ["Lo acompañas porque es un trayecto corto y conocido", "Le explicas que deben usar la vía señalizada y evitar atajos", "Vas tú por el atajo y él por la vía señalizada"], "correcta": 1}, {"q": "¿Por qué es importante no distraerse al desplazarse por la planta?", "alt": ["Porque las distracciones pueden hacer que no perciba riesgos de tránsito y sufra un accidente", "Porque está prohibido pensar en otras cosas mientras se camina", "Solo es importante si se camina cerca de la             19: { "preguntas": [{"q": "¿Cuál es el principal riesgo de usar el teléfono mientras se camina en la planta?", "alt": ["Sufrir caídas o ser atropellado por no ver el entorno", "Gastar la batería del teléfono", "Perder la señal del celular"], "correcta": 0}, {"q": "Si necesitas revisar un mensaje o contestar una llamada, ¿qué debes hacer?", "alt": ["Seguir caminando mientras escribes rápido", "Detenerte en un lugar seguro para usar el teléfono", "Usarlo solo si no hay supervisor cerca"], "correcta": 1}, {"q": "¿Cómo se debe llevar el teléfono mientras se camina por la planta?", "alt": ["En la mano, listo para responder", "Guardado, sin usarlo al caminar", "Sujeto entre el hombro y la oreja"], "correcta": 1}, {"q": "¿Por qué no se recomienda usar audífonos que tapen completamente el oído mientras se transita por áreas de trabajo?", "alt": ["Porque impiden escuchar alarmas u otras señales de peligro", "Porque dañan el equipo de comunicación", "Porque están prohibidos por comodidad"], "correcta": 0}, {"q": "Mientras caminamos por la planta, ¿qué debemos priorizar según lo enseñado en la charla?", "alt": ["Mantener la atención en el entorno y los riesgos cercanos", "Avanzar lo más rápido posible", "Aprovechar el trayecto para revisar redes sociales"], "correcta": 0}, {"q": "Un trabajador va caminando por un pasillo con tránsito de vehículos y recibe una llamada urgente. ¿Cuál es la conducta correcta?", "alt": ["Contestar caminando pero mirando hacia el vehículo de reojo", "Apurar el paso para llegar antes de contestar", "Detenerse en un lugar seguro, fuera del tránsito, antes de contestar"], "correcta": 2}, {"q": "¿Qué tipo de accidentes puede provocar la distracción por el uso del celular al caminar?", "alt": ["Solo problemas de postura", "Solo fatiga visual", "Caídas, tropiezos y atropellos"], "correcta": 2}], "compromiso": ["Mantendré el teléfono guardado mientras camino dentro de la planta.", "Me detendré en un lugar seguro antes de leer o contestar el teléfono.", "Prestaré atención permanente a mi entorno al desplazarme por las áreas de trabajo.", "No usaré audífonos que me impidan escuchar alarmas u otras señales de peligro.", "Reportaré a mi supervisor si veo a un compañero caminando distraído con el celular."] },
            20: { "preguntas": [{"q": "¿Qué es un casi-accidente?", "alt": ["Un aviso gratis que nos permite corregir antes que ocurra un accidente real", "Un evento que no importa porque no dejó lesionados", "Un accidente menor que no necesita reportarse"], "correcta": 0}, {"q": "Si presencias una condición insegura pero nadie salió lesionado, ¿qué debes hacer?", "alt": ["Nada, ya que no hubo lesión no es necesario avisar", "Esperar a ver si se repite antes de reportarlo", "Reportarlo igual, aunque no haya habido lesión"], "correcta": 2}, {"q": "¿Cuál es el mejor momento para corregir un riesgo detectado en el trabajo?", "alt": ["Después de que ocurra el accidente, para confirmar el riesgo", "Antes de que ocurra el accidente", "Solo cuando el supervisor lo note por sí mismo"], "correcta": 1}, {"q": "Un compañero dice 'siempre ha sido así, no pasa nada'. ¿Qué actitud corresponde frente a esto?", "alt": ["Aceptarlo, porque si nunca ha pasado nada es que no es riesgo", "No normalizar el riesgo y reportar la condición subestándar", "Ignorar el comentario y seguir trabajando igual que siempre"], "correcta": 1}, {"q": "¿Por qué es importante reportar un casi-accidente lo antes posible?", "alt": ["Porque mientras antes se reporta, antes se controla el riesgo", "Porque genera más papeleo para el supervisor", "Porque es un requisito solo para fin de mes"], "correcta": 0}, {"q": "Una condición subestándar es...", "alt": ["Un tema que solo debe revisar la empresa mandante", "Un accidente que ya generó una lesión grave", "Una situación del ambiente o equipo que representa un peligro y debe corregirse"], "correcta": 2}, {"q": "¿Quién puede reportar un casi-accidente o una condición subestándar?", "alt": ["Solo el asesor en prevención de riesgos", "Cualquier trabajador que lo detecte", "Solo el supervisor a cargo del área"], "correcta": 1}], "compromiso": ["Reportar de inmediato todo casi-accidente que presencie, aunque no haya lesión.", "Informar las condiciones subestándar que detecte en mi área de trabajo.", "No normalizar situaciones de riesgo por costumbre o rutina.", "Corregir o avisar para corregir el riesgo antes de que ocurra un accidente.", "Actuar apenas detecto un peligro, sin esperar a que otro lo reporte."] },
            21: { "preguntas": [{"q": "¿Dónde NO debes ubicarte al vaciar un maxisaco en la tolva?", "alt": ["Bajo el maxisaco suspendido", "A un costado, fuera de la zona de caída", "En la posición donde indique el procedimiento"], "correcta": 0}, {"q": "Antes de vaciar el maxisaco, ¿qué debes verificar que esté puesta en la tolva?", "alt": ["La reja o parrilla de la tolva", "El candado del panel eléctrico", "El extintor más cercano"], "correcta": 0}, {"q": "¿Desde qué posición se debe abrir el saco?", "alt": ["Una posición estable, fuera de la caída", "Subido sobre la tolva", "Colgado del gancho de izaje"], "correcta": 0}, {"q": "¿Por qué se debe usar respirador y antiparras en esta tarea?", "alt": ["Por el ruido del equipo", "Por el polvo que se genera al vaciar el saco", "Por el riesgo de descarga eléctrica"], "correcta": 1}, {"q": "¿Qué está prohibido hacer respecto al interior de la tolva?", "alt": ["Asomarse al interior de la tolva", "Revisar la tolva desde el exterior", "Reportar una falla en la tolva"], "correcta": 0}, {"q": "Si la parrilla de la tolva está retirada o dañada, ¿qué debes hacer?", "alt": ["Vaciar igual el maxisaco con cuidado", "No vaciar y avisar de inmediato al supervisor", "Usar la tolva vecina sin informar"], "correcta": 1}, {"q": "¿Cuál es la principal razón para no ubicarse bajo el maxisaco suspendido?", "alt": ["Genera mal olor en esa posición", "Puede caer o soltarse y golpear al trabajador", "Ensucia la ropa de trabajo"], "correcta": 1}], "compromiso": ["Nunca ubicarme bajo el maxisaco mientras esté suspendido.", "Verificar que la reja o parrilla de la tolva esté puesta antes de vaciar.", "Abrir el saco solo desde una posición estable y fuera de la zona de caída.", "Usar siempre respirador y antiparras durante el vaciado por el polvo generado.", "No asomarme nunca al interior de la tolva.", "Reportar de inmediato a mi supervisor si la parrilla falta o está dañada."] },
            22: { "preguntas": [{"q": "¿Qué puede pasar con el material atascado en una tolva, chute o correa?", "alt": ["Se compacta y no representa ningún riesgo", "Se seca y se vuelve inofensivo con el tiempo", "Guarda energía y puede soltarse de golpe"], "correcta": 2}, {"q": "Antes de intervenir un atasco, ¿qué se debe hacer primero?", "alt": ["Pedir a un compañero que sostenga la compuerta", "Golpear el material para aflojarlo", "Bloquear y verificar energía cero"], "correcta": 2}, {"q": "¿Desde dónde se debe trabajar al destarugar un atasco?", "alt": ["Desde la línea de descarga, de frente", "Desde un costado, fuera de la línea de descarga", "Desde arriba, subido en la estructura"], "correcta": 1}, {"q": "Si durante el destarugue ocurre algo inesperado, ¿qué corresponde hacer?", "alt": ["Detenerse y avisar de inmediato", "Terminar rápido la tarea antes de que empeore", "Seguir intentando sin detenerse"], "correcta": 0}, {"q": "¿Es correcto golpear o improvisar herramientas para destrabar un atasco?", "alt": ["Sí, siempre que sea con cuidado", "Sí, si no hay otra herramienta disponible", "No, nunca se debe golpear ni improvisar"], "correcta": 2}, {"q": "¿Por qué es peligroso pararse en la línea de descarga de una tolva o chute atascado?", "alt": ["Porque puede recibir el impacto directo si el material se suelta de golpe", "Porque ensucia más rápido la ropa de trabajo", "Porque ahí el ruido del equipo es más molesto"], "correcta": 0}, {"q": "¿Qué significa verificar 'energía cero' antes de intervenir un equipo atascado?", "alt": ["Confirmar que el equipo tiene combustible al mínimo", "Confirmar que no queda ninguna energía almacenada o residual que pueda liberarse", "Confirmar que el turno está por terminar"], "correcta": 1}], "compromiso": ["Nunca intervenir un atasco sin antes bloquear y verificar energía cero.", "Trabajar siempre desde un costado, alejado de la línea de descarga.", "Detenerme y avisar de inmediato ante cualquier situación inesperada durante un destarugue.", "No golpear ni improvisar herramientas para destrabar material atascado.", "Reportar a mi supervisor cualquier tolva, chute o correa con material atascado antes de manipularla.", "Respetar el procedimiento de destarugue aunque implique perder tiempo en la tarea."] },
            23: { "preguntas": [{"q": "Un trabajador nota que el material del silo forma un hueco por dentro pero se ve firme por arriba. ¿Qué es esto?", "alt": ["Una condición normal de estiba", "Un puente de material que puede colapsar sin aviso", "Una señal de que el silo ya está vacío"], "correcta": 1}, {"q": "¿Qué se debe hacer antes de entrar a un silo de materia prima?", "alt": ["Entrar rápido para revisar y salir", "Golpear las paredes para ver si suena hueco", "Contar con permiso, bloqueo, control de atmósfera y vigía"], "correcta": 2}, {"q": "¿Por qué el material fino del silo es tan peligroso para una persona?", "alt": ["Porque genera electricidad estática", "Porque traga a la persona como arena movediza", "Porque siempre está muy caliente"], "correcta": 1}, {"q": "Si un puente de material se rompe desde abajo mientras alguien está cerca, ¿qué riesgo principal existe?", "alt": ["Solo se ensucia la ropa de trabajo", "Sepultamiento por el desplome repentino del material", "Ninguno, es un procedimiento seguro"], "correcta": 1}, {"q": "¿Desde dónde se deben intervenir los silos según lo enseñado en la charla?", "alt": ["Bajando por el interior con una cuerda simple", "Entrando y parándose sobre el material", "Desde el exterior"], "correcta": 2}, {"q": "Un compañero le dice que va a subir a golpear el puente de material desde arriba para destrabarlo. ¿Qué debe hacer usted?", "alt": ["Ayudarlo a subir más rápido", "Detenerlo y explicar que nunca se rompe el puente desde arriba ni desde abajo", "Filmarlo para las redes sociales"], "correcta": 1}, {"q": "¿Qué característica hace tan peligroso al colapso de un puente de material?", "alt": ["Que siempre hace mucho ruido antes de caer", "Que ocurre sin aviso previo", "Que solo pasa una vez al año"], "correcta": 1}], "compromiso": ["Nunca entrar a un silo sin permiso de trabajo, bloqueo, control de atmósfera y vigía.", "Jamás intentar romper un puente de material desde arriba ni desde abajo.", "Reportar de inmediato si observo o sospecho la formación de un puente de material en un silo.", "Respetar que los silos se intervienen solo desde el exterior.", "Detener la tarea y avisar a mi supervisor si veo a alguien acercarse o entrar a un silo sin las condiciones seguras.", "Mantenerme alejado del material fino de los silos, recordando que puede tragar como arena movediza."] },
            24: { "preguntas": [{"q": "¿Qué se debe hacer antes de intervenir un equipo con polines, poleas o molinos?", "alt": ["Avisar a un compañero y trabajar igual mientras gira", "Esperar que baje la velocidad para intervenir con cuidado", "Detenerlo y bloquearlo"], "correcta": 2}, {"q": "Si un equipo no tiene su guarda de protección instalada, ¿qué corresponde hacer?", "alt": ["Operarlo igual pero manteniendo distancia prudente", "Colocar una cinta de peligro y seguir trabajando cerca", "No operar ni acercarse, y reportar la falta de guarda"], "correcta": 2}, {"q": "¿Cómo debe usarse la ropa de trabajo cerca de polines, poleas o molinos en movimiento?", "alt": ["Con mangas remangadas y cordones bien largos", "Amplia y suelta para mayor comodidad", "Ajustada al cuerpo, sin cordones sueltos ni pelo suelto"], "correcta": 2}, {"q": "¿Qué elementos NUNCA deben acercarse a un equipo en movimiento?", "alt": ["Solo herramientas metálicas", "Manos y trapos", "Cascos y lentes de seguridad"], "correcta": 1}, {"q": "¿Cuál es un punto de atrape típico en el área de polines, poleas y molinos?", "alt": ["Un extintor contra incendios", "Una señalética de evacuación", "La zona entre una correa y su polea en movimiento"], "correcta": 2}, {"q": "Un trabajador nota que su compañero se acerca a limpiar un polín en movimiento con un trapo en la mano. ¿Qué debe hacer?", "alt": ["Filmarlo para mostrarlo después en la charla", "Detenerlo de inmediato e indicarle que el equipo debe estar detenido y bloqueado", "No decir nada porque no es su equipo"], "correcta": 1}, {"q": "¿Por qué es importante reconocer los puntos de atrape del área antes de trabajar?", "alt": ["Porque así se puede trabajar más rápido sin guardas", "Para identificar los riesgos y evitar que manos, ropa o cabello queden atrapados", "Para saber dónde tomar fotos del equipo"], "correcta": 1}], "compromiso": ["Reconocer y respetar los puntos de atrape presentes en mi área de trabajo", "Nunca operar ni acercarme a un equipo si su guarda de protección no está puesta", "No acercar manos ni trapos a polines, poleas o molinos en movimiento", "Usar ropa ajustada, sin cordones sueltos ni pelo suelto al trabajar cerca de estos equipos", "Detener y bloquear el equipo antes de realizar cualquier intervención", "Reportar de inmediato cualquier guarda faltante o dañada que encuentre en el área"] },
            25: { "preguntas": [{"q": "¿Qué pasa con el polvo que se deja acumular en el suelo del área de molienda?", "alt": ["Resbala y se vuelve a levantar al pasar personas o máquinas", "Se compacta y ya no genera riesgo", "Desaparece solo con la ventilación natural"], "correcta": 0}, {"q": "¿Cómo se deben usar los sistemas de captación y ventilación del área?", "alt": ["Respetarlos y mantenerlos en funcionamiento según corresponda", "Apagarlos si molestan el ritmo de trabajo", "Usarlos solo cuando llega una visita o auditoría"], "correcta": 0}, {"q": "¿Cuál es la forma correcta de limpiar el polvo acumulado?", "alt": ["Con aire comprimido para hacerlo más rápido", "Con limpieza húmeda o aspiración", "Con escoba seca y barriendo fuerte"], "correcta": 1}, {"q": "¿Por qué NO se debe usar aire comprimido para limpiar el polvo?", "alt": ["Porque levanta el polvo al aire y aumenta el riesgo de respirarlo", "Porque gasta mucha energía del compresor", "Porque ensucia las herramientas de aire"], "correcta": 0}, {"q": "¿Cuándo se debe ordenar y limpiar el área de molienda?", "alt": ["Solo al final del turno, para no interrumpir la producción", "Solo cuando lo pide el supervisor", "Durante el turno, de forma constante, no solo al final"], "correcta": 2}, {"q": "Si un trabajador nota que un sistema de captación de polvo está fallando, ¿qué debe hacer?", "alt": ["No decir nada si el polvo se ve poco", "Seguir trabajando y avisar al final del turno", "Reportarlo de inmediato"], "correcta": 2}, {"q": "¿Por qué es importante mantener el orden y control del polvo en el área de molienda?", "alt": ["Solo por una cuestión estética del lugar", "Para reducir riesgos de resbalones, caídas y exposición al polvo", "Porque así lo exige únicamente la empresa mandante"], "correcta": 1}], "compromiso": ["Voy a limpiar el polvo acumulado usando limpieza húmeda o aspiración, nunca aire comprimido.", "Voy a ordenar y limpiar mi área de trabajo durante todo el turno, no solo al final.", "Voy a respetar y no manipular los sistemas de captación y ventilación del área de molienda.", "Voy a reportar de inmediato cualquier falla que detecte en los sistemas de captación de polvo.", "Voy a estar atento a superficies con polvo acumulado para evitar resbalones y caídas."] },
            26: { "preguntas": [{"q": "Si necesitas detener la correa transportadora de forma inmediata, ¿qué debes hacer?", "alt": ["Avisar por radio y esperar que otro la detenga", "Accionar la parada de emergencia o cuerda de tiro", "Tirar una piedra a la correa para trabarla"], "correcta": 1}, {"q": "Antes de iniciar tu turno, ¿qué debes verificar en las correas transportadoras?", "alt": ["Que la correa esté detenida todo el día", "Que la correa tenga el mayor ruido posible", "Que las guardas de polines, tambores y transmisiones estén puestas"], "correcta": 2}, {"q": "¿Está permitido limpiar la correa transportadora mientras está en movimiento?", "alt": ["Sí, siempre que se use un trapo largo", "Sí, solo si el supervisor está mirando", "No, nunca se debe limpiar ni cruzar la correa en movimiento"], "correcta": 2}, {"q": "¿Qué debes hacer si detectas una guarda dañada o una parada de emergencia que no funciona?", "alt": ["Esperar a fin de mes para informarlo", "Ignorarlo si la correa sigue funcionando bien", "Reportarlo de inmediato para que sea reparado"], "correcta": 2}, {"q": "¿Cómo debes cruzar cerca de una correa transportadora en funcionamiento?", "alt": ["Saltando por encima de la correa en cualquier punto", "Por debajo de la correa agachándose rápido", "Solo por los pasos habilitados para ello"], "correcta": 2}, {"q": "¿Por qué es importante mantener las guardas de tambores y transmisiones siempre puestas?", "alt": ["Porque mejoran la velocidad de la correa", "Porque protegen a las personas de puntos de atrapamiento", "Porque son obligatorias solo para la inspección mensual"], "correcta": 1}, {"q": "Un compañero te dice que va a cruzar la correa en movimiento para ahorrar tiempo, ¿qué corresponde hacer?", "alt": ["Detenerlo y explicarle que debe usar el paso habilitado", "Acompañarlo para que sea más rápido", "No decir nada porque es su decisión"], "correcta": 0}], "compromiso": ["Ubicar siempre las paradas de emergencia y cuerdas de tiro de mi área antes             27: { "preguntas": [{"q": "¿Quién puede operar la grúa horquilla en la planta?", "alt": ["Cualquier trabajador que sepa manejar", "Solo personal autorizado y con licencia vigente", "Solo el supervisor de turno, sin licencia"], "correcta": 1}, {"q": "¿Qué se debe hacer antes de comenzar a usar la grúa horquilla en cada turno?", "alt": ["Un chequeo preoperacional del equipo", "Cargar combustible únicamente", "Esperar la autorización del mandante"], "correcta": 0}, {"q": "¿Qué se debe respetar siempre según la placa del equipo?", "alt": ["El color de la pintura", "La capacidad de carga indicada", "La marca del fabricante"], "correcta": 1}, {"q": "¿Cómo se debe transportar una carga que va baja e inclinada hacia atrás?", "alt": ["Como se indicó en la charla, de forma baja e inclinada atrás", "Con la carga alta y hacia adelante", "No importa la posición, cualquiera sirve"], "correcta": 0}, {"q": "Si la carga tapa la vista del operador, ¿qué corresponde hacer?", "alt": ["Avanzar rápido para terminar antes", "Usar guía o retroceder según sea necesario", "Seguir el trayecto normal sin cambios"], "correcta": 1}, {"q": "¿Se pueden transportar personas sobre la grúa horquilla o su carga?", "alt": ["Sí, si es un trayecto corto", "No, está prohibido transportar personas en el equipo", "Sí, si el trabajador da su consentimiento"], "correcta": 1}, {"q": "¿Qué documento habilita legalmente a una persona para operar la grúa horquilla?", "alt": ["La experiencia previa en otra empresa", "Una autorización verbal del compañero de turno", "La licencia vigente correspondiente"], "correcta": 2}], "compromiso": ["Operar la grúa horquilla solo si cuento con autorización y licencia vigente.", "Realizar siempre el chequeo preoperacional antes de iniciar mi turno.", "Respetar la capacidad de carga indicada en la placa del equipo.", "Transportar la carga baja e inclinada hacia atrás en todo momento.", "Solicitar un guía o retroceder cuando la carga tape mi visibilidad.", "No transportar personas en la grúa horquilla bajo ninguna circunstancia."] },
            28: { "preguntas": [{"q": "¿Cuál es la principal causa de muerte al operar una grúa horquilla?", "alt": ["El choque contra estanterías", "El desgaste de los neumáticos", "El volcamiento del equipo"], "correcta": 2}, {"q": "Si vas circulando con la horquilla cargada en alto, ¿qué NO debes hacer?", "alt": ["Avanzar en línea recta a baja velocidad", "Bajar la carga a la altura adecuada de traslado", "Girar con la carga en alto"], "correcta": 2}, {"q": "¿Qué se debe hacer al circular en pendientes con la horquilla?", "alt": ["Evitar girar y no cargar en alto", "Girar rápido para cruzar la pendiente", "Aumentar la velocidad para no perder tracción"], "correcta": 0}, {"q": "Al tomar una curva o transitar por un piso irregular, ¿qué corresponde hacer?", "alt": ["Mantener la velocidad normal", "Reducir la velocidad", "Acelerar para cruzar rápido"], "correcta": 1}, {"q": "Si la grúa horquilla comienza a volcar, ¿cuál es la acción correcta?", "alt": ["Sujetarse firme dentro de la cabina", "Saltar fuera de la cabina de inmediato", "Soltar el volante e intentar frenar bruscamente"], "correcta": 0}, {"q": "¿Está permitido levantar personas usando las horquillas del equipo?", "alt": ["Sí, siempre que sea por poco tiempo", "Sí, si la persona se sujeta bien", "No, nunca se deben levantar personas en las horquillas"], "correcta": 2}, {"q": "¿Cuál de las siguientes es una práctica correcta para evitar el volcamiento?", "alt": ["Girar con la carga en alto para ahorrar tiempo", "Circular con la carga baja y velocidad reducida en curvas", "Ignorar la pendiente si la carga es liviana"], "correcta": 1}], "compromiso": ["Nunca giraré la grúa horquilla con la carga en alto.", "Reduciré la velocidad en curvas y pisos irregulares.", "No circularé ni giraré con carga en pendientes.", "Si la grúa vuelca, me sujetaré dentro de la cabina y no saltaré.", "Jamás levantaré personas en las horquillas del equipo.", "Reportaré de inmediato cualquier condición insegura relacionada con el uso de la grúa horquilla."] },
            29: { "preguntas": [{"q": "¿Cómo se debe apilar la carga en una estantería (rack) para que sea segura?", "alt": ["Lo más alto posible para ahorrar espacio en el pasillo", "Sobre una base firme, sin superar la altura máxima permitida y sin cargas trabadas", "Amarrada solo por arriba, sin importar la base de apoyo"], "correcta": 1}, {"q": "Antes de poner material en un nivel del rack, ¿qué debo verificar?", "alt": ["Que el nivel de abajo esté vacío", "Que el material sea liviano, sin necesidad de revisar nada más", "Que no se supere la capacidad de carga indicada para ese nivel"], "correcta": 2}, {"q": "Si veo un rack golpeado o un larguero doblado, ¿qué debo hacer?", "alt": ["Reportarlo de inmediato y no usar ese nivel hasta que se revise", "Seguir usándolo si aún se ve firme a simple vista", "Sacar solo la carga liviana y dejar el resto igual"], "correcta": 0}, {"q": "Un compañero quiere subir a la estantería para alcanzar una caja en el nivel más alto. ¿Qué corresponde hacer?", "alt": ["No treparse a las estanterías; usar un medio seguro como escalera o equipo autorizado", "Ayudarlo a subir sujetando la base del rack", "Dejarlo subir rápido ya que la caja es liviana"], "correcta": 0}, {"q": "¿Por qué no se deben dejar cargas sobresaliendo hacia los pasillos?", "alt": ["Porque queda más ordenado el rack por dentro", "Porque así se aprovecha mejor cada nivel del rack", "Porque pueden golpear a personas o equipos que circulan por el pasillo"], "correcta": 2}, {"q": "¿Cuál de estas prácticas corresponde a un almacenamiento seguro en racks?", "alt": ["Trabar las cargas entre sí para que no se muevan del nivel", "Apilar sin fijarse en la altura máxima si el pasillo está despejado", "Ubicar cargas pesadas en los niveles más altos para ganar espacio abajo"], "correcta": 0}, {"q": "¿Qué debo hacer si noto que un nivel del rack está sobrecargado respecto a su capacidad indicada?", "alt": ["Dejarlo así si la estructura no se ve doblada", "Redistribuir o retirar carga hasta respetar la capacidad de ese nivel", "Agregar más material para compensar el peso en otro nivel"], "correcta": 1}], "compromiso": ["Apilar siempre sobre una base firme, sin superar la altura máxima ni dejar cargas trabadas.", "Respetar la capacidad de carga indicada en cada nivel del rack antes de almacenar material.", "Reportar de inmediato cualquier rack golpeado o larguero doblado que detecte.", "No treparme nunca a las estanterías para alcanzar materiales.", "No dejar cargas sobresaliendo hacia los pasillos de circulación."] },
            30: { "preguntas": [{"q": "¿Cómo se debe distribuir la carga en el camión?", "alt": ["Toda hacia un solo lado para facilitar la descarga", "Pareja y dentro del límite de peso permitido", "No importa mientras se amarre firme"], "correcta": 1}, {"q": "¿En qué condición deben estar las fajas o amarres antes de usarlos?", "alt": ["En buen estado, sin cortes ni daños", "Da lo mismo si tienen algún corte pequeño", "Mojadas para que ajusten mejor"], "correcta": 0}, {"q": "Antes de soltar un amarre, ¿qué se debe verificar primero?", "alt": ["Que el conductor esté almorzando", "Que la carga no vaya a caer al soltarla", "Que el camión tenga bencina suficiente"], "correcta": 1}, {"q": "¿Dónde debe ubicarse el trabajador al trincar o soltar amarres, coordinando con el conductor?", "alt": ["Detrás del camión sin avisar a nadie", "Debajo de la carga para ver mejor", "A un costado, en comunicación con el conductor"], "correcta": 2}, {"q": "¿Qué debe pasar con el camión mientras una persona está cargando o amarrando?", "alt": ["Puede avanzar lento para ahorrar tiempo", "Puede moverse si el conductor toca la bocina antes", "El camión no se debe mover"], "correcta": 2}, {"q": "Si una faja de amarre presenta cortes o desgaste visible, ¿qué corresponde hacer?", "alt": ["Usarla igual si la carga es liviana", "No usarla y cambiarla por una en buen estado", "Doblarla varias veces para reforzarla"], "correcta": 1}, {"q": "¿Por qué es importante distribuir bien el peso de la carga en el camión?", "alt": ["Para evitar desequilibrio y riesgo de volcamiento o caída de carga", "Para que el camión sea más difícil de estacionar", "Para que se vea más ordenado el camión"], "correcta": 0}], "compromiso": ["Distribuir siempre el peso de la carga de forma pareja y dentro del límite permitido.", "Revisar que las fajas y amarres estén en buen estado, sin cortes, antes de usarlos.", "Verificar que la carga no pueda caer antes de soltar cualquier amarre.", "Ubicarme a un costado y coordinar con el conductor durante la carga y el trincado.", "No permitir que el camión se mueva mientras estoy cargando o amarrando.", "Reportar de inmediato cualquier faja o amarre en mal estado."] },
            31: { "preguntas": [{"q": "¿Qué característica del casco de vidrio (cullet) lo hace peligroso?", "alt": ["Solo es peligroso si se lanza con fuerza", "Es resbaladizo pero no corta", "Puede cortar solo con rozarlo"], "correcta": 2}, {"q": "¿Qué se debe usar para manipular cullet, en vez de las manos?", "alt": ["Solo un paño grueso", "Guantes de género comunes", "Guantes anticorte, antiparras y herramientas adecuadas"], "correcta": 2}, {"q": "¿Por qué hay que cuidar la estabilidad de las pilas de acopio de cullet?", "alt": ["Porque pueden derrumbarse y causar golpes o cortes", "Porque el vidrio se derrite si se apila alto", "Porque solo afecta la estética del acopio"], "correcta": 0}, {"q": "Además de las pilas de acopio, ¿dónde más puede haber vidrio oculto y representar riesgo?", "alt": ["En pisos y vías de tránsito", "Solo dentro de los contenedores cerrados", "Únicamente en las bodegas techadas"], "correcta": 0}, {"q": "¿Qué efecto puede tener el polvo de vidrio en las personas?", "alt": ["No genera ningún efecto en la salud", "Irrita los ojos y las vías respiratorias", "Mejora la visibilidad en el área"], "correcta": 1}, {"q": "Si notas vidrio suelto en una vía de tránsito, ¿qué debes hacer?", "alt": ["Reportarlo y señalizar o retirar el riesgo según corresponda", "Ignorarlo si no es tu área de trabajo", "Empujarlo hacia un costado con el pie"], "correcta": 0}, {"q": "¿Cuál es la forma correcta de tomar o mover casco de vidrio (cullet)?", "alt": ["Con herramientas y equipo de protección adecuado, nunca con las manos", "A mano limpia si el trozo se ve pequeño", "Con las manos, cuidando de tomarlo por el lado más liso"], "correcta": 0}], "compromiso": ["Usar siempre guantes anticorte y antiparras al manipular cullet", "No tocar el casco de vidrio con las manos, usar herramientas adecuadas", "Revisar y mantener la estabilidad de las pilas de acopio de vidrio", "Reportar de inmediato la presencia de vidrio oculto en pisos y vías", "Usar protección respiratoria u ocular cuando exista polvo de vidrio en el ambiente"] },
            32: { "preguntas": [{"q": "Antes de usar un pallet, ¿qué se debe hacer si tiene tablas quebradas o clavos salidos?", "alt": ["Retirarlo de servicio y no utilizarlo", "Usarlo igual si la carga es liviana", "Darlo vuelta para tapar el daño"], "correcta": 0}, {"q": "¿Qué se debe respetar siempre al cargar una transpaleta?", "alt": ["La cantidad que quepa visualmente sobre las horquillas", "El criterio personal del operador, sin límite fijo", "La capacidad máxima indicada por el fabricante"], "correcta": 2}, {"q": "¿Cuál es la forma correcta de mover una transpaleta cargada?", "alt": ["Tirando de ella hacia el cuerpo para tener más control", "Arrastrándola de lado para ver mejor el camino", "Empujándola, cuidando pies y piernas"], "correcta": 2}, {"q": "Al desplazarse en una pendiente con la transpaleta cargada, ¿qué se debe hacer?", "alt": ["Aumentar la velocidad para cruzar rápido la pendiente", "Subir siempre de espaldas, sin mirar el trayecto", "Llevar la carga hacia abajo (aguas abajo) y con velocidad controlada"], "correcta": 2}, {"q": "¿Está permitido transportar a una persona sobre la transpaleta?", "alt": ["Sí, si el trayecto es corto", "Sí, si la persona se sujeta bien", "No, nunca se debe transportar personas en la transpaleta"], "correcta": 2}, {"q": "¿Qué riesgo se busca evitar al empujar la transpaleta y cuidar pies y piernas?", "alt": ["Golpes, atrapamiento o aplastamiento de las extremidades", "Que se ensucien los zapatos de seguridad", "Que la carga se mueva de lugar"], "correcta": 0}, {"q": "¿Qué se debe hacer si un pallet en uso presenta daños durante la jornada?", "alt": ["Seguir usándolo hasta terminar la tarea y luego avisar", "Reforzarlo con cinta o amarras improvisadas", "Retirarlo de inmediato y reportar la condición"], "correcta": 2}], "compromiso": ["Revisar el pallet antes de usarlo y retirar los que tengan tablas quebradas o clavos salidos.", "Respetar siempre la capacidad máxima de carga de la transpaleta.", "Empujar la transpaleta y no tirar de ella, cuidando mis pies y piernas en todo momento.", "Bajar pendientes con la carga hacia abajo y manteniendo una velocidad controlada.", "No transportar personas en la transpaleta bajo ninguna circunstancia.", "Reportar de inmediato cualquier pallet o transpaleta en mal estado que detecte."] },
            33: { "preguntas": [{"q": "Antes de usar una herramienta manual, ¿qué debo revisar primero?", "alt": ["El color de la herramienta", "Si es la más nueva de la caja", "El mango y la cabeza, que estén en buen estado"], "correcta": 2}, {"q": "Si necesito apretar un tornillo, ¿qué debo hacer?", "alt": ["Usar cualquier herramienta que tenga a mano", "Usar la herramienta correcta para esa tarea", "Forzarlo con un alicate hasta que entre"], "correcta": 1}, {"q": "¿Qué se debe hacer cuando una herramienta no sirve bien para la tarea?", "alt": ["Improvisar o forzarla igual para terminar rápido", "Golpearla más fuerte hasta que funcione", "Buscar la herramienta adecuada, sin improvisar ni forzar"], "correcta": 2}, {"q": "Si veo un mango rajado o una cabeza suelta en una herramienta, ¿qué corresponde hacer?", "alt": ["Retirarla de uso porque está dañada", "Seguir usándola con más cuidado", "Prestársela a un compañero"], "correcta": 0}, {"q": "Después de terminar el trabajo, ¿dónde debo dejar cada herramienta?", "alt": ["Sobre el suelo cerca del área de trabajo", "Donde quedó más cómodo dejarla", "En su lugar correspondiente"], "correcta": 2}, {"q": "Usar una herramienta en mal estado (mango dañado o cabeza suelta) puede provocar principalmente...", "alt": ["Que el trabajo quede más rápido", "Que la herramienta dure más tiempo", "Un accidente, como golpes o cortes"], "correcta": 2}, {"q": "¿Por qué es importante usar la herramienta correcta para cada tarea?", "alt": ["Porque previene accidentes y daños a la herramienta y al trabajo", "Porque así se gasta menos energía", "Porque queda mejor a la vista"], "correcta": 0}], "compromiso": ["Revisar el mango y la cabeza de mis herramientas antes de cada uso.", "Usar siempre la herramienta correcta para cada tarea que realice.", "No improvisar ni forzar herramientas para tareas que no corresponden.", "Retirar de uso de inmediato cualquier herramienta dañada y reportarlo.", "Guardar cada herramienta en su lugar al terminar mi trabajo.", "Respetar las condiciones de seguridad de mis herramientas manuales en todo momento."] },
            34: { "preguntas": [{"q": "Antes de usar una herramienta eléctrica portátil, ¿qué debes revisar?", "alt": ["El color de la carcasa de la herramienta", "Solo la marca del fabricante", "El cable, el enchufe y las guardas de protección"], "correcta": 2}, {"q": "¿Cómo debe estar el disco de una amoladora antes de usarla?", "alt": ["Da lo mismo si tiene trizaduras pequeñas", "Correcto para el trabajo y sin trizaduras", "Cualquier disco disponible, sin revisar"], "correcta": 1}, {"q": "¿Qué protección personal debes usar siempre al trabajar con herramientas eléctricas portátiles?", "alt": ["Guantes de cuero solamente", "Ninguna, si el trabajo es rápido", "Antiparras o careta"], "correcta": 2}, {"q": "¿Qué debes hacer antes de cambiar el disco u otro accesorio de la herramienta?", "alt": ["Desconectar la herramienta primero", "Cambiarlo con la herramienta encendida para ahorrar tiempo", "Solo soltar el gatillo, sin desconectar"], "correcta": 0}, {"q": "¿Qué se debe hacer al terminar de usar una herramienta con disco?", "alt": ["No dejarla con el disco girando; apagarla y esperar que se detenga", "Apoyarla en el suelo con el disco aún girando", "Dejarla girando mientras se hace otra cosa"], "correcta": 0}, {"q": "Si notas que el cable de una herramienta eléctrica está pelado o dañado, ¿qué corresponde hacer?", "alt": ["Reportarlo de inmediato y no usar la herramienta", "Aislarlo con cinta y seguir trabajando", "Usarla igual, con cuidado de no tocar el cable"], "correcta": 0}, {"q": "¿Por qué es importante que la guarda de protección del disco esté siempre instalada?", "alt": ["Porque mejora el rendimiento del motor", "Porque evita el contacto accidental con el disco y protege de proyecciones", "Porque es solo un requisito estético"], "correcta": 1}], "compromiso": ["Revisar siempre el cable, el enchufe y las guardas antes de usar una herramienta eléctrica portátil.", "Usar solo discos correctos para cada trabajo y verificar que no tengan trizaduras.", "Usar antiparras o careta en todo momento al operar herramientas eléctricas.", "Desconectar la herramienta antes de cambiar cualquier accesorio.", "No dejar nunca la herramienta con el disco girando sin supervisión.", "Reportar de inmediato cualquier herramienta o cable en mal estado."] },
            35: { "preguntas": [{"q": "¿Quién puede intervenir tableros o instalaciones eléctricas en la planta?", "alt": ["Cualquier trabajador con experiencia previa", "El primer disponible si es una urgencia", "Solo personal eléctrico calificado"], "correcta": 2}, {"q": "Si encuentras un cable o tablero eléctrico dañado, ¿qué debes hacer?", "alt": ["Reportarlo de inmediato y no manipularlo", "Aislarlo tú mismo con cinta y seguir trabajando", "Esperar al próximo mantenimiento programado"], "correcta": 0}, {"q": "¿Qué riesgo genera sobrecargar un enchufe con varios equipos conectados?", "alt": ["Ninguno, si el enchufe se ve en buen estado", "Solo afecta el consumo de energía, no la seguridad", "Puede provocar sobrecalentamiento e incendio o falla eléctrica"], "correcta": 2}, {"q": "Ante una persona sufriendo electrocución, ¿cuál es la primera acción correcta?", "alt": ["Tomarla de inmediato para alejarla de la fuente", "Cortar la energía antes de tocarla", "Echarle agua para reducir la corriente"], "correcta": 1}, {"q": "¿Cómo se debe tratar toda instalación eléctrica en la planta?", "alt": ["Como energizada siempre, aunque parezca apagada", "Como segura si no se ve dañada a simple vista", "Solo como riesgosa si tiene una etiqueta de advertencia"], "correcta": 0}, {"q": "Un trabajador no eléctrico nota que un tablero quedó con la puerta abierta y cables expuestos. ¿Qué corresponde hacer?", "alt": ["Cerrar la puerta del tablero y continuar", "Tapar los cables expuestos con algún material aislante propio", "Reportar la condición y evitar acercarse o tocar"], "correcta": 2}, {"q": "¿Por qué no se debe usar un mismo enchufe para conectar múltiples equipos a la vez?", "alt": ["Porque reduce la vida útil de los equipos únicamente", "Porque aumenta el riesgo de sobrecarga, calentamiento y contacto eléctrico", "Porque está prohibido por estética en el orden de la planta"], "correcta": 1}], "compromiso": ["Reportar de inmediato cualquier cable o tablero eléctrico dañado que
